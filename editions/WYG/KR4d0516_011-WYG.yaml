body:
  text: 安雅堂集卷十三元陳旅撰雜文鄭氏譜立法以為譜古君子之所甚重士大夫之所當知也五季之亂衣冠舊族亡其世諜多失其傳系獨采河南劉􅁮自北齊中書侍郎闕至􅁮十一世俱可考當時皆慕艷之浦江鄭氏自漢初至今凡五十一世不尤為可慕者耶鄭氏諸孫銖㑹旅京師出進士吳菜所述圖譜請題適旅少暇日留寘齋中者頗乆今銖受命為行宣政院照磨将歸江南因書而還之坦齋銘王道平平既錫汝極遵道而行乃即安宅利欲之岐車覆馬踣孰為險夷願我攸迪小人物役自底戚戚唯幽而貞獲履之吉為楊友直製木笏銘辨良材審度正手有容徳之柄慎毋忽持以敬立明廷對休命尊己堂銘朱文公題扁林林生人𤣥精之凝自頂及踵天命流行君子之身敬恭奉承曰惟事天動㒺或輕公卿父兄出入攸事至于使事亦若承命無所不敬尊已之謂偃然自尊反失良貴擁金如坻髙位以妷元身為侯衆恕之射匪徳之尊其尊為危所以謙者莫踰其卑先獻顗顗汪氏之軌尊已翳何非己之已載瞻華榜思我朱子神蚪登天遺蜕在此惟汪有孫作堂言言雲屏之山峙其後前豈構之復訓迪厥先爾冠爾裳母隳而天勤耕亭銘有序富州民鄒福少時與人傭耕及事乆監掲先生始知學在京師乆學益力能為詩又従奎章閣授經郎林希顔學國字業成将授校官去乃來言曰吾本黎塘里田舍子也雖竊有志四方然還里日不敢舍吾耒以嬉太常博士趙公為篆勤耕二字扁吾草亭願得一言識之余善福之能不遺其本也為銘曰古者四民唯農為良烝髦于農不于工商世靡甿逸浮末滿國乗堅䇿肥不稼不穡有處于民輟耕而嘆或興于兹耻言其端民有鄒福樸野不飭曰吾世農况我傭力我行四方我思黎塘手雖釋耒而心弗忘靈雨纚纚黎塘多水下田種稌上田種秠福雖逺游亦時歸休痔乃良耜飯乃大牛有屋其翼耕港則息亦有鄰叟爰憇爰食聖皇乗乾嵗嵗有年撃壤且歌樂堯之天尚徳齋銘有序汝南蒋完子成有志為學武夷杜先生名其齋居尚徳孔子曰尚徳哉若人謂南宫适賛禹稷貶羿奡也孟子云禹稷顔子易地則皆然子成能學顔子之學則徳其所尚者矣銘曰人各有尚士尚者徳徳人之心衆善攸宅著之躬行則道之迪措諸事業則物之澤窮而顔淵達乃禹稷顔何人哉我則矜式曰髙必躋曰逺必適彼言亦言彼服亦服始闚其門終造其域徳崇于身人反我則吾銘匪躬願子母斁恭䟦文宗皇帝御書保寳二字魏恵王問齊國之寳威王以四臣答之秦欲觀楚國之寳昭奚恤以五臣示之庶㡬周書所寳唯賢之言也監察御史臣保寳際遇文宗皇帝于淵潛之時上為書保寳二字賜之既臨御又識以兩璽葢良貴者天所與人之至寳也惟賢者為能保之于身唯賢主為能保其賢于國御史能忘文皇所以書二字之意乎鼎湖龍去唯𢎞璧琬琰天球河圖在東西序悲夫䟦孔子觀欹器圖孔子觀于魯桓公之廟有欹器焉使弟子注水弟子挹水而注之中而正滿而覆虛而欹孔子喟然嘆曰吁惡有滿而不覆者哉陳旅曰中也者堯舜禹之所以授受而孔子之所以為教者也吾于易而得欹器之象焉于中庸而得欹器之説焉于凡天地萬物之變古今人事之得失而得欹器之大觀焉嗚呼覽是圖者其戒慎恐懼以益慎其獨哉䟦吳顥書右呉顥秀才家書一幅詩十首寄上特進大卿𤣥教大宗師顆樞密院判公之孫特進公之諸孫故江浙儒學提舉養浩君之子也年纔弱冠書辭温妥典裁詩律清麗而筆畫秀整直吳氏佳子弟也昔養浩侍特進公在京師公篤意造成之俾日従縉紳先生充廣其所學自入官以至為太常博士集賢待制出董江浙文學皆綽著善譽至元再元之四年復來京師明年八月七日歿于蓬萊坊中此書與詩則其子五月廿四日在畨陽寄來特進公毎見此則益悲思養浩不自勝因次韻以自寫嗚呼桐絲之琴絲竹之管物之尤美者也公尚以昔之培植養浩而培植其子則養浩為不死也傳有之曰國人稱願曰幸哉有子顥有文學能早著見若此養浩可謂有子矣亦可以少慰二老之心矣䟦蘭蕙同芳圖昔之君子託滋蘭樹蕙以自㓗而其同姓之親有曰蘭者與為薰蕕不但化而為茅苴為蕭艾而已矣讀離騷者至于今傷之石田馬氏實衆芳之所在中丞公既著芳烈于當世矣元博又能自植于顔行而流清芬于薦紳之間是圖所寫葢寓其並芳之心焉同居曠林而不相能者亦可以少愧于此矣書舒嚕従道詩卷後軍中之能為歌詠者世多有之然不夸軍容之盛殺伐之勇則叙其行役之勤戰戍之苦至又以従軍為樂相與倡和以寫一時之髙致要其戚欣皆不出于其身而已矣古之人以喪禮主戰勝者葢惡夫師之為民害也非置戚欣于其身也徒知有其身而慮不及民吾見其禍之不止于為民害也天厯初兩京用兵海内㡬大亂述律公持節太行山東西戰卻秦兵之軼晉地者賦詩百韻述當時所見而深閔斯民之厄于兵凶增欷累嘆者甚逺也孰謂剛暴殘忍者之可以治武事哉嗚呼剛暴殘忍之不止為民害者亦何以慮之不及逺也䟦趙待制詩右蜀郡趙君仲禮送胥紹道庫使還蜀詩何其辭之豪宕而音節之頓挫而慷慨也昔趙文子舉筦庫之士七十餘家所舉皆筦庫之士何也葢人莫難于近利而不濡于利則賢矣文子之所舉者其亦有所試歟仲禮名位日髙行當要津以進退天下之士若用其家故事則紹道到蜀乂當趣装東來離歌無乃徒悲辛乎䟦支仲元畫晉諸賢圖晉人清虛宏達仲元可謂得其韻度者矣然當時取人先名望後實事司馬氏不阼職此之由茂𢎞豐功雅量在江左無與倫儗然不能用陳頵熊逺之言以革曠誕之弊安石期功絲竹士大夫習以成俗此為可惜也餘數公皆一時名人然未免有如圖中袒跣之態君子于此有所興起而亦有所創艾云䟦牧羝圖右漢典屬國蘇子卿牧羝圖也曷為牧羝子卿使單于不降役之北海上言羝乳乃得歸也抱子卿而泣者誰降将李陵也陵來従三人馬五者何單于使陵說子卿而邀之也子卿所執者何漢節也夫人情至于不能堪忍者烈丈夫或亦卒動其心而變其所守子卿飢餓困苦在荒絶無人之地十九年母死妻嫁兄弟在漢皆以罪死此人情之至不能堪忍者而子卿則揆以大義强忍以全其節若陵則戰敗力屈而遂降矣母死卒不復歸漢虞常張勝謀刼單于母更殺衛律子卿實與其謀是子卿得罪單于其情甚于陵而單于終不忍害之使陵時特能忍不降未必見殺何至羞見子卿泣下沾襟乎傳曰必有忍其乃有濟有志之士未嘗不三復于斯言也雖然猶懷生死之心以事其上君子不為也予直就陵言之亦念如陵才武而不能强忍以全其節為可惜也䟦牛喘圖漢丙吉為丞相道逢肆鬬死傷者不問見牛喘吐舌使人問之若丙吉者可謂知為相之道矣漢興蕭曺以刀筆吏為相功業著于當時君子猶惜其未學陳平决獄治粟之對㡬于大體然但出一時權譎實未得為相之道其他或以儒術至公卿者學皆未醇設施亡揆史氏以丙魏並稱余觀魏相雖少嘗業儒所為頗近文法吏無儒者氣象吉雖起决獄小吏知學詩禮通大義及為相能以燮調陰陽為己責考其平日凡所為葢有三代大臣之遺風焉嗚呼世俗所謂儒與吏也往往互相詆訾遂判為兩途孰謂魯獄吏之有丙少卿者乎三代之時不聞以吏名者周官九兩雖有曰儒曰吏之目葢儒之所業即吏事也後世所謂吏者吏而已矣嗚呼孰謂魯獄吏之有丙少卿者乎䟦五湖圖右扁舟五湖圖五湖即太湖别名太湖洲渚多芳草佳樹逺岫如畫陶朱公扁舟容與其間與之越國不足易此樂也世俗所謂㓕呉之後載西施以㳺畫者往往畫公與西施相對予按史記只稱公将私徒屬浮海而已無載西施事至唐時揚州杜書記始作詩倡為此説何其厚誣長者如是哉往年予嘗以詩辨之曰羑里人去㜪女來帝辛飲酒沙丘臺酒䦨不但天智燬小白旗竿血花紫㑹稽凜凜呉日驕少伯乃是師閎夭姑蘇臺下箭如兩艷骨應成館娃土當時此詩出識者謂能為古人解紛厚之道也此圖唯畫公船頭置樽酒意度閒逺船窻中著數卷書而已此决非世俗畫工所能作其知范公者哉道藏經䟦荀卿子以人心之危道心之微為出于道經則古之所謂道經葢儒書也司馬談所習于黄子者則異于此矣然余㓜時常見道藏經目一卷中間多儒家古書其黄帝老子之言固有用以治國者它如巫醫卜祝之説亦儒者所不廢而凡棲神導氣之方則又遺世獨立之士得以善其身焉故崆峒邵氏亦嘗傳㕘同而深有取逺游者之言也然則道經亦世之所不可缺者廬陵真常觀道士李俊迪刻道藏經若干卷以廣其傳可謂勤于其道又足以備夫世之有取焉者吾黨善其所為而旌徳縣尹劉性為徵余言識卷末云䟦東坡帖先生平生風節與夫出處欣戚之槩可以見于翰墨之間矣海會寺所寫及陌上花皆熙寧六年八月廿日作陌上花無鑱削之迹亦以見當時人心有不可奪者南華寺齋僧疏讀之令人流涕使先生至于如此者真無人心者也旅嘗憶外大父浚儀趙公之言謂張天覺好佛人所不與陳忠肅公亦好佛君子未遑議之葢以其大者之皦皦于當世也人不能學魯男子之不可而欲為栁下恵之可可乎三復是卷深有感于斯言因併及之䟦段氏庸音集文章貴奇崛而忌奇崛尚平易而厭平易古之作者辭淡而㫖醇貌直而思婉聲約而韻充閭巷刺草之言被之筦絃可以感人心召和氣而易風俗音之庸也葢謂庸非奇崛非平易天下之常言雖聖人不能易也旅曩嘗有志于是學道弗明故其為言不失之奇崛則失之平易卒不足有聞於人而今且衰矣吾友段君吉甫出視其詩文若干首題曰庸音繙繹數四見其筆勢翩翩率廸古作大篇短章典實奇秀私欲易其一字而不能于是知是編之所以為庸而其自序以為凡近淺易者謙言也傳曰清廟之瑟一倡而三嘆吾懼夫世之知庸音者葢鮮矣不然吉甫蚤擢髙科而何其乆于外也朱絃疏越尚往鳴天地之和于清廟之間乎䟦松㕔章疏前代有諌官有察官其任皆重也我朝唯設監察御史而諌官之責寓焉則御史實有兩重任矣然居是官者往往致詳于六察匡諌之道則或未盡至于為天下后世計而出于尋常識見之外者葢益寡矣趙郡蘇公伯修為御史中臺僅四閲月而所上章疏已四十有五言當畏天變奉宗廟保聖躬輔聖徳止畋獵大臣不當增廣居第凡政治之未善民隠之未恤風俗之未正賢者之宜進而未進不肖之宜退而未退者皆言之道足以事明主氣足以肅羣慝學足以達古今之變智足以周天下之慮若公者可謂能任夫兩者之重也中間又嘗以延平李先生従祀為請于世教葢拳拳焉嗚呼為御史而念及乎此是豈易與尋常識見者言哉䟦楊九思字説洪範五事曰貌言視聴思以五行而言思土也能君乎貌言視聴其功至于睿作聖則思之于人大矣故孔子于視聴色貌言事疑忿得九者皆以思言而立教視洪範為加宻者謂自吾身以至接于事物皆不可以不思也楊定省字九思𤣥教大宗師呉公告以孝親進徳之說善矣葢孝者百行之本學本于親乃可以進徳而思者所以致知以為行之之地也九者而有不思則視或不明聴或不聰色或不温貌或不恭言或不忠事或不敬疑或不問忿将及難得有非義如是則必至于行虧而身辱不得謂之孝矣是故君子于一言一動之㣲皆慎思之以為欲保吾身以事親也如之何勿思䟦危太樸所藏曽王虞三公詩文右曾文定公擬闕臺記王文公詩奎章閣學士虞公所製文定祠記三者又皆虞公手書虞公蜀人今家臨川文學與曾王兩公相望而此卷實具有之嗚呼美矣太樸宜與曾氏子孫求貞石使呉中石工併刻之臨川有榮觀焉書虛舟説後鎮陽趙時中氏以燕處之室為虛舟則非荘子之所謂虛舟矣葢是舟非以無主為虛而虛以為之主也人之一心可以載萬物而不可以有一物有一物衡于其中則物莫能入矣古之君子能任大事濟大難而不自有其功者虛以為之主也夫通天下之不通者莫如舟易之咸極言感通之道曰憧憧往來朋従爾思言累于私感則不足以及逺故孔子傳大象曰君子以虛受人是虛也非謂無主也無私吾以為之主則所受者大而所感者無不通矣時中器𢎞而識達操固而慮審将以其身為舟以濟夫世之不通者豈若漆園傲吏之漠然于當時哉書李氏遺安堂記後君子無往不安不能安則雖田野里巷之間皆危地也龎公以隠退為安是果足以遺子孫乎車不覆于羊腸而覆于康荘之衢安危不繫于地尚矣旅聞君子之學至于安而止也學至于安則窮達出處無不安矣然則人能教其子孫使致力于學不謂之遺以安乎李氏祖父皆以詩書傳家唐卿蚤以才學見用子觀又以明經領薦書則李氏之遺其子孫者以學安之道在是矣故雖載髙位登要津皆安所也龎公烏有是哉嗚呼君子豈獨遺子孫以安葢将推之以遺天下之人此又名堂者之㣲意也歟書野鶴記後述津従道世家遼東鶴其邑名人野故以是號之遼東之鶴鶴之仙者也千百六嵗則能與鳯凰逰于聖人之甸鶴野不専在遼東矣從道以清夐之資而學兼文武雖董戎西南終當羽儀天朝以大展布其所學則所謂鶴野其在聖人之甸乎詩云鶴鳴于九臯聲聞扵野釋者謂誠之不可掩也従道之所藴者著于朝乆矣瑞𤓰解在金陵作相國凉公既謝事完江壖園有異𤓰合趺岐顛績師象容薦紳傳觀頌聲渢渢東箎西塤客有獻疑于陳旅曰在昔三公論道位尊期頥變元化于重几暢嘉生于九圍今公望老引却邈乎化機故所及者弗溥而近發于畦蓏之㣲吾黨所宜興慨顧奚喜而頌為旅解之曰噫子何録細而遺大燭外而暗内徒知是𤓰為梁園之珍不知凉公乃希代之瑞徒知公之及夫物者在乎用舍不知公之鍾于身者無繫乎進退夫天以清明冲融之真篤生偉人禮陰樂陽緯義經仁肅物為秋煦物為春雖迹離要達手揮巨鈞人唯知有元老之在天下葢盛徳自足以長于斯民譬之寳玉在山而草木潤豈必皆用為琮璧祥雲在空而年穀登豈必皆用為雨澤況公在廷閲載中百運際黄道唐行臯稷憲綱政條半出較畫則其所及容有紀極乎哉觀其展采臺端抨擊醜慝俄與羣良嬰釁羅厄公裏至和戾氣弗敵獨能綿三朋之夀衍上公之禄怡髙情于幽曠玩生意于萟植向之之妖榮怪艶使人眩愕不敢仰覿者安知不化為飛埃浮土于今日樊囿之側乎然則公之為瑞也葢特秀而靡凋百挫而莫折其所存者如是則其所及者又何可以尋常尺寸而度絜之也至若富媪効闕華滋緑玉五珏聨于蔓絲此則感應之餘徵耶以表吉人之幽栖咸以為休楨専著于茲則公之徳符僅與唐之董混成并闕而共蹊哉言既客起謝曰僕誠小人不知君子之事㣲子疑将疇稽猫雀圖説客有謂余曰人之畜猫以其能斃鼠也天子大蜡八猫得與先嗇並祭詩人夸韓子之富亦曰有猫有虎葢以二物皆足以衛農畝爾猫而捕其雀其職之失乎余曰不然行露之詩有穿屋穿墉之喻雀與鼠葢同類也彼鼠也雖盜吾穡猶晝伏夜動貪而畏人雀則白日羣飛喧豗相呼啄秋田之粒莫之孰何世之人恒致察于耳目之所難及恒忽焉于耳目之所易知姦貪之人人專治之則有不得肆其惡者惡不嫉于人而人實羅其害者常漏夫羅氏之羅􅃭也子母以吾貍奴為失職也作猫雀圖說上趙平章書有談天者與旅言曰天之生大賢不數其有所靳於世乎旅曰不然天之生賢猶農夫之治穡事也地力不更休不足以茂嘉榖山川清淑之氣積之不厚不足以生大賢天至仁也寧不欲數生大賢以恵斯道顧亦有所甚難者矣天唯知其生之雖也故必有所為而後始慎生之夫唯有所為而慎生之則于若人也必拳拳焉保持衛翼雖或不幸有鉅禍劇厄而終不致有毫髪之傷君子葢于是而觀天焉我相國平章公實唯元氣之㑹篤生大賢以任斯道之重故其仁足以澤物智足以周天下之慮而勇足以正邦國之紀有人如公而謂造物者偶然生之吾不信也延祐至治間柄臣司兇公卿大夫重足而立不測輒下請室以鬯其宿忿雖睚眦之怨亦莫不甘心焉閤下嘗以中執法極論其罪至是将有所不能免者海内之士識與不識莫不為閤下危之孰謂有保持衛翼之者使履鉅禍劇厄而終不至于毛髪之傷乎旅于是益知天之生大賢其必有所為而然矣今上入定國難既鋤姦孽乃收召老成相與更張化弦迓續和氣于是起公貳外御史府尋復召拜中司遂陟近輔俾為二三大臣夙夜寅亮天工規復中統至元之治以馴致唐虞三代之盛天有所為而生公者不在兹乎不在兹乎其可不思天之所以生公與夫所以保持衛翼之意乎閤下道徳位望足以師表百僚天下事葢有不可得而巽其責也嗚呼古之人有有為之才恒忠無可為之時大賢固不數生而時則又有不可數得者此旅所以不能不厚望于閤下也旅亦嘗有意于當世者然生長東南之陬交疎援寡浮沉里閭葢四十嵗矣舊嵗得呉中便舟因乗春水至都門登隗臺賦詩物色燕市中有感慨悲歌之士可與晤語以發抒其所藴者而已矣王公貴人則不敢以草野之語告之也乃獨于閤下有不能自已者焉故謹作書以獻唯髙明不以其草野而厭薄之則幸甚矣擬中書省元日賀興聖宫表鳯厯協時朔始頒于南正鴻圖輯慶福遂介于東朝宗社奠安宫闈肅穆中賀媲徳上聖凝心太冲五色成文孰測補天之智重明繼照莫名扶日之功茂對熈辰益隆至養臣某等職叨端揆班邇内廷玉殿雲開先獻椒花之頌瑶池春永屢登桃實之年聖節表至元六年祥虹在渚啟真至之貞符麗日中天當正陽之令月河岳清潤神人翕和中賀體堯欽明用湯勇智收政柄以獨運解化弦而更張詔舉憲章皆法祖宗之忠厚澤及民物實同天地之生成兹臨震夙之期宜衍太元之筴臣某等叨恩宰輔展慶班行祚應瑶圖􅦒算願錦于億載書陳金鑑聖謨思贊于萬㡬翰林國史院元日表獻嵗發春新國家之泰運對時育物體天地之同仁縟禮誕敷綿區胥慶中賀至誠悠乆盛徳輝光廣厦論經法帝王以為治太宫藏祀格祖考于思成當昕庭元㑹之辰輯昭代隆平之福臣某等詞林地近文石班清竹簡紀年協昌期于鳯厯椒觴介夀保純嘏于鴻圖元日表國子監乾璇坤轉頒天厯之新春日照月臨煥人文於諸夏臣鄰胥慶民物咸熈中賀欽惟皇帝陛下徳洽羣生道參元化正祖宗之丕緒崇禮樂之休風魚躍鳶飛多士囿𢎞釣之造鳯儀獸舞九功宣聖治之成躬享祀以有嚴廣仁恩而在宥臣某等詠歌東學瞻望北辰蓂莢徴祥肇昌期于三始椒花致祝介景福于萬年賀册皇后表國子監寳厯在躬當乾坤之再造璿宫協徳如日月之並明凡在照臨曷勝欣忭欽惟皇帝陛下至誠無息盛徳以興為治先于修齋厚俗本乎恭儉禕衣乗重翟嘗已著于壼儀大琮比鎮圭乃申嚴于册命嗣徽音于前古衍𢎞慶于内朝臣某等承乏東膠依光北極二南風化歌闗睢正始之詩萬年室家享既醉太平之福明宗皇帝加尊號寳册破玉祝文天子仁孝追宗先皇誕揚鴻名載以寳册攻玉伊始有嚴厥躬神其鍳兹用錫靈貺至正元年大都鄉試䇿題京師天下風俗之樞機也列聖徳澤之所先被宜其一之乎中庸之効然而五方聚居習尚不純而豪侈踰僭奸詐竊發者往往有之吏有能以柱後恵文彈治者乎有能宣揚教化以表率之者乎昔之為京兆者稱趙張三王夷考其迹有善為鉤距以得事情有越法縦舍輔以經術有文武自将剛直守節有功無可紀而人安之五人者其迹不同而皆以能名今之尹大興者宜于何取法耶雋不疑黄霸孫寳之流皆知名當世不得列于五人之間何邪其所為亦有可師者邪然漢于京兆委寄之專使人人得其條教以自致其力今可使為大興者如漢之為京兆者耶然專任人而不任法則民有受其虐者矣耑任法而不任人則中材以下救過不給又何暇謀繩墨之外哉若之何任法而無拘牽之弊任人無縦恣之虞人得盡其才法得達其用使首善之地治效彰著以表儀于天下班固所謂在彼不在此者亦可得而言之乎願聞其説甯節婦傳甯節婦者故太尉魏國甯武宣公之子婦也公孟州河陽人材勇善騎射至中従淮安忠武王平江南有功朝廷以呉門為江海要衝俾以其軍鎮呉因即居之公保境輯民子孫世食其徳第三子曰居贇為樞宻院院斷事官娶通吉氏通吉氏肅慎右族總管揚州路禮之女所謂甯節婦也延祐初斷事公卒于官通吉氏方盛年子女皆㓜自京師扶柩數千里還𦵏河内通吉氏抱孤兒舍墓下三年還呉遂不復設簪珥美服于其身每痛自念曰吾為甯家婦不得事吾夫以老吾猶能使子有立女有従甯氏之祀弗墜舍是吾無所事于世矣乃身先儉約推之以及家人臧獲衆多莫不感服受事毋敢有弛肆之心自祖禰薦祭宗婣慶用至凡施于内外者俱有度矩長子九思蚤世則撫其孤而教之仲子九齡嗜學則使之入國學以業其所業諸女皆擇名族嫁之總管公與其夫人年八九十猶强健皆迎致就養篤盡孝道其所為葢世之婦人有未曉者通吉氏能之固天性之美抑本于其父母之賢哉部使者用父母言聞諸朝于是表其所居為貞節之門云史氏曰先民常言配匹福之良也甯公客死子㓜其家之存㡬何一煢嫠砥節勵行遂扶樹其已危而終存用貞白之風振衰末之俗則又不但能存甯氏而已君子于此其亦有所感夫九齡嘗従予學九思之子曰矩節孝段氏傳保定易縣魏徳義之母段氏年十六歸于魏生徳義三嵗其夫従軍伐宋攻襄樊襄樊城堅不即下朝廷調兵急魏與段訣曰親老子㓜而吾寄身矢石之下即不従汝能事吾父母使吾子成人不絶魏氏之祀乎段泣不忍答後果槥還乃哀毁執喪以死自誓治女事以養舅姑使安焉以老如其子之在也鞠遺孤使茂焉以長如其父之在也舅姑皆年踰八十以終而徳義馴行孝謹三子俱壮子又生子矣段臨歿謂徳義曰自吾受而父之託凜凜然唯恐吾力弗任以負而父吾今而後可以見而父于地下里人咸稱為節孝段氏陳旅曰先民有言妃匹福之原也魏氏親老子㓜身死行陳得禍烈矣而其父母卒安樂以夀終子孫衆多而其家日殷豈非叚氏能為魏氏之福乎三孀傳相人李柔母陳氏夫歿時年方盛誓不食他姓常自念曰吾舅姑老而哭子曷為而使之無傷其心乃日夜務女紅為養家有無不使之知舅姑曰婦吾子也吾子不死也遂皆安樂以夀終附于身附于棺者皆無有悔焉陳氏子長某次柔柔兄早世嫂王氏年廿四無子鞠前婦子如己子義如其姑王氏有女嫁未㡬亦寡義如其母里人遂稱為三孀云陳先生曰夫死不嫁人道之常無足異者後世于千百之中得一二焉于是任風化之責者表而異之以為千百人之勸而媮風不衰也三孀出于一家則千百中之所絶無者矣變風十三國獨衛共姜有自誓之詩而其言曰母也天只不諒人只共姜之母非所以為教矣然則李氏婦姑子母之美其可不稱道哉蘇御史畫像賛允矣君子維國之楨心夷體荘色澤氣清學古入仕才達徳成有峩豸冠肅肅在廷讜言嘉猷本諸遺經僉人斯讋善類以寧乃究百度以承休明羣瞻顒若威鳯景星願𢎞厥施介福永貞䟦許益之古詩序右國子博士呉正傅氏所藏金華許先生古詩十三首先生不喜矜露人罕見其辭章今寫此以遺正傳豈非以相知之深相好之篤而然歟旅嘗病夫近世有儒者詩人之分也深于講學而風雅之趣淺厚于賦詠而道徳之味薄要非其至焉者其至焉者無儒與詩人之分也先生沈潜載籍大而聖賢心學之藴細而名物度數文字句讀音義之詳靡不究極隠居終身不以自外至者易其素守計其平日之所以用其心者殆若未遑他及而此詩冲澹醒藉音節跌岩而興致髙逺乃若専乆于為詩者是豈可以向所謂儒者目之哉其庶㡬吾之所謂至焉者邪觀其詩想其為人葢亦一世之豪傑而而不見于用者邪旅學不進而志未衰欲受教于淛河之東而先生已矣三復遺墨不勝悵罔而歔欷也李惟中太常攝禮儀使畫像贊清廟顯相天光嬋嫣􅁮如卿雲奉日周旋威儀孔度雅徳式宣君子之身禮樂載焉尚和厥施以賁八埏漢方聖公小像贊聖公名儲漢方聖公宅歙之東學原于易趣極疏通公車颺言京邑擊蒙徳慧術知神明與同郊丘告徵以欺疑忠忿世之濁去而上蛡皋禽飄颻有丱者従如彼雲氣㳺乎太空落月照野臨黝故封俾爾孫子晤瞻冲風章命字子與説永嘉章命字子與學于其鄉李季和先生又從之錢唐見行省元僚泰無善公為篆子與兩大字子與求余說余謂生名字之義著于中庸諸書詳矣學季和先生又能言生歸求之子與曰吾日從先生受經不患無聞子試為我言請之數乃與之言曰嘗聞民受天地之中以生所謂命也仁義禮智者中之物也以是命我者天也以是與我者亦天也天職盡矣我獨無所事乎昔余見鄰富人以田宅財貨與羣子旦日坐堂上教之曰若有田則不飢有室屋則不露有財貨則不匱吾非一日得之以與子也旦日又教戒之余别去十數年還過其家則羣子者大半貧不自存問其存者則曰吾父所與非不厚且有也吾能保之兄弟不能保也吾父能與之不能使之有也余因念人之得于天者初無同異而終有聖賢愚不肖之異者亦若是矣夫天下之物可以與我者則强有力者皆得而奪之彼富人子或亦不學而自奪也吾仁義禮智無有封守人莫能取再拜而獻諸强有力者彼且不受吾唯懼夫物欲之内賊甚于世之為奪者矣人莫能取者自舉而棄之卒為愚不肖而不怪者也然則天與我矣我果無所事乎葢士貴乎講學學貴乎慎獨講學則明于義利之辨慎獨則致謹于其㡬焉吾之所以辨義利而謹其㡬者所以保吾有也孟子曰庶民去之君子存之生母但日天與我矣獨不見吾鄰富人之羣子乎徐仲同字說浮光徐君復初之従子曰寀静恵而好學復初屬余字之余字曰同又屬余為之說以告之余惟寀之為學也固将入官以行之也然事有不可以獨任而智不可以自用也故國家設官有寮寀焉葢欲使居官者同用其智而同任其事也夫衆力之所至則無重之不舉衆慮之所及則無隠之不周人不吾與也者吾言未公也吾與人忤者人心未孚也狹量不足以處衆偏見不足以燭理固執不足以達務天下有大同之道固吾衆人之所共趨者也同乎同乎其居官者之善物乎雖然同亦有二義有不同之同焉有以同為同者焉不同之同孔子謂和而不同者也以同為同則晏子之所以議梁丘據也易不云乎同人于野亨又不云乎出門同人旡咎寀之所以為同者宜亦進于此哉宜亦進于此哉沃哷允常字說肅慎望族之家于洛者曰沃哷氏今祕書典簿曰海夀者英敏沈毅逺大之器也嘗過于余而有請曰海夀幼嵗備宿衛未㡬而先人即世弱冠又備官使今年廿有六矣以幼孤又出入奔走無寧日故宿賓命字之禮闕如夫字以敬名也敬名所以責成人也子宜圖之余辭不獲乃與其所雅敬者謀所宜字皆謂宜字允常又皆屬余為之說以授之余惟夀之為言乆也君子之所為無非可乆之道然後可謂之夀可乆之道豈有他哉亦曰常而已矣天有常運也日月有常度也四時有常序也有常運則天之行不息有常度則日月之往來不忒有常序則四時之相代不見其究極天也日月也四時也猶用是道以為夀而況于人乎朝作而夕輟非常也始勤而終怠非常也言従而行違非常也窮守而達變非常也非常則非可乆之道矣故作而不輟勤而不怠従而勿違守而勿變循循焉孳孳焉敬以持其志和以養其徳静以寧其神勇以致其力則凡吾之所為者皆乆而弗易也夀固不在吾乎葢人夀雖命于天而在于吾者君子不謂命也命于天者有窮在于我者無窮而我之所為又足以保其在于天者是又古人介夀之道也禮祝辭云爰字孔嘉髦士攸宜宜之于嘏永受保之陸師顔字說呉興陸觀復静厚而嗜學従余游乆一日來請曰觀復長矣願先生賜之字余謂生之名其取諸易之復乎復之初九曰不逺復旡祇悔元吉孔子釋之曰顔氏之子其殆庶㡬乎有不善未嘗不知知之未嘗復行也夫自姤至剥剥極為坤則為陽矣一陽復于下斯為反善之義而復之最先者故不至于悔大善而吉也學者能省察于一念之㣲以求復夫本然之善是謂觀復顧子之所以為顔子者亦若是而已字生為師顔可乎觀復再拜受教余曰未也孔子又嘗以克已復禮告顔子矣克已復禮乾道也復之陽即乾之陽不逺復即克己復禮之復由一陽之復以至于純乾此顔子為仁事也觀復其師顔哉為蒋師父作思勉說學必思于心而勉于為二者恒相須也然非澄静不能思非堅乆不足言勉葢思以泪亂之心則所思者謬勉以狂銳之力則其勉也有時而衰矣生嘗往觀夫流泉乎其出也繹繹而有緒類乎思其奔迸于崖石窘束之間勢不可遏類乎勉至于達而為長川瀦而為大澤浩乎其往也淵乎其止也則不見有所用其力焉君子之為學不亦若是乎哉生歸當日從杜先生游武夷溪上試指流泉以吾言質之大都海子橋火徳廟疏火政行四時祭已嚴于周禮陽氣瀰六合祠豈繫乎商丘睠國都之所崇宜廟貌之有赫故必增廣舊制妥寧大神使處守者有以栖其身而禱禳者得以布其武銀甕丹甑願輦致于殊庭絳節朱游來環衛於吉土廓黍米之𤣥境結蕋珠于新宫海上之蜃閣横開橋左之星河斜轉東風解凍深囘寒谷之春南面向明永介聖皇之壽祭許中丞文代人作伊昔先正為元儒宗克紹厥家實維我公所紹伊何曰孝與忠司成于學左轄靖共矧是二者與先正同出秉憲節㰅姦摧兇方岳佐理載熈民庸及登鑾坡位望愈崇晚居中司益厲髙風讜言或違去如蜚鴻琴冊几杖丘園從容公齒雖暮顔如冬松尚需安車太行之東來朝來言以廣帝聰天不憗遺倐焉告終縉紳聚哭莫啟幽宫某追念曩嵗游于辟雍公獨恵愛牖其顓蒙乃今粗成敢昧所従顧瞻覃懐寒雲濛濛爰致泂酌以寫悲恫安雅堂集卷十三
