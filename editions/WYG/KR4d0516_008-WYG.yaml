body:
  text: 安雅堂集卷十元陳旅撰碑𤣥壇祠碑有序軒轅氏以神明制天下嘗戰蚩尤於涿鹿之野其時將兵類非常人世傳𤣥壇大神葢將也又謂大神本水金二氣之精降而為人秦時修道終南山中上帝召為神霄之官又謂漢天師煉丹龍虎山嘗請于帝命大神守丹故又𨽻天師之正一𤣥壇得賞善罰惡之柄焉大抵神變不測要不可以迹求之也杭大開元宫有祠在宫門東祠中為壇植木凝土為立像其上又為神虎其側望之儼然有生氣也至治元年十月火夜起宫西民舍遂踰宫中郡侯子公无思與主宫事真人王公壽衍亟救不克唯外門存黎明見大神屹立外門之外神虎在于河濵觀者駭愕以為夜半倉卒人自救不暇安得羣有力者舁是以出况植木入地之難遽拔也既又于燼灰中得木主帛旛與凡供神之器皆不壊先是郡人欲為轉運使築亭樹碑以紀其休聲寓亭材祠背至是亦不燬遂移用之為新祠奉大神與虎復焉四方之人聞大神能飛動炳燿其威靈益敬畏奔走祠下而弭災執盗之效益章章然不可勝道矣真人既俾余銘新宫又為余言𤣥壇祠不可不專銘也余聞古之為治者能有為于衆人智力之所不可及若豢龍御虎南正壷涿庭氏之設官祝巫占筮盟詛禬禜之有法以棰辟鬼以牡橭殺惡太隂之弓以射天地四方書日辰月嵗星之號以去天鳥何其事之出于怪也意其出入幽顯必有為之用者自絶地通天之後人不可得而知矣秦漢以來官失其守遺法徃徃存山林間世之人見有能召風雷役鬼神能為衆人智力之所不及者不指為恠則曰彼道家法也孔子不語怪葢欲以常道教人柰何世之頑民有不率教者矣或者懼神之罰有以銷其頑心而庻幾常道之歸乎然則大神固有弼教之功也通乎古今而知鬼神之情状者其亦取于余之言哉乃為之銘曰翼𤣥元御綘雲祝融既清宫大神執鞭還守門憑神之質超有物其非質者矧可射新宫成奠神宅孰敢為惡鉄絙縳𤣥虎咥以善禱之報爾福龍虎山繁禧觀碑銘有序江左之山曰龍虎者仙聖之𤣥都也太上清宫既據神氣之㑹旁為各支宫無慮百十又盡得地勢之所宜矣而善用夫地者又徃徃得遺勝於百十之餘造物者常以其不可窮者待天下也上清李君謹修嘗自念曰吾得超乎編民優游長年以業吾清浄之道者誰之力也寶儉以養生積其贏将焉用之唯益立祠疇以茂致景貺於國家庶幾周人所以賦天保之忠乎乃受地山南溪上有大園倚乎雷壇而象山仙嵒在其右左琵琶塵湖雲林諸峯又皆在乎其前津華之鐘見於草木岩姿川豔布冩几席之上殆祗靈祕之以有待也李君亟以貲得之延祐四年始治地為觀中起三清大殿旁作列真之室有二楼以逓鐘鼓之聲有三門以嚴中外之節臨溪之門榜曰溪山勝處翰林學士承㫖趙文敏公所書也門内有堂曰清輝其西有亭曰囬鷗殿後之堂曰見山堂後之堂曰依竹東軒曰嚥日西軒曰巢雲若賓館若廩庫若庖湢與凡所宜作者亦莫不當其所觀成又實之以宜稻之田焉于是李君與其徒言曰吾與若承清暾藉素雲而徜徉乎溪山竹石之間所以善體而清心也清心所以通神明而修吾職也夫豈徒為爰居以樂吾私哉嗣天師與𤣥教大宗師聞之皆表之曰繁禧之觀元統甲戌上遣使人以旛香來至元丁丑又降香并賜璽書䕶持授謹修明逺冲妙崇教法師敎門高士開山住持提㸃又命其弟子陳自誠為至正元嘉文泰法師教門高士提㸃知觀事俾嗣其道于是觀者以甲乙傳次李君屬上清外史薛君𤣥義來徵銘文以章寵光于無極焉余聞之天惟高也故無所不覆地惟厚也故無所不載一人之身萬福之基所以有敷錫之道歟李君求勝地以祝繁禧于天子其意之所及又益逺哉銘曰雷壇之陽山川開明中有𤣥圃翠水所經煌煌壽宫殖殖福庭琪林紺齒珠葩丹晶崇竹北翳列岑南屏結影西谷含光東瓊雲瀾迎户溪羽並亭濁祲遙戢冲華空凝匪怡我私穆愉鴻靈鴻靈戾止從以衆星蘭臯椒丘猗靡絳旌藏我熙事肸蠁若徴天子神聖格乎清寧介福孔多式嘉羣生韓總管墓碑江浙財賦總管韓公之子友宜以其客陳元英所為状來言曰先君子棄諸孤廿有二年墓碑未樹恐無以著先徳于將來惟執事圖之余與友直兄弟雅厚義不得辭按状公諱奕字仲山紹興蕭山人繇公父贅錢唐因家焉曽大父諱富宋進士大父諱元信沿海制置司凖備差父諱自良至元中行工部署為文綺局官累官至承直郎杭州路總管治中兼董内府織文之事大徳四年當獻功病不能騎請以子代公用是得乘驛入京詣將作院白事因言便宜若素習吏事者院官竒之引公以所來織文覲中宫啟所言便宜且謂是人才器可任事有㫖命補江浙行中書省葢欲其益練吏事而大用之公還治中公疾甚竟不起遂不復為掾既終喪養母夫人沈氏無仕進之意初治中為行工部所署時募工置諸局司雖謹程度嚴政令而撫循有恩人樂為用及佐郡時屬有㫖嵗増織綾緞五萬治中公計局工不足辦藉民間杼軸成之較官出工物雜費省緡錢數萬民又利傭直不逾月五萬綾緞成遂用為故事局工得不重困治中公殁故莫不悲思乞以其子嗣職事上未報浙西道亷訪司舉公居喪盡禮事母盡孝而持身齊家之有道也用之可以善俗行省具移中書㑹新立織染局右丞亷公因人情所安辟公莅之事立具行省葢荐公代父職誠宜中書以聞至大元年授杭州大匠副提舉明年立江浙等處財賦都總管府議簡清慎習知田賦者為是官葢掌朱清張瑄兩家之所籍沒者也公時以事赴闕中政院貴人見之喜曰此非將作院言便宜者耶即引見武宗皇帝于潡州上曰財賦府初立是非其官乎尋授承務郎為府之副總管居三年以母老屢乞閒専養不允皇慶元年轉承徳郎仍前職葢上之人不欲其去也六載之間庶務畢舉凡朱張業産之為姦人所竊匿者悉求得之金穀充牣又未嘗以是病民故中外之譽歸焉至大中有曰和都實者以奇寶售内府俾給直錢千四百萬緡胡椒十二萬觔它物稱是公曰是國之大盜也吾不敢奉命亟白監察御史留其直不予張塔布台者得給還所籍沒田十萬畆屋二千區公亦抗論以為不可廷論韙之公讜言毅色遇事奮發直節不可回由是憲司檄公治貪墨凡十數事得賍鉅萬民氣為之蘓暢延祐四年進朝列大夫江浙財賦都總管旋被召寵眷優渥明年十一月戊辰卒于官年五十公天性孝友治中公卒哀慟幾絶即祥猶不飲酒食肉語未嘗見齒事母非有急不去左右故恒不欲仕既晨出必問太夫人安否歸必設甘㫖奉太夫人飲酒二三行日以為常有疾必親治藥餌以進疾止始徐出視事閨門肅雍内外無間言宗族姻戚雖疏逺皆厚遇之門巷多車馬非名公卿則四方之賢士大夫也葢為人冲約而尚義故多樂與之者儀觀修整寡言咲讀書通大㫖餘皆淡無所好娶黄氏後公二年卒子男六人友仁友恭友忠皆早世友直平江等處財賦副提舉友諒友聞未仕女一人妻餘杭州判官楊元垣孫男十三人文疇文興文闕文闕文闕文環餘未名女八人友直等以某年十一月塟公于錢塘縣履泰鄉青芝塢􅪮定元年九月丙辰以夫人祔葢從治中公之兆也嗚呼公孝友亷明能以才詣自見于世可謂賢矣三品秩官鄉邦可謂顯矣諸子皆敦睦慎守緒業友直能官又能以文學自將諸孫皆秀芝蹈矩度可謂有後矣苐惜其未嘗膺民社之寄年僅五十不得大展布其及于人者為可恨也雖然求世之得如公者亦寡矣銘曰有朅韓公既愿且通能幹父蠱職匪是共入見宫宰見事佐闕聽者竦然曰是竒才太姒審官亦曰佐君俾蹤吏事以闕選掄侃侃别駕奄即厚夜哀號塊苫泣與血下周旋北堂滫瀡醴漿我有母養仕豈或遑孰非才彦孝最百善亷車揄揚方岳尉荐若工疇能世勞纉承總賦外府庶績用凝駔賈竒市盗國鉅利豪産入官僥倖還畀公皆抳之使不得欺治徼治貪賄亦不貲廷有清譽將啟要路豐徳儉齒舍轡弗䳱青芝之原佳城言言嗣慶考徳視此刻文毛先生碑先生毛氏諱惟謙字仲益其先衢之江山人浚遷信之永豐又遷貴溪之英潭浚又遷其邑之宜陽里曽祖諱季大父諱克賢父諱子祥皆以善稱于人先生姿爽朗而雅志冲淡束髪入龍虎山事曽貫翁師師愛其有操竒之欲試其為人而器成之先天山介龍井琵琶峰之間巉絶遼閴人迹罕至也時方薙榛穢為觀宇俾先生居焉人謂其方去父母而栖之空山將不能堪先生則欣然若所素處與烟霞相周旋浩乎其忘世也師大喜之即令衣道士服授以其道聲稱日聞于是嗣漢三十八代天師用為益揚州道正州之為老氏者皆喜而言曰是宜長我也今嗣天師又使之掌其文牘天師總道教江南有官府政治之體非清慎明敏者不足以任承賛之責先生從容酬應未嘗有所缺失而凡與之接者莫不譽其美焉泰定初奉表詣闕下𤣥教大宗師吴公復嘉重之為請于朝授冲真通妙素法師主永嘉廣福靈真宫事久之嘆曰吾出家為道士者將以繕吾性也而役役不休可乎人固有不得不勤力者吾事師如千年事親又如千年生而養殁而塟矣吾又何為乎吾旦而起則祝釐于吾君又何必熈事于其所乎乃宴休于龍虎山之舊居黜智歛才泊乎無營而時與客引酒詠詩于華竹泉石之勝不與物忤亦不流于物逍遥浮遊葢十年許人以其神情之清曠也號之為秋宇先生云仍改至元之三年六月八日晨興正衣冠翛然而逝年六十二某年八月丙辰藏蜕于貴溪縣仙源鄉之高陂山弟子劉存耕以狀來徵銘余謂先生能致勤三事而後退休以葆其所存又未嘗離世絶俗矯亢以為高所謂遊方之外而履其道之中者歟銘曰維昔至人幹道樞啟陽闔陰時厥居道不緣督人朱愚出此入彼顓竒途先生冲氣以為車夷庚安驅辭窒迂祝君事師春欲歸為父母謀甘腴師親既終于怡愉始用吾闕紓前劬岩房左右蕋笈書十載燕坐觀𤣥初太空雲氣行雙鳬陂山所窆仙之餘孫高士碑孫先生諱景真字久大信之貴溪人曽大父諱清夫大父諱樸父諱晞之乃宋廸功郎仕江東為節度司幹辦官先生豐頤廣顙碩幹晢膚居如山凝動如川融㓜時有善相者撫其項曰是兒不凡殆非人家所能留也孫氏所居曰蓧嶺距大上清正一萬壽宫十餘里束髪即學道于宫之崇禧院禮講師張公彦綱為師孔老二氏之學若所素習不待刻礪自臻𤣥微祖師都録黄公崇鼎宫生黄公復亨皆器重之世祖皇帝既平宋遣使入龍虎山聘嗣漢天師之三十六代者嗣天師入覲擇才而且賢者從行先生與焉及還有詔開道敎于江南四方之為老氏者日集龍虎敎所逆旅非所安都録公為築真元宫以館之而主以先生先生念是宫亟成非宏逺之規復改作之而増田以飯來者大徳七年有㫖授通真凝妙𢎞道法師真元宫提舉知宫事初講師公欲更卜吉土為壇畤以顓祝祠厚報本也志未伸而卒先生既盡送終之道為作崇禧觀于天冠之山殿堂門廡鐘樓藏室皆高廣如志又作祠宇以寕其師度弟子以衍其傳給良田以舒其用𤣥教大宗師以聞天子下璽書䕶持之至治二年上清宫災先生發私帑作大三門及福地之駐馬亭崇禧院之真元閣皆雄麗稱地望天慶元年歸主院事即院北為屋以居人號其堂為隱徳葢以先生雖數被寵榮而含光弗耀有古者遯世高士之遺風焉至元三年有㫖加教門高士使復主真元宫遂新宫之道紀堂其年秋于故宅旁近得地曰榆原顧而喜曰吾其遂首丘之心乎于是作榆原真館割田若干畆入焉又以田益上清宫真元宫崇禧院崇禧觀蓧嶺之崇賢館各若干畆五年五月忽感餘疾即語弟子曰死生夜旦爾不死不生無夜旦也吾將了吾之有夜旦者矣承先廸後則汝曹之事也是月八日蚤作盥潄正衣冠夷然而逝年七十有七弟子曽日省李謹修等以其年九月壬子奉遺蛻藏于榆原以臨川呉慶熈所述道屬余為碑銘先生莊重而謙冲靜黙而暢逹持己以約遇物以厚名不求聞而名日彰財不求殖而財恒足凡所作為若無意于其間而諸福之物皆不踵而自至終日燕坐一室或問之曰公靜乎則笑曰有意于靜則非静矣葢深有意于其道者居天冠最久山之左右雨暘時若五糓常熟草木葱蒨居民不知有凶荒之虞而先生又毎推其有餘以賑助之人見其出逰徃徃指之為福云嗚呼世有勞心神疲體膚窮年規規澤不足以自濡遑及其他哉不見用其智力而身與物恒相遭于泰和之囿者固盛徳之所感應亦天厚之福休祥之徵隨所至而著也使若人有位于時所及顧不益廣而最薄世故高蹈物表僅及其所能及者而正耳故君子之于若人常嘆其賦受之美而惜其不為世用而去也雖然鳯凰麒麟非以其用于世而貴之也郊藪之間有是二者必至治之時哉銘曰湛乎若無思而趣無不通漠乎若無言而教無不從休乎若無營而人惟見其成功物與我何心本自然以為宗亦造物之與謀鍾其身以善祥故居姑射則屢豐處畏壘則大穰慨若人之邈悠上榆原以相望藏衣冠于斯丘庶不望乎故鄉故贈曹州尹清河郡伯張公墓碑公諱徳字惠卿其先滄州之清池人曽大父昕昕生寓寓生祐金貞祐間南北受敵寓從保靜軍節度使司宿州為軍府吏宋師與保靜軍戰寓死之祐求父尸亂兵間藁塟宿之北麓奉母宋氏踰淮避兵我國家既翦金兵及淮甸北人與祐同踰淮者數百族謀保栅以自固而祐為衆推重與衆言曰吾軰寡弱憑孤栅以抗大軍其勢必破破則無噍類觀時事可以知天道矣徒死無益也乃率衆詣軍門降大將綽和爾郡王嘉其欵欲承制官之使統降民祐拜且謝曰所以降者非為求官來不過與衆求活耳且吾父死于兵猶寄淺土未敢以身許人郡王愈賢之降民皆以安而祐終無久留淮南之心以干戈未戢徃來曹宋間二十餘年而母亡矣至元丙子天下既定乃卜地宿西百里臨淮縣仁義鄉道住里泡河之陽改塟其父而以母祔焉又樂其邑風土之美因買田宅以居年七十九終妣穆氏二子公其長也公質直而闓通勤生而急義從父母轉徙北兵薄淮衆倉皇急舟南渡遺公岸側適族人見之亟援入舟㡬不脱于兵公由蚤嘗艱危以及長壮世故之接于心思者熟矣故于其父覊旅患難以至窀穸田園室廬之事能用其智力以佐禆之平生不仕榮進獨喜治稼事故貲産益饒然好子施里之窮乏困瘁者皆仰其恵因字之為惠卿又好以善道告人見有不力田者則諄諄然戒之曰母事浮靡為農以具衣食安之道也里中子弟皆感其言而從之或深責有過者亦愧服無恚容葢公之所為孚于人有素矣妻盛氏能以婦道相其夫子男六人思元思明思忠思恭思義思敬女二人公毎教其子曰吾家三世習法令為吏而嗣止一人汝曹當讀儒書不願復為嚮時吏也于是諸子皆業儒而旁通諸家之書思義用為荐者仕䝉古翰林院轉應奉翰林文字承務郎朝廷推恩封公歸徳府判官飛騎尉盛氏封恭人公以延祐三年三月廿一日卒于家年八十二明年恭人卒年八十一遂合塟于道住里之兆思義後知沂州追贈公奉議大夫歸徳府同知騎都尉夏邑縣子恭人夏邑縣君思敬由司徒掾以至為中書掾兵部工部兩主事積階四品復贈公朝列大夫曹州尹輕車都尉清河郡伯思元後公十五年卒二子緒國子生繼醴州學正思明早世一子訥蕭山主簿思忠亦早世三子誠䕶壽壽官奉訓大夫思忠得贈歸徳府同知騎都尉夏邑縣子思恭四子謹權亨睿思義由滑州改知汾州卒三子惟中惟一惟學思敬亦卒于官一子貞國子生公之弟輔亦有子五人孫十三人嗚呼張氏自滄州來㣲乎一縷之僅續而幾絶也乃能蔓延以至于碩茂者所履之厄雖劇所績之善亦已厚也夫為軍吏而死國事冐白刃求父尸將母他境而竟卜臨淮之塟活數千百人于必死而不利其功是皆善之大者人有一焉天猶報之况其大者之又多乎公承世積之委宜坐享其報顧益飭勵勤苦以成父志以庇頼其後人又推有餘以賑鄉黨且教勉之使皆敦本而善俗也公之為徳葢以其積之委者愈保聚而充衍之張氏之用是以為盛也庸有既乎公之心其逺矣哉思恭等以郡伯肇封與世之起于宿者皆不可不表諸墓道以彰示于無窮俾緒以狀來徵銘緒與貞皆嘗從余于成均所不得辭也乃為之銘曰張昔大姓世有顯人相時致用始業吏文河北構兵牒譜靡存挾其簡書南遷從軍宿有嘉木厄于斧斤其蘖既達長柯摩雲宿有原泉出而山堙其流既舒賁野澐澐羅曹州公紹德篤勤迺阜木本迺豊泉原詩書在堂黍稷在囷曰兹先澤裕爾後昆匪惟家謀軫其鄉鄰積善之報登于公身伉儷夀考子孫詵詵矧其子孫峨冠垂紳遂啟有邦赫奕寵恩噫宿之張自公孔殷尚濟厥美毋忘公言泡河之陽土厚且温勒銘佳城以永有聞安雅堂集卷十
