body:
  text: 安雅堂集卷十一元陳旅撰碑碣志銘周提舉善政碣國家統一六合定都于燕以京師天下之本而積貯天下之大命也乃衆建鉅廩嵗轉東南粟數百萬石以實之匪特賙賜稍食之所需四方或儉饑有所不虞率恃此以為安也至順元年秋中書省以在京十有八倉嵗乆屋壞楝且撓懼無以完所藏檄有司趣治之又簡官僚之才且亷者分督之倉曰相因曰既積者則陸運提舉周君信臣所督治者也工之長吕成等來言曰凡官府有所興造給錢大農未嘗少也而民毎告病焉董其役者不勝其任耳吾屬所繕兩倉為屋百又十六間用工徒凡二百餘人始事至訖功凡廿又六月非細役也提舉君能使我樂于趨事不自知其勞攻作又善備由能持己亷莅事公遇物恕自旦逹暮與吾屬闖闖于土木瓦石之間未嘗見其少懈既省費于官又能俾執役者皆充然得以盡其力也至于廪人與其胥徒亦罔不稱美曰何其不少擾我而集事之易也願為文紀之余聞提舉昔主昌平簿有政事昌平京畿劇縣也車駕嵗徃來供億不暇給君能以餘力倡其民作三皇廟甚宏麗今中書參議張公嘗為記集賢學士魏公又為著恵政碑君可謂有治劇之才使人之惠矣是役非若為縣之日得以施字人之政亦能使人不忘若此君字漢卿齊士族也乃為詩與成等刻之詩曰惟聖建國居重馭輕太倉待儲兆億稱京厯嵗滋乆土敗木腐實民之膏以畀風雨相臣曰嘻亟葺治之遴官之良往慎乃司惟齊周氏貞慤愷易不劌為亷不鑿為智鳩工盈廷示以凖程曰不汝苛各究爾能梁楹榱桷塗暨瓦甓構覆補締具出心畫東方将明伐鼓逢逢董我不夙曷臻厥功曰旦夕矣君謂汝止我勞不知君則瘁只公帑之靡我持以歸斯倉之成邦實有之君則何獲所獲者徳刻詩堅珉永世無射重建杭州開元宫碑天下老氏之宫曰開元者始唐𤣥宗時所作也乾符戊戌杭宫災後五十九年錢氏之王呉越者復作之宋景徳中改為景徳觀嘉定辛酉寧宗以其潜邸復為開元宫宫在祕書省左紹興辛夘災又重作之皇元既有江南即祕書省為行中書省至元廿八年省與宫俱燬因兼宫地作大新省時董君徳時主開元省助金購故宋理宗女端孝公主弟為宫今𢎞文輔道粹徳真人王公夀衍實有勞焉既而陳君天錫繼董君領宫事大徳八年真人以宣命繼陳君賜印視五品于是益治其門垣壇殿水石木竹之屬無不善天子遣使即其宫賜號靈妙真常崇教真人皇慶二年秋召見明年改今號又賜銀印視二品使盡獲杭之諸宫觀仍治其宫翰林學士虞公集時為國子博士著之碑甚詳至治元年都有不謹于火而宫及焉杭人之老者過而嘆焉昔吾嘗見造斯室矣以帝子攸降也大農輸財五工呈能宫臣日來視其苦良故制作嚴壮精好吾老矣能更見乎真人聞之曰自有唐至我朝吾宫羅災故屢矣前日之巍巍乎在吾目者曷従而來哉制于數者物也數不能制者人之心也心存則室存先是宫右皆聨枕民舍㸑煬交壁下真人首以貲斥垣外地空之以周防乃諗于衆曰今可營吾室矣孰能語吾之同心者乎于是前嘉興路總管王君惟一願作前殿崇徳州判官濮君允中願作宫門皆攻石凝土為厚址載大木明年殿成塗以丹砂曾青雜黄金白黑之物以為文章象天神帝仙人居之其年門亦成象二大神守之真人又為屋若干楹祠在門側者曰祠山曰𤣥壇在前殿北者曰明離殿又北曰道紀堂又北曰方丈丞相托歡公題其榜門東西為長廡在西廡者曰齋堂在東廡者曰真宫祠登仙祠𤣥武殿三官殿其栖賢者曰僚宇在東西廡間者曰庖湢曰廩庫在東廡東曲池疏館之在後圃者則仍其舊而加完焉杭人來觀茲室之成也則又曰吾昔所見者貴人第宅矣今規制始稱神明居神明其将永妥于斯乎真人既落成新宫乃以上所賜寳冠金衣及平生所蓄圖書琴劒之類悉簿送官藏以傳後人元統乙亥有㫖賜額曰大開元宫俾主是宫者以甲乙傳次時余為江浙校官真人使薛君𤣥義徴文紀諸石昔我世祖皇帝神武不殺既平宋思休寧天下乃登進為老氏者以清静無為之道風乎臣民時則有若上卿大宗師張公能賛神化于萬物之表真人亦與其師晉王文學陳君義尚今特進呉公全節従上卿侍祠尚方蒙被簡眷日見上卿賛天子事益熟真人道日益茂列聖洊錫寵數使還治老子教于宋之故都夫豈無其故哉真人髙朗夷曠爽氣生眉目間而能履謙用虚與物為春故王公名人多與㳺四方士往來皆願見既退稱道無異言然亦時時屏居餘不溪上是宫之作若無用其力焉余讀舊碑宫凡屢成皆國家為之也今未嘗取秋毫于上役一民于下而亟成又甚美何哉以徳致者其物盈無為而為者其功盛真人亦若是而已銘詩曰真人大作開元宫斬木邃谷來蔽江命龜置􅈏辰孔臧樹屋吉土祠天宗重檐膠葛儀穹窿日月出入牖户中大靈何樂開丹望老君上邀該以降仙姝翼輦従豐隆翳以赤鳯襲青龍立神執兵門兩傍祝融壇宇承中央共驅畢方歸海東曰惟新宫帝所悰璇淵迴曲蓬萊通珠樹含影光玲瓏宫成享帝朝鼔鐘岳宗川后罔不恭真人稽首封緑章天子萬夀民樂康江山縣尹劉彦章墓碣有序衢之開化有能仁其鄉者曰劉彦章而今亡矣鄉貢進士魯貞狀其行曰彦章㓜時即磊落有大人志不與羣童嬉能讀書歌詩卓然自樹于世獨山民夏仍二與其衆用鉦鼔刀槊為冦致官軍不能收彦章年十九以計誘賊入隘賊窮就縛以功授處州路縉雲縣仙都鄉巡檢盜不敢入其境将半載忽嘆曰親老奈何縻薄宦于外郡歸治田園以養父父心懽焉父歿居喪盡禮除喪淛東宣閫辟為従事居數月又嘆曰俯仰奔走非吾事也遂棄去不更仕恒畜米當無米時則賤其直以糶人及秋穫乃止不足則糴之他邑雖貴直入之而恒以賤直出之也人不知有凶焉户役不均至有破其家者則集其人約一户出直緍錢擇愿而才者掌之以充役錢盡復共益之人不知有户役之擾焉華步溪水深惡渡者遇風卒起輒覆溺則為浮橋以濟之仍出田百畝積其入以補壞有忿争不平者詣彦章求平則以道理譬之或畏服去往往相戒勿為非以為寧受責有司不願為劉公所譏孔步郵亭去彦章所居僅五里不欲敝陋勸民為更造之宏廊清謐部使者過而宿焉有說其義而願見者則謝曰使者有公事業山野人不敢見用是名益重持身清謹雖獨坐終日冠衣必正無惰容閨門之内肅如也祀先如前期齋飭牲粢果蔬必備必嘉祭之夕必致嚴以終事朔望日必拜祖父墓下不以風雨止宅傍闢林亭以娛客飲食常必俱一日無客則弗樂又築書塾名師以教子孫若鄭原善程琚張宗元皆嘗居者貞亦時往來讀書其中後原善登第因榜塾曰聚魁宗元亦登第琚與貞皆領鄉薦塾有書萬餘卷客來取書共講討或相與賦詩銜杯水樹間意度舒廣而未嘗自軼于禮法之外與人厚雖後生孺子莫不接之以敬人有急周之若不及見人為善若出諸已不善必戒飭之彦章名文瑞祖淳宋迪功郎父一登内附後同知建寧路總管府事母魯氏生彦章時有瑞蓮産池其父異之因名之曰文瑞彦章則其字也以天厯二年正月廿一日卒年六十一至順二年二月甲申𦵏其里之東皋妻魯氏先卒子男四人拱臣忠顯校尉安慶翼上百户昇承直郎泉州路南安縣尹鼎集慶路東陽州教授謙益某官女適齊伯嗣孫男六人演濤潛洪海瀾孫女四人彦章以昇為京官時推恩封従仕郎衢州路江山縣尹妻魯氏封宜人至元又丙子之八月鼎來虎林以貞状徵碣銘陳旅曰自井田壞先王之政勢有所不得行者天下于是有窮民焉于是下之人得以其有餘者仁其鄉焉是故君子之所深慨者也然而願治之主既病夫井田之不可以遽復則猶喜其民之能相及以庶㡬先王之仁風在焉嗚呼若彦章者而今亡矣銘曰力足以及其鄉志足以施于四方志既不得施而又以力之能及者而深藏東皋之阡卜𦵏允臧毋壊我松梓邦人之望故陳夫人張氏墓誌銘毘陵陳文照文杰使人言于陳旅曰文杰在京師于子尋宗盟矣備官錢唐又益與子親也今吾母死𦵏有日子其忍不銘之乎我先君子雅約不嗜榮進先妣之與為伉儷也葢咸備隠徳焉先君子嘗曰仕可以及物而不可必得幸而得之又未必得行吾志可以及物而又必得行吾志者唯醫乎乃究心黄帝岐伯之書居良藥以去人疾以疾來告即裹藥徃不憚大寒暑雨風見病不能具糜粥者歸必餉以善米曰是亦藥也凡是美徳先妣實助成之以為寧節于己而舒于所當用也故雖盛年未嘗畜華靡之服兒女娶嫁一本于儉若嵗時祠祭待族婣賔客與賑人于急危者則無所靳至質簪珥不令先君子知雖甚慈其子而教之則嚴故致禮為所従學者亦未嘗不厚也先君子暮年得痺疾躬治藥餌周旋奉持經嵗忘其勞既又執喪三年每哭臨必慟朝夕進膳拂几席如平生至元中朝廷用兵江南先君子有兄姊妹三人俱虜於兵既得歸先妣喜曰吾不及事舅姑是不足施吾勤乎遇之如所不及事者當宋亡時常州以孤城死守外氏之族盡死城下先妣嵗以城陷日為忌泣祭父母于棟氏之别室且囑二子曰此固非汝家所宜祀我死後改之至元後之丁丑八月十五日卒年八十又八于是先君子卒廿有五年矣今年十一月六日奉先妣合𦵏于晉陵姚墅之兆子其忍不銘之乎旅得其言而嘆曰嗟乎毘陵故忠孝之國也其人無智愚寧一日同死不忍負其所事以生何其所俗之仁也觀夫人之克盡婦道以事君子者是豈天下之細故哉至于嵗以城陷日泣祭父母且囑二子于其死後改之又何以言之悲而有禮也然吾聞子程子嘗述其母之言曰今日百五為我祀父母子程子禮師也固亦祀外大父母况夫人之族盡死所事而無後乎嗟乎夫人雖死其所祀者宜毋亟改之也夫人張氏諱某父諱某母裴氏夫諱某子男二人文照葢業其父之必得行其志者文杰将仕郎兩浙都轉鹽運使司知事女二人淑賢淑清鄭天錫鄒通徳其壻也淑清能刲股以療其母孫男二人某某文杰嘗謂旅曰我滿秩後當得七品以推恩于父母今秩未滿而其母不待吾如造物者何哉銘曰張有孝女陳有敬婦于夫能妻于子能母其善之報亦既眉夀惟封爵嗇于其生固所以大顯融于爵後楊國材墓誌銘𢎞農楊氏自東漢太尉震以來代有聞人著于閩之浦城者曰文公億文公之後有家于嘉興之澉浦者則以材顯于世者矣君諱瑛字國材曾祖考諱春故宋武經大夫國朝贈中憲大夫松江知府上騎都尉追封𢎞農郡伯祖考諱發故宋右武大夫利州刺史殿前司選鋒軍統制官樞宻院副都統至元内附改授明威将軍福建安撫使領浙東西市舶總司事贈懐逺大将軍池州路總管輕車都尉追封𢎞農郡侯考諱梓嘉議大夫闕州路總管致仕贈兩浙都轉運鹽使上輕車都尉追封𢎞農郡侯諡康恵妣陸氏封𢎞農郡夫人初陸氏有子而殤次室訾氏生國材為長子陸夫人既無子撫之如己出而國材天性孝友又器識英敏為兒童儼若成人康恵公甚愛之既長頗涉獵經史又習通國字語言慨然有用世之志遂如京師以著見其藴抱公卿貴人多奇其才大徳中大臣以康恵公有勞于國請官其子以勸忠也上可其奏授敦武校尉贑州路同知寧都州事能以謹飭自持又明于燭物上官咸信任同列不敢以年少易之聲稱日聞俄得疾卒于官大徳癸夘五月廿三日也年二十一嫓周氏生子元坦周氏携孤兒扶柩歸元坦方晬康恵公與陸夫人哀不自堪屬訾氏善䕶之曰吾子蚤世使是孫有成吾子為不死也泰定丁夘冬康恵公薨元坦年二十五矣乃服斬衰従諸叔父治喪事于是陸夫人歿已七載而訾氏亦先九年歿康恵公與陸夫人既合𦵏于徳政鄉泊艫山之原至順壬申六月二十日又𦵏訾氏與寧都君于康恵公之兆元坦孤苦之餘早夜以思兢兢焉唯恐墜先緒也至元再元之四年以祖䕃授従仕郎饒州路餘干州判官乃以康恵公厯官行事之槩告于朝得加美爵令諡又謁當代名人著神道碑銘以為是足以賁顯幽而庶㡬為人後者之道也既又痛其父有志樹立而享年不永将冺焉無聞于世遂以状來徵其墓石之銘嗚呼國材負英妙之器乍試而遽折君子葢深惜之然有子如元坦能以其父所不及為者而力為之況仕途方開其父之志又将無有不得伸者傳曰國人稱願曰幸哉有子國材雖死有子矣元坦娶江浙財賦總管韓公奕之女孫男文錫女二人銘曰𢎞農之楊厥支四延有蔚其興江海之間康恵公子鳯雛翩翩欲乗靈風奮翮以騫胡豐其才而嗇其年寧都倅車夷庚中邅有子在褓于今能官其父不亡有永其傳故嵊縣尹林君墓誌銘君林氏諱起龍字竹友其先光州人後居海州今淮安之海寧州也宋同知樞宻院事贈開府儀同三司諱聞翁于君為五世祖曾大父諱行中太中大夫知澧州兼荆湖路提㸃刑獄公事大父諱松奉議郎通判海州父諱珪通奉大夫湖南安撫使知潭州母趙氏君生有奇才雅志事功年廿應武舉廷試第三授成忠郎夀州下蔡縣令以親老歸養海州安撫司因表為計議官時事已不可為矣退而教授于其里至元内附大臣有知君者辟為淮安路海陵縣尹尋奏授承事郎以海陵尹行紹興路山陰縣丞厯山陽縣尹轉承務郎温州路瑞安縣尹屬陞縣為州去為􅄔州路浦江縣尹終更為撫州路臨川縣尹未行卒于臨川官舍大徳二年五月廿六日也年六十三妻會稽張氏封恭人子男一人炳女一人適劉字之孫男六宗仁宗義宗禮宗智宗信宗常女一人曾孫男一人君歿時炳才十三君與恭人言曰吾死于此去海州逺矣海州又無恒産吾嘗官山陰有遺愛在民其山川美風俗厚又而族所在其𦵏我于此乎明年十一月三日𦵏君山陰清風鄉鳴鳯山之原君天性忠厚而宅心夷曠居官以亷慎自持所至必先治學校興教事凡舊時苛急之政悉為民申除之訟必立决以謂一囚在獄其家皆無安者令民之父母也獨能安于家乎决囚之時每痛其得罪必教戒而後罪之故民皆感服相告語曰母以事撓吾令也部使者過其境則曰林令無寃民多不視其牘而去每受代父老流涕遮不得行往往立石以紀其善績自海陵之山陰丞将渡江見二人匍匐啼沙中潮且至亟呼問之則曰我台州人虜于兵以病不能行棄我于此今就死耳君即挈入舟既渡江又為之具醫藥飲食衣服已又資之使還其鄉其一人願留則為之娶妻保之終其身山陰前丞夫婦皆死而二女㓜養乏鬻之于縣卒以喪去君至聞而悲之曰吾代其父為丞丞女非吾女乎還卒錢收二女與張恭人鞠之既長皆為具装配佳士人不知為前丞女也仕宦廿餘年俸禄之入輒分與朋友鄰里之貧者家無宿儲而言不及利或勸之置田宅則曰吾子成人當自有之平居必正衣冠端坐與賢士大夫講道論藝亹亹不倦頗愛竹時為刻寫之以致其幽趣云恭人有淑徳以恭儉相其夫尤䔍于教子大徳五年五月三日卒年五十四其年十月廿日合𦵏鳯鳴之兆炳沈慤而敏練以廕入官有能聲今為承事建徳路分水縣尹始得請封其母為恭人于是使人以状來言曰吾父母之𦵏已四十年矣墓碣未勒葢有待于今日子其為我銘之嗚呼承務君歿未乆而恭人又歿炳孑然畸孤無所庇藉乃今卓然有成亦若其父有民社之寄而田園屋室又足以祀祖宗遺子孫矣種之于前則穫之于後觀林氏之世為善者其亦有所恃哉乃為之銘曰政足以及物則位不必崇徳足以裕後則禄不必豐豈無令圖惟邑之為曰近民易施遑恤我私稽山之陰皆君所治魂兮歸來邑人之思鳯鳴髙岡其原允臧君子攸藏世世其蕃昌故魯郡夫人趙氏墓誌銘中書參知政事安陽許公有壬之夫人趙氏諱鸞字善應征行大元帥贈開府儀同三司封秦國公諡忠宣諱安扎爾之曾孫女蒙古漢軍元帥贈太尉銀青榮禄大夫封梁國公諡忠憲諱哈濟之孫女奎章閣大學士翰林學士承㫖銀青榮䘵大夫知制誥兼修國史中書平章政事封魯國公諱世延之女母劉氏封益國魯國夫人魯公本永古特人繇公業儒始氏趙氏外祖氏也夫人朗恵而厚静㓜時古文歌詩入耳輒能記七嵗倍誦周易書屬對九嵗使専學女事則論語孟子小學書皆成誦矣魯公之平章蜀省也姦臣以公居中書時嘗論其罪至是以詔逮公繫請室夫人年十三即却葷肉向北斗拜禱凡三年旦夕哭泣至翳其兩目姦臣死魯公難解目遂明如初魯公文學政事重海内為國元老而女又賢明選壻之稱難其人初參政以進士廷對魯公參預中書為讀卷官其對在第三等謂同列曰此人言磊落可行力争之寘第二等世以公為知人及參政為兩淮轉運使喪偶旦期值魯公還金陵别業因請婚于是夫人歸焉前趙夫人有子曰燕山才八嵗女才三嵗撫育如己出燕山㓜讀書親教之婢嘗誣兒竊幣置不問察之逾年得幣婢篋中以語參政參政曰何言之不早也曰恐公􅏥怖兒吾知其妄故不言也夫人及事始魯郡髙夫人未㡬而姑卒終喪語及必流涕謂不得盡婦職也魯公以其能誦易嘗教之筮自廣陵如鄂未至金陵三十里聞魯公與劉夫人皆來筮得觀之益曰納甲法乾宫金用土為父母陽土伏而不出其飛來者陰土也切身且動吾母其獨來乎已而果然至鄂聞城中火且及所居參政以為憂筮得坎其占為傷財夫人曰此則不必以納甲論當冬占火而得坎火能神乎火果止其識類非師傳方册所有者諸陰陽家書皆能通之魯公嘗言吾教之一其自得葢六七云能琴居五年㕘政不知偶移琴自恬夫人始一鼓乃作十餘曲又善筆札皆不自表襮生長将相家而服食約素遇親舊不擇貴賤一巽抑若寒門女其善行葢有不可殫言者初封髙陽郡夫人後封魯郡夫人至正元年正月廿一日卒于京師年三十四生二女一子皆不育發引之日天子賜賻中統鈔萬五千貫公卿大夫士咸送之郭外是年四月甲申𦵏安陽官原從舅姑之兆㕘政以旅為魯公門生使為銘将以納諸幽旅義不得辭乃為之銘曰夫人之生也為魯公女為許公婦則天雖嗇其夀而于生也厚矣王季楚墓誌銘王仲淮字季楚越之諸暨人浙江省檢校止善翁季楚父也母劉氏延祐甲寅生揚州翁有三丈夫子出以季從初余在京師數候翁見季楚静重而愷敏應賔客言動迪矩乃翁檢校行中書余亦還錢唐日益相與益見季楚向學文采可觀也至正元年翁又入京止季楚毋従固請從則來又與俱六月忽得疾易數醫不愈懼以危憂父强自支若非危者且曰兒無苦大人母憂兒也九月廿一日竟卒于京城東之寓舍季楚王氏佳子弟也聞其死者輒悼惜況其父乎扶携以來而忍見其客死于此乎季楚以父老行逺請従勿舍乃不幸以死舍去其心則亦有無窮之悲嗚呼孰知夫尸死生者之甚忍也明年某月日歸𦵏諸暨某山之原翁先徴銘曰庶其有以􅇺我季楚有子男二人某八嵗某一嵗女一人遼陽省嘗授季楚大寧路儒學正云銘曰延陵季子𦵏其子于贏愽之間孰若與之俱來而與之俱還者乎番陽周先生墓誌銘嗚呼三綱六紀人道之大端也斁其一則其餘者盡斁矣夫師六紀之一也師道不立則人将貿貿焉無以昭帝衷迪民則也人綱人紀不由是而盡斁乎葢嘗攷諸經矣兄弟之仇不反兵師長之仇眡兄弟師不幸而有仇則不可以弗報也聖人以人有三事如一之義定為三年心喪之制則又欲報之其所從學者同于君父不眡兄弟而已也嗚呼人綱人紀之盡斁者豈細故哉昔宋氏之将亡也列城之守視其君若弁髦者十八九于斯時也畨陽有周先生能奮然為其師復其仇余安得不重有所感焉先生之子暾泣為余道其事請書其墓石乃徴事状而述之先生諱樸字吉甫天資沈毅美鬚髯夙有大志而荘慎長厚人不見其有喜愠之色初従進士黄君應博學去又従進士張君來學張君奇其才處之家塾使教其子每謂人曰吉甫非凡士先生以其知己事之不去時盜起江湖間州将以張君知兵使提督州兵討諸盜有張君家僮率衆掠邑里将收之而賊先發張遂遇害先生走告州将曰提督為家奴所殺諸子皆㓜吾當為師復讐在禮報仇而不書于士則有罪矣不敢不告也州将義之授以兵兵寡而賊衆議者勸募兵先生曰我募而衆彼又益衆矣不若出其不意亟擊之即擣賊所賊窮以金擲地兵争取金賊脱去先生立斬數人以狥且盡出家貲示賞慷慨流涕誓不與賊俱生衆感激怒呼咸願致死攻一寨破之餘寨皆棄走乗勝追撃士氣百倍自朝至晡斬首數千生擒奴及其妻子斬之俎其心肺為文祭張君時境内賊栅亡慮數十至是悉平天兵至饒州州将死之衆皆勸先生以兵降太守可得也先生曰為吾師復仇而已他豈所望哉即遣所部散去隠居不復言功名唯以詩書教子弟與人言未嘗及前勞有退靖之風娶李氏子男三人暾明旰女二人婿程益徐璋孫男二人文虎文熊初先生遣暾明㳺太學暾獻賦天子未用而母歿明以國子伴讀為嘉興教授先生就養嘉興嵗餘即歸命暾治𦵏地邑之永福里金潭山之原訖事即沐浴别親友索厯擇日端坐而卒泰定元年八月庚子也年八十明年十月己巳窆焉暾有孝行文學事父廿年不出既免喪重游上庠余嘗為賦金潭山水與暾營築之勤使刻潭上之石志墓之文則惟詳述先生大節為天下紀綱計也乃為之銘曰嗚呼使其子戴仁抱義而以儒起家孰謂不由其父能盡道于所従學者耶蒋縣尹墓碣銘至元再元之三月甲午諸暨州判官蒋葵致辭使來諗于旅曰昔吾父之棄諸孤也葵以非才獲備官使寓于杭治命以時艱權殯居之且吾父沈重寡嘿協仁處義期大用而不果以卒而墓碑未立葢有待也今三十年始用例贈吾父従仕郎杭州路臨安縣尹吾母追封宜人葵祇奉命書告于墓下願求文銘勒諸貞石以昭先徳而侈上恩旅不得辭按吳縣尹陳恕可状序而銘之曰公諱庚字西叟其先成都人曾祖源徙家息州祖誠考椿皆樹徳弗耀妣吳氏公㓜穎悟讀書通達時宜及長敦信義重然諾嚴于律己事親謹謹致孝事兄盡其恭撫兄子如己子延師訓誨必務成學其施于家教于鄉人以為則性倜儻遇人之急周之惟恐後寒與衣飢推食死備衾槥有逋不能償者代與之償未嘗有倦天雨雪袖金巡行窮閭間視無炊烟者投之不告以姓名鄉隣有争者従而質曲直不告于官公為剖析義利往往心服其居鄉如此晚别號無想居士至元中諸暨君以儒厯鹺司掾調州府幕官百廢具舉刑清訟簡受知上官稱曰良吏遂用資格序陞諸塈就致其政皆公之教也實宜人相之宜人姓王氏同邑宦族諱妙静謹重修整處已待人治家甚嚴足以閫範公卒于大徳八年七月初二日年八十有一以是年十二月十九日𦵏錢塘縣履泰鄉佛牙塢口之原遵治命也宜人先于至元二十五年九月初七日卒年六十有一至是合𦵏焉子男三人長莘次莩皆卒次即葵従仕郎紹興路諸暨州判官致仕女一人亦卒孫男三人曰寳蚤世曰宏廕補商税官曰完由儒為杭路吏曾孫男一人士權方業儒状稱臨安公雖老于山林而貤恩所及在于身後一門之内死哀生榮可謂無恨旅觀臨安公事親慈㓜施及鄉閭恩固周矣諸暨君又能成其志而享其報曷可使無一言以慰于九泉乎故系之以銘銘曰蒋以國姓世多顯人惟臨安公行修于身由家而里所施則惇配有淑徳嫓于名門生爾材彦好學而仁惟我元使宣化有民巾車既懸徜徉湖濵大廷立制恩及先臣龍光逺施寵耀無垠履泰之鄉合附權窀墓木已拱爰表貞珉貽厥孫謨奕世永存安雅堂集卷十一
