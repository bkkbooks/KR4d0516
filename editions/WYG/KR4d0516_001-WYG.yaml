body:
  text: 安雅堂集卷一元陳旅撰賦瓊芽賦欒陽之野多芍藥人掇其芽以為蔬茹雄武邢遵道始治之以代茗飲清腴甘芳能輔氣導血非茗飲所能及也至治中有㫖命如法以進天子飲而嘉之於是乎有瓊芽之名夫芍藥之為物以花艷取重於流俗至用為藥餌為烹胹之滋皆不足以盡芍藥之妙自著本草以來至今世始得因遵道以所藴者見知天子何其遇之晚也余惟物之不遇於世者多矣固有一無所遇而竟已者而不欲以他伎自衒至晚始一遇者亦可悲也余年四十又一始為國子助教天厯二年夏扈從至上京因過邢生飲瓊芽而生徵余賦其辭曰繄神皋之深迤兮余嘗䇿馬而孤征朱光熇陰雨復暘兮瓊芽怒抽寖滿乎郊坰彼婦子之踵踵兮持頃筐以取盈蓋淹之以為葅兮復芼之以為羮交野茹以雜進兮至溷辱於腐腥既不得吐層花以當春兮又不為雅劑以上下乎參苓懿邢生之嗜奇兮顓與世而相違户腰艾其總總兮則紉蘭而佩之閔靈苗之純媺兮曾不得鬯其所施乃登廣原涉芳澨披翳卉擷珍裁盛以文竹之筥屑以緑石之磑瀹之以檻泉燥之以夫遂廣延紺霜遜其色丹丘寶露愧其液諸柘巴且甘斯埓也留夷軒于芬斯奪也乃若溽霤既收涼吹初作鸞旂罷獵張宴廣漠舞魚龍於鈞天厭牛羊於珠澤亟命進乎瓊芽俾得聮于玉食當是時也金沙紫筍龍安騎火乳窟仙掌蒙頂麥顆皆於邑以無色甘退列于下佐夫何一幽人兮擥孤芳以徘徊撫年歳之既晏兮恐繁霜其崔嵬念寵榮之所在兮競膏車以先馳或以近而易與兮或以逺而不見推或握瑜以來毁兮或羣薦而非瓌以媚世者之誠可恥兮則寧抱吾素而委蛇味經堂賦國子祭酒南陽富珠哩先生記味經堂以教其子而屬余賦之其辭曰人文疇宣昉庖犧兮犧曷為庖物之頤兮先精斡流有不可象索而聲窺兮神皇示人以至味匪顓火于釜鼒兮疇豐吾經味五而和六兮淳毋淳熬雜然前陳兔薧之備滫瀡之沃兮鼎俎不薦在韋竹兮匕挾不運載吾腹兮然而骨肉之滋匪酸甘也氣脈之息匪苦鹹也味於舌者羣所餤也味於心者吾攸屬厭也緬長松之丸丸兮維禳之皋春雲蓊其承宇兮維書之庖宇有令子兮靜且勿敖人方噬胏兮子之澤也以膏人方歠漿兮子之醇也以醪有畜之殷有擇之精兮子於食飲也恒取足而靡勞若夫太羮在豋𤣥酒在匏則吾將從先生求以遂吾染指之饕也辭孝友堂辭孫伯剛作新堂奉母而與羣弟居之母亡讓堂與弟而還居於故室新堂兮言言夙奉母兮周旋我稱觥兮介眉壽弟從兄兮執豆與籩我長兮出仕母居此兮視幼子子幼兮母憐汝居此兮以慰吾亡母我雖即兮故居時撫汝兮來胥我所思兮先人保令德兮其永無渝題慶元大瀛海道院圖櫂余舟兮漭瀁迎東暾兮水上從子英兮文魚導鳴鼓兮奇相惚何恍兮扶桑公欲往從之兮海生風弭余旌兮靈越壇紫貝兮朱宫朱宫兮夕雨皇剡剡兮來下鼇之勝乎瀛洲兮靈告余以兹土滄溟滈滈兮𤣥宇周心無所不極兮而道不可以逺求噏瑶津兮咀石菌即余所能至兮聊長年以夷猶清華堂為吳興馬伯誠作宛迤兮流水瓏玲兮茂木日杲杲兮照野烟霏霏兮生谷山中人兮桂為梁渚上下兮居中央臨素湍兮濯溉擥瓊英兮徜徉有子兮洵美作文章兮獻天子承寵光兮遄歸涉兩渚兮采荷以為衣烹魚兮酌酒登髙堂兮介眉壽操題泣麟圖魯哀公十有四年春西狩獲麟公羊子曰孰狩之薪采者也孔子曰孰為來哉孰為來哉反袂拭面涕沾袍余覽圖而有感焉乃援琴而鼓其辭曰有􅍪而角角則戴肉時無明王不若靈囿之麀鹿魯之野闃無人彼采薪者而遇夫麒麟澤有兕山有虎馮陵食人而使麟也獲于西野五言絶句題萱草圖朱萱吐晴日上有蝴蝶雙感此芳意多離憂轉難忘秋荷圖持衣寄所思欲寄不得逺水國風露涼徘徊九秋晚題玉簮花圖縣圃種石子幽莛茁瓊肪受以芙蓉冠緑髮風露香題陳氏瀟湘八景圖軒后不張樂白月照野水泠泠水影中瑤瑟泣湘鬼西崦生夕霏歸僧度林巘但覺山路長不覺鐘聲逺百貨集亥市莫猺偏買鹽山日出未髙翠雨濕酒帘倦翮久欲下涼風起湖北官客各挾弓莫近白沙驛落日楚江深倒景在髙樹曬網茅屋頭分魚石梁步南浦草仍碧髙樓日易斜歸帆傍水廟簫鼔下神鴉江氣行雲暮忽失巴陵樹一夕洞庭波都向篷上注寒雲不成雨暝色凝江楓巫峽梨花夢飄浮過郢中題子昂畫汀洲木葉下斜日倚湘娥我欲采芳草洞庭秋水多題倪氏雨竹落日楚江深鷓鴣啼逺林相思不可見池上瀉春陰題畫竹扇子江上竹枝歌為君顰兩蛾秋風團扇底零落黛痕多題畫蘭二首楚畹春露濃幽芳發瓊莖寧同薺麥秀不與蕭艾生九畹光風轉重巖墜露香紫宫祠太乙瑶席薦瓊芳題脱靴返棹圖牟存有為姑孰守日作此圖未幾為董宗臣所讒而去威鳳翔寥廓妖蟇窟廣寒翻令趙飛燕無處倚闌干九日姑孰守千古涪陵翁髙人又返櫂江國夕陽中題畫蘭竹美人隔澧浦日暮倚幽篁繁霜忽已隕為我紉秋芳題秋林烟寺圖秋氣滿林壑野樹集汀洲有客過山寺聽猿卧石樓七言絶句題虞先生詞後憶昔奎章學士家夜吹瓊琯泛春霞先生歸卧江南雨誰為掀簾看杏花題金人射獵圖肅慎川原盡海隅秋風梟騎日馳驅空聞陳國銘金櫝竟向梁園用石砮題班婕妤題扇圖層城柘館重徘徊坐見瑤堦長緑苔紈扇秋來定無用君王方築避風臺題古木幽篁圖蕭蕭木葉落欲盡渺渺洞庭生白波虞舜不還秋事晚幽篁斜日倚湘娥題柯丹丘畫奎章博士丹丘子家住江南落木洲種得琅玕長百尺看渠簷外拂髙秋題巨然雙松平逺圖溪上碧雲隨雨散山前白水與天長道人何處臨流久斜日雙松野岸涼寄題囘鷗亭白蘋風暖羽衣輕溪上翺翔野水生自是道心忘物我却憐沙鳥未忘情題人馬圖少年僕圉恃恩私天廏名駒得試騎莫向昇平飄赤汗五花雲暖浴春池題畫梅處士橋邊古岸隈梅花偏向小園開衝寒有客尋春去移得晴牕雪影來題雨竹江上鷓鴣留客住黄陵廟下泊船時一林春雨垂垂緑消得晴風爛漫吹盱江老人慶壽盱上老人年七十麻姑洞口看山嬉紅泉㶁㶁鳴花塢釀作春霞滿酒巵題畫圖春山雲氣不成雨屋後青來是逺峯晴旭穿林草堂靜幽人橋上正相逢青紅樓觀護烟霞湖曲髙亭竹逕斜日出炎埃生九野松陰水石養苔花雨餘空翠轉霏霏杜若洲邊小艇歸久為故人臨野閣江雲日暮濕秋衣羣玉山前歳暮天午晴明月滿寒川騎驢客子清如鶴恐是襄陽孟浩然題坐釣圖石畔長松翠已稀夕陽秋水映荷衣鱸魚不敵東曹掾聊向清時坐釣磯開元堂下有兩鴈互浴盆池王真人命工繪為圖玉麈山前紫鴈飛真人燕坐久忘機餘不溪水連天碧只借盆池浣羽衣賦凝春小隱一牕花氣襲人衣牕底芳塵暖不飛坐久硯池生石雨海棠枝上雪都稀題西行集蜀人程氏寓江南年七十還鄉展墓齊侯五世葬西周萬里相望重首丘蜀客飄零頭盡白能將衰淚灑松楸寄薩天錫錢塘南去山總好騎馬㸔山到福州應似當年馬侍御新詩題徧水邊樓書家夫人手寫法華經後綺牕夢冷玉蟾澌憶母應如母憶時曾是雲中散花手靜飄香雨入烏絲題馬道士畫二首道人江上寫春雲絶似房山髙使君緑樹青岑吞吐處惱人時絮白紛紛江上羣山翠作堆人家門檻對江開小樓應有憑闌者天逺歸帆似不來書程妻許氏墓銘後丈夫曾是奇男子真作官人不及知故篋空留錦詩在一簾春雨燕歸遲林社醉歸圖溪村緑雨添新漲簫鼓青林答神貺春風里社太平民身世華胥牛背上題故宋景獻太子墨竹鳳凰山竹語秋風寶帳螢飛甲觀空應有仙人王子晉玉笙吹度月明中題馬逺畫屋角東風吹栁絲杏花開到􅇰髙枝春來陌上多塵土此老醉眠都不知題羅節婦傳後羅氏之夫貶海上有强之為妻者遂自縊死歳晚良人去未歸堂前有客著新衣此身只為韓馮死化作鴛鴦海上飛張御史晴雲亭江南江北馬騑騑囘首白雲天際飛我欲染雲為五色為君裁作老萊衣無錫華氏散粟賑飢不受賞二首泰伯當年處錫山身辭大利逺人安至今邑里髙風在散粟千鍾不受官漢法入粟得受爵相如亦以貲為郎何人不官與侯等巵茜千畝荻千章題水仙花圖莫信陳王賦洛神凌波那得更生塵水香露影空青處留得當年解佩人用吳彦暉韻送揚州張教授還汴梁花邊細馬蹋輕塵栁外移舟水滿津莫向春風動歸興杭人半是汴梁人匆匆歸去縁何事要看揚州芍藥花定有金盤承絳露送他梁苑故人家題竹石圖藍田水曲青玉立雨過秋光滿林濕故人結屋傍幽崖靜愛石牕晴翠入題髙氏所藏畫圖二首誰家林麓近溪灣髙樹扶疎出石間落葉盡隨溪雨去只留秋色滿空山溪邊春樹緑成羣山崦朝來有白雲客子閒行尋古寺石牕巖影與僧分一枝竹圖髙人石上種琅玕林屋秋晴共倚闌不送軒轅裁鳳琯小牕留得一枝看竹溪六逸圖千畝松篁野逕開一溪流水碧于苔山樽共醉徂徠石何用楊妃七寶杯題髙房山畫林扃曉散青楓雨水國春涵白蜃雲縹緲房山何處在晴牕短紙映斜矄題王氏白華圖户部尚書木齋王公其母亡時靈几瓶中山丹俄吐白華人以為王公孝感之㣲云山丹一夕幻幽枝宛見萱闈玉雪姿安得文章如束晳為君重補白華詩書王尚書小像後早敭華貫播芳猷萬壑清冰素抱幽行比伯夷堪置像為吟橘頌對髙秋生平沖澹保天和每見芝眉瑞色多我願髙年登百袠畫成清影迫東坡題趙吳興墨蘭江南三月多芳草緑葉連娟映紫莖憶昔􅋈舟苕霅上一汀香雨入琴清題牧牛圖水樹春深藏野屋歸鴉飛盡夕陽川誰知天上黄姑渚只在南山白石邊送盧道士還天台省親君似嵩山張道士思親一夜夢連環赤城霞氣如春酒持向髙堂駐壽顔歐揭二學士奉勅為趙氏製祖父碑文趙以燕石刻之載歸江西延春閣下拜君恩父有佳兒祖有孫歐掲兩翁今好手能將五色繡平原題耿氏所藏豔畫五月風生水殿涼緑楊深處奏鶯簧佳人偏愛臨池坐欲與荷花鬬晚籹為鄧醫賦壽菴先生何處結茅屋喜得人間壽域寛瑶草滿庭春晝永客來分與未央丸題黄鸝海棠圖二月園池蜀錦殷多情宫鳥喜來看上林春色濃於酒莫把黄金鑄彈丸題春宫倦繡圖上陽宫樹奏鶯簧蛺蝶羅衣逗暖香睡思已隨巫峽雨綵絲偏與日爭長緑樹垂垂護寶欄牀頭翠帕羃雙鸞阿鬟可是無情思又見春風到牡丹贈江東李雲心謫仙才思似春雲縹緲晴空五色文白髮少陵樽酒在江東日暮正思君楊處士家善謳者五陵年少醉春城競説紅兒善肉聲得侍白頭楊處士清歌猶似米家榮送桃溫萬户府學正胡允中長揖邊頭萬户侯黌宮俎豆勝戈矛料應箕子流風逺好為諸生論九疇為程鵬翼題林逸圖長日逍遙水竹村幽人野服剪溪雲山公不是平生友時對琅玕詠五君梅石浦江趙用章宋故家也集賢院號之為梅石處士花開縣圃玗琪樹石出孤山瑪瑙坡此日千林摧落盡故園風物正如何還家不復羨浮榮處士頭銜字字清愧我獨無歸隱地上林春晚更聽鶯題黄筌竹雀圖一牕晴色緑猗猗羣雀飛來占好枝此竹幾年方結實空山秋晚鳳雛飢賦史氏逸菴巖穴髙人已問津瀛洲有閣集儒紳先生只欲師巢許得向堯時作逸民題趙子固墨梅王孫朝罷景陽宫畫舫湖頭寫雪風一段寒香留不住凄涼殘月角聲中題趙氏人馬圖葡萄宫前白面馬春日賜與近臣歸主人愛馬不換妾更與小奴裁緑衣贈縉溪道士縉雲溪上縉雲山春水流出桃花灣白頭道士鶴為馬月明騎過居庸闗題李學士嫰竹圖楚雨初晴野水生新篁落粉鷓鴣鳴洞庭春去湘娥老緱嶺人吹紫玉笙題胡丘盜文設食圖東家不飲盜泉水盜食如何可療飢三錢斗米户不閉人生願際昇平時雪谷曉行圖千山凍合樹無聲幽谷何人更曉行記得烏桓城下宿出門無路客愁生題雙芍藥圖昔年曽賦廣陵春江上雙姝欲照人三月東華紅婀娜凌波遥度襪無塵三馬圖豹股龍膺百戰餘凌烟長櫑載璠璵時平不出横門道願為君王駕鼓車郊原春草緑蒙茸三馬蕭蕭栁外風曹霸當年真絶技只描閶闔玉花驄贈萊州石工落星猶帶天河濕絶勝丹丘鬼血腥琢作大樽休載酒萊山栢露向人青汾州北席里石氏節婦北里髙樓晝掩扉水銅光冷上苔衣寸心誓比南山石汾水秋風鴈不飛龎氏遺安堂仲宣故宅生春草千古髙風媿鹿門今作小堂巢翡翠依稀水竹峴南村贈武夷張天根武夷溪上月徘徊石塢寒深野鶴來宴坐黄堂夜㕘半春風俄轉地中雷題幽禽桃花圖金塘花竹灧春紅枝上幽禽弄晚風莫把殘英都蹴盡無情流水畫橋東題白畫眉圖隋家官妓掃長蛾銷盡波斯百斛螺化作雪禽春樹頂逺山無數奈愁何送陳司丞鹽人舊考周官政禺筴今行管氏書十月甬東風日好海田收稻打長魚題子昂江天釣艇圖雨餘秋水滿山前正是江南落鴈天何處故人魚艇小斷蟬疎樹夕陽邊為彭道士賦鶴峯跨鶴臺髙倚翠㣲昔人城郭是耶非蘂珠宫觀秋如水有客吹笙月下歸送鄧朝陽杉市巡檢往年校書天禄閣亦復獻賦甘泉宫若不江南作官去一生辛苦似揚雄碣石雲寒鴈不飛豫章江暖魚偏肥只將木蘭作歸棹莫買黑貂裁客衣杉市青烟連逺山人家笑語杉影間年豐境内無盜賊弓刀滿山秋獵還題張氏風竹圖湘江風捲白頭波北渚雲深帝子過欲采瓊芳渡江去翠衫輕薄曉寒多柯氏山雲竹石圖溪上春山生白雲鷓鴣啼處有湘君行人來截昭華琯日暮青林玉氣分向余在京師有詩寄揚州陳新甫云東華塵土滿貂裘芍藥欄邊繫綵舟二十四橋春似海令人腸斷憶揚州比新甫來錢塘索予更作三首天下英賢皆願仕山中隱者盡登朝淮南春草無端緑公子歸來不可招别來春夢繞東城華屋銀樽對雪晴坐客風流誰得似啼鶯新曲度閒情去年病客卧淮船故人不來心同然今年過我即復去夕陽籬外馬翩翩題驄馬圖大宛葡萄滿田野天馬盡作葡萄青横門道逺好馳逐日斜秋影卧閒庭東里圖山前水檻拂扶桑目送秋雲野興長里巷人家似鄒魯鳧鷖鸂􅈑日相將題秋江釣艇圖石岸能髙野水落江日未墮霜楓明無人喚取𤣥真子船尾秋風日日生題曇上人墨竹圖道人赤脚蹋海石石上剪得青珊瑚一枝雲葉山牕裏夜半月明生露珠題陳希夷大睡圖石屋光含太華青長年陶兀守中扃人間千古邯鄲枕却道先生睡不醒題楊氏所藏畫圖山光濃淡雨初晴曲曲江清樹色明若買草堂江上住大開牕户看雲生安雅堂集卷一
