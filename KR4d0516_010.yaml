body:
  text: 安雅堂集卷十二元陳旅撰志銘丘同知墓志銘丘氏齊太公後太公封于營丘支子用邑為氏晉宋以來代有聞人譜牒已不可攷其世次在趙宋有為陳留令者因家陳留有子三人従髙宗南遷其季子處台州三世為璹始家錢塘璹生次山以承信郎領漕薦屬宋亡不仕次山生世良字子正是為松江府君㓜穎悟讀書過目輒解年十二喪父二兄分遺貲去君奉母張夫人以居日益貧無以為養教授錢塘市中經傳子史百家之言靡不蒐究士大夫咸願與游稱其學行之兼懿也于是集賢院薦之于朝翰林學士徐公子方閻公子靖又薦君與元君復初皆宜編修國史君獨嘆曰吾不過欲得䘵江南以養母耳餘非所願也宰相聞而念之奏為海鹽州儒學教授學乆壊土田奪于張宗人服君徳教相戒勵唯恐教授不與乃復田千餘畝又大修孔子廟秩滿除杭州路教授杭為東南大會府省憲臨其上而四方游士之所集也為教官者易得誚上下君與教時若左丞許公敬臣㢘訪使修公伯起皆待君如平生士亦無敢訕議既代授将仕郎慶元路總管府知事君所定文牘吏不得舞文法為姦利監郡者擅權貪勢以君持律令志不得逞走帥閫愬知事抑已帥曰若所為㣲知事民不聊生方議責若若顧愬人邪亟往謝知事其人慚服故終君為僚時得不敗後竟以賍罷郡倉嵗畜米以輸京師船人入倉廢法用量所贏十五六是嵗有一倉所畜米黝腐郡守以下咸懼曰破家不足庚奈何君計之曰若節其贏則不至用此即往見海運官曰先時官來縦船人大取贏去唯所欲用是暴民膏血而擾國家者也何福以堪且人行天險中平生乃克濟耳海運官愓然戒船人毋取贏黝腐米固不用至治中賦江南包銀帥閫以慶元賦委君定之君分户為九等止科其上者而已行省使者以賦簿峻責之君曰民困賦役今又科包銀如是亦足矣吾以一身為一郡民請命其亦可也卒不增時太夫人年九十餘居南湖之上日具酒為歡娛達官顯人亦時與君為太夫人夀俄丁内艱哀毁不自堪以喪還杭制終調杭之於潛縣主簿于潛豪民多閑令甲以主簿儒者聚縣廨觀之君聴訟明决誦律如流水豪皆驚嘆不復敢梗縣政攝縣昌化以至陞承事郎為集慶之江寧尹皆以嘗施于潛者而施之于是君老矣居二年請老于朝進奉訓大夫同知松江府事致仕推恩追贈父某官母某縣君妻潘氏封某縣君至元三年丁丑嵗二月丁酉以疾終年六十九子男二人長曰茂廕授温州路樂清縣尉次曰芝女二人長適吳江州税務大使吕文矩次適吳興費元禮孫男一人申孫其年三月甲寅𦵏錢塘縣方家峪先塋之次君聰明粹温行正而通與人交終始款愿心不宿怨能急人之急自壮至老無一怨之者居家平易和樂外因官事而妻子不知仕宦四十年未嘗營産業為文不事艱險善為詩尤善長短句有梯雲集六卷隨筆二卷初同郡潘翁有女富人求之不與一旦見君以為宜壻家人言其貧翁曰丘生今貧後富貴竞妻之君果以文學發身官至五品夫人得為封君潘翁亦知人哉余聞古之仕而已者則歸教其里使子弟有所受以為善先王治化之所以盛也君以善道著乎鄉雖庸夫孺子亦敬而愛之故余于其致仕而來歸也以賓禮延致郡學将使學者接見其風猷而有得焉而君遽即世矣茂以状泣請于余曰子實知先人願得銘刻于墓石余誼不得辭乃為之銘曰徳足以範俗才足以綜治老于鄉邦猶足以淑夫子弟則雖縣車于門未嘗不行其志嗚呼今又逝矣過其墓者尚慨歎而興企汪先生墓志銘汪先生諱斗建字昌辰建徳淳安人曾大父諱某大父諱某父諱某母某氏先生倜儻有奇志㓜時出言輒過人長益挺然欲以其才諝自見于世従祖諱某由錢塘知縣以至為大理少卿常挈以自隨牒試國子監名在前列方襄樊受圍賈似道專國玩兵不即捄凡在朝者不唯不敢言乃更相為諂阿以為周公復生遂比當時為成周隆平之世似道于是愈不欲人言襄樊事時先生在京學率同舍七十人伏闕上書極言國勢阽危上流不可不急援也書上十日不報遂拂衣還故丘至元内附之後亦未嘗有榮進之意乃東逰會稽探禹穴因汎覽金華鴈蕩諸山以至于海悠然賦詩有覆塵之思焉聞故宋尚書方公逢辰講道于淳安之石峽則歸従之游以大有得于義理之學既而典教鄉校士論翕然稱之又教遂陽三載遂不復仕唯家居教授學者日接其風猷有以善其鄉俗先生神鑒爽朗長髯垂膺酒酣言論忼慨激烈雅好鼓琴時為客作離騷數曲清聲抑揚聴者悲憤猶有屈平哀郢之心焉泰定丙寅七月某日卒年七十二娶趙氏子男一人孟文孫男一人汝𢡟曾孫男一人某天厯己巳十月某日𦵏于某里某山先塋之次以趙氏祔余備官錢塘孟文使汝𢡟來徴墓銘余讀其状而嘆曰詩云民雖靡膴或哲或謀或肅或乂當宋之亡也猶有譽譽諤諤如汪先生者乎乃為之銘曰道有勿行則教于其鄉言有勿通則寫于孤桐志氣有勿宣則放蕩于山海之間嗚呼今其已矣後人之聞其風而興起矣鄭君瑞墓碣銘余官江南時天台葉伯禮為余言其鄉鄭君瑞先生因其所居號曰雲南既即世其子作望雲之樓以庶㡬逰魂之來歸也余聞而憐之為賦詩以慰其無窮之思至元再戊寅之春余入京時伯禮亦來持君瑞壙誌言于余曰此其子光祖等所自述者以卜𦵏日薄不得請銘于士林之望懼先徳之冺焉而勿章也敢請于下執事惟終憐之按誌君諱徳鄰君瑞其字也世為台之臨海人曾祖諱荘祖諱宗明皆畜徳勿施父諱良顯倜儻有宏才宋未都督府聞其名聲辟授進勇副尉又授承節郎時事已不可為矣皆辭之家積貲能散與其族鄉人髙其誼君瑞生有美質雅尚冲素好黄老言既壮欲盡棄人間事專以鍊形葆真為務乃戴道士冠衣道士衣謂人曰我道士也彼紛紛然者毋吾友也俄而總道家教者得其姓名署為黄巖道正又署慶元道判則皆曰吾無所逃夫紛紛者乎吾亦姑為之而已矣乆之嘆曰所以為道士者将以全吾天也勤我以職掌則喪我多矣遂并棄道士不為自營其墓于黄山貴人之峯而築室于其山中以居日取儒者之書而觀之洒然有得則曰名教中誠有樂地吾又何之乎至治三年十一月甲午以疾終年六十有三臨歿戒其子曰我死必以深衣斂得正而斃幸也先娶柯氏早卒繼郭氏又先卒君瑞天性純孝平居與人言每及稚嵗侍親時事則嗚噎流涕孺慕葢終身焉所娶郭氏姑女無男兄弟惟有一姊其母不欲置後中分其産以畀二女君瑞曰烏可使吾外舅為若敖氏之鬼乎竟為置後以其妻所得之産歸之郭祀得弗墜其䔍義槩若此子男四人光祖夢賚郭氏出也全易家慶庶出也女五人一適盛賜道一適鄔與褒孫男一人女四人君瑞所自營墓在黄巖州善化鄉𦵏之日泰定元年十二月庚申也余謂道家宗黄老以為教黄帝制法立極老子為王官有妻子皆未嘗離世俗絶去倫類而後世道家者流則異是矣君瑞真能宗黄老之道者哉既而反初服以儒自終則又卓乎偉矣乃為之銘曰種文玉以為樹其材不中乎梁柱藝朱草以為田孰若黍稌之食人幸白日之未夕出雖逺而亟復禮為輿樂為馭纁黄為期以即夫中路貴人之峯其下鮮原生而游歿而安以利其子孫趙縣尹墓志銘越有君子曰趙公諱由鍾字子元歿之明年其孤宜溥等治窀穸宜浩來錢塘以政和主簿胡一中所為状見旅于寓舍再拜垂泣以銘請一中郡人又宜浩同年進士其言足徵旅既不得辭乃述其家世徳義之著者而銘之按公状十三世祖故宋燕懿王五傳為楚孝節王靖康中由浚儀南遷遂居越之山陰曾祖考少師開府儀同三司吉國公諱希迴祖考率府主管佑神觀贈和州防禦使諱與濋考秉義郎諱孟珆曾祖妣楚國夫人王氏唐國夫人胡氏越國夫人余氏祖妣令人妣恭人皆余氏公天質醇正生十年而宋始亡當為宗室近屬時能静約若韋布家兒既内附頗飭厲問學弱冠逰縉紳間行省大臣美其才欲尉薦而官之則辭曰吾學未堪官也歸侍秉義公鑑湖之上而相其治生則又以為綸裘之餘勿敢猶自肥也贊其父捐二頃田與郡學一頃與縣學初宋相史公浩起義廩越中給死喪不能舉女不能嫁者至是公又贊其父以田二頃入義廩里人困于役又以五十畝充義役父子義聲日聞于是朝廷旌其門曰義士趙氏之門及公顓家政貲産益落能黽勉振恤族里族孤女無以為行則為擇配而貲送之鄰女若是者亦助之嵗大侵吏督民買鹽亟徵其錢榜笞無空日則罄私槖代輸焉毎嵗夏秋艱糴之時出粟貸民踰期還者亦不取贏以物易粟則酧以倍直以力食者則酧直倍力里人服其忠厚有忿争者不之有司詣公質曲直得一言即釋忿去平居以禮法自将雖盛夏必正衣冠端坐家庭肅如與人交敦道誼重然諾終身不少變若公者亦可謂之君子矣中嵗趣逾澹恒杜門以自逺鑿巖結屋集泉為池有樓曰聴松有亭曰秀野勝日輒治其與所善者相歡樂人慕其雅致云方科目未行越之學者葢寡公聚書教子躬致厚幣迎師數百里外蚤作課諸子學夜分不休如是凡廿餘年每聞書聲則喜曰此吾所以遺諸子也且語之曰母但工文辭沈潛理義而蹈迪矩度此汝所以為學也従子之無父母者亦撫而教之曰吾與汝財不若勉汝以學汝得財不過適口體之欲學成則所立者大也泰定丁夘公第三子宜浩登進士授昌國州判官再調處之慶元令以俸錢百緍為公夀公為書還之曰汝為吏當亷以盡職縣無公田乃以俸錢奉我将無以自給寧不貽親憂乎其教子類此仍改至元之二年丙子公夀七十以推恩授従仕郎慶元路象山縣尹三年丁酉四月十七日終年七十又一里人哀思不忘娶唐氏故宋㕘政質肅公之孫女先公三十六年卒追封宜人子男五人宜漙宜温宜浩宜浚宜淳皆善學宜浩今官徵仕郎江西等處行中書省管勾兼承發架閣女一人早卒孫男才二人棫模槻棣楷楠枋梓樟橒槃女八人至元己夘月日公與宜人合𦵏于山陰項呈之原孔子論詩至殷士膚敏之章而興嘆焉葢悲夫冨貴之無常也公世所憑藉為富貴者既失之矣顧今所居乃有桓表傑然屋室榮潤宜浩以科第起家仕寖顯諸子又皆樹立而公優㳺鄉邦食其先疇老于山水園林之間身及爵秩以夀考終何所憑藉而至是哉亦為善而已矣嗚呼善之可以憑藉也乆矣銘曰孰不築室我以徳宅孰無髙門我以義闢不恃物以為存則所存者不亡不嗇施以為富則所積者益豐象山崇崇命服孔陽嗣前人光貽後人之慶劉程甫墓志銘慶元之奉化有鄉曰連山劉氏族聚廿餘家世皆讀書力田至曰三聘者乃語其諸子曰術業不可以不專也有能專志讀書光吾宗者乎其子天驥感其言取六籍日夜讀之四書朱氏傳資治通鑑韓退之栁子厚文章皆手抄下逮醫藥陰陽家書莫不蒐討人服其博洽然頗信術者之説年四十餘無子顧族子無可後已者適其婭蕭氏之子生推其六物以為可承家也亟請于父求蕭氏之子為子而名之曰圖南圖南字程甫生三日即育于劉氏天性純孝自為兒童時見其父手抄之書非盥手不敢取讀讀必成誦大父病甚以柘漿漬乾梅啖之下咽輒吐與諸孫食他孫皆不食獨程父受而食之大父嘆曰是真吾孫也而父言是也既長益力學試進士不利妻族大夫以恩奏授祕書省校勘則慨然曰士不自樹立而縁妻以得官非美也辭不授又試有司得待補國學士而宋亡矣我朝凖前代役法推貲産之殷者為里正以趨走其里之事程甫為里正時人心猶未定反覆狂悖觸死罪連坐者衆程甫因後得在官力辨無辜民不當死北來官人見程甫䫉魁棓又詞氣忼慨義其言而従之至元己丑薦饑盜起旁郡縣奉化愚民従而動者亦數百人首惡既誅而連山多厚林深谿民與他邑人多匿其中官軍窮亂者黨與将大搜使程甫為鄉導程甫因具酒款官軍乗肩輿先行見民携持而狼顧者輒教避去既而議者以逋民之不盡獲也欲悉燬其室廬則又請于帥曰民飢借賊勢謀食耳初非叛者麥今且熟人思復業若使之無所於歸是驅之為盜也帥悟而其屬皆不可程甫計此曺非賄不足以動其心乃買腴田百畝購金幣徧賂其人事遂寝于是里之老者召其子弟而告之曰吾等仍有室廬以蔽風雨劉君之賜也宜合錢以庚其田程甫聞而止之曰吾樂為此願勿復言也凶嵗富室幸榖貴更為小量賣之程甫則大其量以乞糴者里有争者來求直則為曉法又舉酒勞解之凶暴乗搶攘時為民害閭閻多事治邑者往往藉程甫為助里役既代屏居不復預邑中事延師教子樹花竹以玩生意每對酒賦詩又喜歌楚詞以寫其憂悰云某年月日以疾終年六十母同里葉氏蕭氏母之姊也乆病痿痺程甫未嘗去左右不得已出應門户必躊踷移時而后能出居父母喪哀毁踰節以能子稱娶寧海胡氏都倉某之女有媍道程甫好義胡氏每相成之子男四人應祥景元戊伯振之應祥戊伯己卒女一人適胡元木孫男五人子東子榮子明子青子順女二人程甫墓在某鄉某山之原𦵏以某年月日景元有經學工文辭與余雅游泣而言于余曰先人行誼幾于古之聞人而景元不能致先人有聞于世且老矣子史官也幸憐而銘其墓乃述其状而為之銘曰連山之雲細緼輪囷出而為雨以膏乎廣野君子畜徳亦以澤物施于其后矧有位秩至于排難解紛喪其良田又何愧乎魯仲連之為人陳如心墓志銘公諱恕可字行之一字如心惟陳氏由穎川居光州之固始五代間有諱檄者避地閩中仕閩為太尉子孫散處它郡宋開寳初諱春者従温州遷台州春與古靈先生襄皆太尉後紹興中公之髙祖忠簡公始自台來會稽居焉忠簡諱騤仕至知樞密院事曾祖諱愿孫監西京中岳廟贈金紫光禄大夫祖諱綺尚書户部侍郎以宣奉大夫寳章閣待制致仕考諱紹荀奉直大夫知英徳軍府事妣李氏封宜人參政荘簡公光之孫女也公㓜即雅飭好讀書年九嵗英徳公卒于官哀毁如成人與母䕶喪以歸甫禫母又歿大父憐其孤苦鞠而教之使受業陳暨先生治尚書有聲以祖廕補将仕郎既而大父登法従當仕孫京秩公辭之曰今改奉承務郎則舊澤廢夫恕可寧淹選資乞以京秩任従弟當可為兩得也大父喜而従之咸淳十年中銓試授迪功郎泗州虹縣主簿覃恩予従政郎江南内附之後頗樂閒曠卜居錢塘西湖之上與寓公遺老徜徉山水間若将終身焉至元二十七年以故宋太學為西湖書院行省起公為山長主之謝不就憲使徐公琰來見嘆曰信哉表師之有在也强之而後就元貞元年以嘉興之崇徳縣為州公首被命為州之儒學教授後又為廬州路儒學教授為衢州路江山縣主簿為寳慶路總管府知事為松江府上海縣丞年六十八告老以承務郎平江路吳縣尹致仕公之來崇徳也學故縣學委墮乆弗治公興學與新州稱士論韙之廬州廟學壊則更作之壮美最淮右禮樂器不備則為制金木竹石匏絃土革之物學田為强宗所有則復之得二十一頃有奇憲使亷公希貢苟公宗道皆禮重之代歸大夫士祖餞百里外不忍舍在江山時有傳妖賊将入境民驚走匿山谷中僚吏亦且遯去公曰長民輕動民将焉恃乃獨坐于縣治令索訛言者得數人撻于市民恃以安在寳慶時惟執律令治文書不附上官人服其撡上海舊徵酒課無法貧民苦之公視民田多寡為賦莫不以為便平生居官惟職所當為者為之不喜干譽于人與同僚意不合則去持家以約御子弟嚴而恩與人交乆而益敬嘗語其子曰士貴立身吾老矣猶凜凜焉惟恐墜先訓也學綜經史達禮制詩文醇正近古小篆似吳興張有謝事十餘年不弛舊讀雖老見古法書名畫猶能臨摹時對湖上兩峰吟嘯自適以越中故宅面宛委山自號宛委居士不忘鄉邦云仍改至元之五年正月二十八日終年八十二臨絶神情不撓有哭公者曰若人者其生也循循焉其死也休休焉門生蒋震孫状其行曰公為人清介見世之黜陟榮辱一不累其心則其仕也有元次山漫士之風皆可謂能知公者矣公娶山陰趙氏故宋中大夫直祕閣時彌之孫女先五十五年卒繼杭蒋氏子男六人以成佳兒以威以盛以咸以觱以成佳兒早世以威承公廕今授呉縣胥口巡檢女二人皆先卒壻西秦張文在孫男二人傳衍傳衡女四人遺文有志言槀餘學槀宛委永言古今率録復古篆韻詞譜編目樂府補題藏于家是年某月日歸𦵏山陰縣承務鄉華巖峯之原以威等前期來請銘昔公與旅論先世譜牒葢同出固始故益敦同姓之好又毎愛旅所為文去年冬來寓舍曰子能為我為文章乎去則疾作且死猶使人道前言鳴呼尚忍不銘公哉宋亡六十餘年故老盡矣有志于史冊者嘗慮其事之寖乆而無徵也公大臣家賢子孫所聞既多又従祖父在朝身見前代儀章物度與其政治得失之實可得而考証焉今又亡矣君子于是葢有文獻不足之嘆而追感疇昔情好之殷則又余之私悲也銘曰有舒有容有敷其文藹其風流公侯子孫或出或處不喪厥守有若臨之師保父母老成無人曷徴遺聞尚俟來者視銘兹墳傅先生墓志銘至元再元之正月晦日温陵鄉先生傅公年八十六卒于家旅時従國學出董江浙學事訃適至南何哭之越五年其孤柱臣等寓書以先生門人連山縣尹劉與子所為状來請曰先君子将以今年七月望日𦵏南安縣禮順里龍母山之原墓銘子宜為旅不敢辭也乃述其状與所嘗知者叙而銘之先生諱定保字季謨自號古直其先光州人唐末有諱實者為威武軍節度招討使始居泉州八子散處旁郡第二子曰居獻家南安者祖焉八傳為龍巖主簿伸主簿生宣義郎思温宣義生迪功郎天驎迪功生貢士湟貢士媲洪氏生先生六嵗通大學論語大義少長有文名丱角領鄉薦尋丁外憂咸淳辛未禮部奏詞賦第四知貢舉方公逢辰見先生驚喜曰頃見所作意老于文塲者乃英妙若是知全州荘公彌明為鄉大家名人以其妹歸之時賈似道當國務抑遏新進士以鄉試字蹟㣲異難之三年始令赴御史臺覆試試中又俾後三年始得廷對同列皆鬱悒先生曾不動心歸益肆志讀書以益茂其所學亡何似道僨軍貶死臨安亦不守矣宋諸王東度浙江至永嘉将建位號陳宜中丞相遂大除拜唯人所欲得有以是諷先生則笑曰吾但禮部正奏名耳景炎之亡也都督親戚又以是諷先生則又辭之大徳初行省以薦者授漳州路儒學正又辭洪夫人曰是學官也可不必辭矣于是漳之諸生皆來迎至即以太極圖兩銘合而講之聴者悦服凡三載所講人至今皆誦傳之再授福州路三山書院山長居三月歸事洪夫人不更仕自温陵受兵後奉母寓城中貧日甚授徒為養能時時致甘腴以愉色婉容漳之初環城冢墓皆發于兵傅氏族最蕃先生無問疏戚悉封之年五十未有子居常怏怏洪夫人曰兒勿憂冢中枯骨當有知也既而果得三子洪夫人年九十見諸孫長大歿之年六十又㡬猶過于哀毁至于喪𦵏事鉅細必親至治二年以平江路儒學教授致仕受命之日嘆曰吾少擢進士今老矣始服命服何不及吾母未亡時因歔欷泣下終身不忘其親槩若此為人舒緩而謹審常掲先哲教敬之言于坐右其講四書也尊朱子成説而得會通之㫖究極微妙而皆中正之論諸經亦因儒先之言而敷繹之不立異以為髙不騁浮以為博教人尚忠厚務實踐見闕薄者心愀然曰是何氣質之未變也為文温潤典裁闕語類劉闕夫詩律類陸務觀逺近求文者日集其門雖倉卒酧應皆縝宻有思致賢郡守與名公卿之入南者無不即其廬而禮焉状言未嘗以非義干人不為矯厲斬絶之行神暢氣怡與物無競可謂善言先生者矣我先人與外大父趙公皆東南碩儒嵗在辰已外大父與先人連年歿旅無所問學日従先生佩服教言所得多矣天厯中天子開奎章閣聘用儒雅旅以先王言于學士虞公公将薦諸朝以老疾不可强起而昔交者閩中道徳文學之士蔚然盛矣數十年來縉紳老人徂謝殆盡先生之學雖不行于當世其鄉之學者尚幸老成典刑之有存也嗚呼今亡矣先生娶荘氏繼張氏皆前卒曰柱臣曰魁郎曰益庶生男也女適荘良孫孫男二女一有四書講槀詩文雜著如干卷藏于家柱臣郡學訓導娶凌氏魁郎閩清縣儒學教諭娶吳氏皆克世其業云銘曰維昔羣猷萃于閩中往者不返吾将焉従先生之存為閩儒宗所不返者見于其躬先生之亡昔人與終尚爾來者嗣茲流風袁夫人墓志銘杭之臨安有羅氏之賢母曰袁夫人識度明偉秉心制行敦慤而不回葢有烈婦人之風焉夫人豫章人父諱某母某氏宋咸淳中夫人之夫某州司户諱某既登進士第侍其父通判隆興夫人實歸焉羅氏大族也其先五代時自襄陽徙臨安擢科第者世有其人而曰少㣲少章二先生者又以禮樂化鄉邑故臨安人多習禮袁氏逺來為是大族子婦人以為難而夫人一言一動必謹禮節自少至老未嘗有侈肆之心其家賴之以為存焉至元内附之初司户之兄掠於吳兵欲得賄以刀環火炙之賄不至則死夫人盡棄所畜相其夫捄出之未㡬通判公卒家益多故則又力相其夫持門户備嘗艱虞子曰汝錫其長曰鍈異母子也夙有廢疾兩臂不能得屈伸則保而鞠之教而育之既為之娶則與司户君言曰貲産薄不足以給二子鍈雖疾能承家矣寧令吾所生者出家為道士可乎司戸服其誼遂俾汝錫入餘杭大滌山従節尊師受業為道士司戸歿夫人治喪𦵏悉以禮既而鍈與其妻皆歿鍈有三子二女則又保鞠而教育之得曾孫又姁姁抱撫之羅氏以寡母綜家政中更饑饉賦斂之窘廪不自支而男女婚嫁窀穸蒸嘗與夫族戚鄉閭慶弔饋問之禮㒺有缺遺四五十年之間内外無間言葢能儉以處已慈以遇物而勤以集事雖大耋精神不衰衣裳絲帛之工以至箕帚滌濯之賤猶身親之故其家人無敢不飭勵者汝錫嵗時歸覲則必有以勉之且曰汝能念吾言猶在吾側也昔羅氏有岐竹之瑞司户兄弟生焉其徵為聨科至順庚午堂下竹復岐適有詔髙年耆徳者旌其門人謂竹有慈姥之祥子孫乃皆舉酒為夫人夀然于是春秋益髙矣明年諸孫有逺適者必戒之亟復其冬使人趣汝錫歸曰我與汝為子母五十四年而我八十四矣母吾戀也又曰我無雜念此心常若皎月遂以十月廿四日終嗚呼夫人可謂夀康好徳考夀終命矣至順壬申三月壬午𦵏縣之平西鄉葑川祖塋之兆夫偏愛其子者婦人之情也袁氏舍己所出以樹他母之廢子所樹者死又培植其曽孫而完其家禍患摧軋之餘終始一致非有烈丈夫之風乎嗚呼賢矣汝錫静厚通朗于孔氏之學皆有得焉制授餘杭之龍徳通仙宫提㸃住持鍈之子曰澤之明陰陽五行之奥為呉興教授曰某曰某皆業儒曾孫立中等皆向學汝錫以状來言曰吾隠約山林且老矣懼無以著吾母之賢于後世也幸憐而銘之泣下霑襟銘曰甚矣古道之蕪也世有為士而非夫也羅氏之母迪道弗遷相其髙風其女士之賢也賈治安墓志銘昔金源氏之亡也開封賈氏南遷江淮之間諱宗政之子曰達為宋荆襄兵馬統制官達生斗南當至元内附時以才學選為峽州路儒學教授仕至太湖縣主簿贈従仕郎汴梁路開封縣尹媲汪氏封宜人子四人仲曰策字治安状貌豐偉美髯鬚温厚而闓敏父甚愛之父殁悉推家貲與兄弟遂如京師見貴人之嘗學于其父者貴人見治安負雅器善為歌詩又通國字語言大嗟賞之太宗正府籍姓名以為従事㑹湖廣行省右丞相額琳沁公新拜命見之喜曰吾故人子也遂用為湖廣省宣使安南遣使入覲行省以治安将之使喜為辭章意文事非宣使所長頗易之屬大寒安南使怪治安能寒治安因以詩荅韻致清婉而尊中國之體寓焉使驚服不敢復言詩時清河元文敏公在中書為㕘議得詩甚喜延祐三年従布哷齊平章討廣西平義靈川賊能以才諝自見乃沿檄軍帥討南海感徳縣諸賊據髙望髙院二山之險以抗官軍俄師斃于流矢重兵屯賊境無所統馭治安即日代領軍政遂分兵守要害繕營壘嚴巡邏趣饟餽圍賊髙望而髙院賊率千餘人突來督兵撃却之明年平髙望賊酋餘黨猶負固矢石如雨治安神色不撓急攻破之乃趣大校合兵攻髙院賊敗又栅險印村則攻㧞其栅羣蠻散走山谷間官軍欲乗勝殱焉治安不可亟宣赦令招降之此其平生著勞之表表者也武昌金沙州善崩數為民患治安監治之民至今賴以無役海北海南琛舶之税入于官者所司屢請賣之葢欲以賤直入官而厚利以自封也先是以省檄往視者率受賂還且為之辭及治安往賂錢數萬緍皆不受盡以雜貨送之省六年入為京畿倉使明年丞相治諸倉出納之為姦利者責倉官庚虧儲往往鬻妻子或投水飲毒藥死獨治安所儲米贏二千餘石朝廷嘉之并以戰多超一資至治元年為紹興之西興場鹽司令時兩浙轉運使王公都中以竈户有恒賦而貧富之不恒也乆矣乃俾官屬行諸郡更定之治安行四明天台諸場至則集其人而告之曰竈户之弊極矣産與賦乆不相侔民窮且死富者猶任輕賦而使窮且死者任其重忍乎爾曺相與居鄉里户髙下所素定者今與若約産多者上坐餘以次占席賦以是為差既坐各著于籍而退不擾而賦平人有圖其像而事之葢感之至也至順二年同知餘姚州事與長吏協恭以成其政外若無所為而民實受其恵至元再元之四年以承直郎為杭之仁和縣尹仁和劇縣也諸大府臨其上俯仰奔走有非其志者矣明年四月疾作遂致其事竟以五月十三日終年五十八天性孝友嵗時思其父母輒嗚噎流涕弟兄散處南北毎相見慟哭而後别見人困苦者必賑恤之朋友死生之託尤盡其誼中嵗雖不欲仕喜與客徜徉山水間賦詩以為樂居西興時有賈公墩舒嘯亭鶴死而瘞之則為鶴冢亭所居以悠然名齋常慕陶彭澤之為人年未六十以邑令終此其徵歟是年八月庚寅𦵏錢塘履泰鄉仙芝里之原詩文若干卷藏于家娶真定張氏封宜人治安好客四方之賢士多集其門俸入不足以治具宜人至脱簪珥繼之子男三人長曰芝雅飭而有文張所出也次曰葵曰艾孫男曰宜芝等向余拜且泣曰先人墓石願先生銘之嗚呼余知治安乆矣為仁和時又與余居同里巷數相過把酒談昔時所為葢有志于用世者也以董戎治粟定鹹賦數事與其好賢樂善憫人窮之心而觀之若宜世之載顯位食厚禄者乃抑鬱不得伸其志以死銘曰世有騏驥乃服鹽車鳯凰髙飛而居以笯孰不自奮業與位稱厥施弗張由制于命猗嗟治安器則藏矣仙芝之阿斂而藏矣安雅堂集卷十二
