body:
  text: 安雅堂集卷三元陳旅撰五言古詩次韻寄太乙宫上官端居感流序階樹日摵摵涼風起髙城上有南飛翮揚雄不徼名拓落猶逺客美矣陶徵君斂裳去彭澤我居城東南西北有殊庭病久曠沖賞懷哉松桂青曼倩諒奇士夙受火珠經雲河淡秋夕泰畤明三星題桃花鸂鶒圖婀娜絳花明連娟碧雲靜金塘春水多文禽汎晴影大堤寫游悰日照華服靚萬物各有適况及芳歳永次韻毘陵吳寅夫是寄季子江海居勝友園池賞臨水詠新詩輕飇送流響丹花陽林吐綺翼幽竹上雲瀾阻塵躅離思徒浩漭杪秋辭京邑寒郭􅋈吳榜宗兄念行役㫖酒勞鞅掌承子共清悰論文發豪爽我貧久僑栖所至類樂廣願得陽羨田寧慙五湖長夙昔詒約言遲莫嬰世網衆仙諒逍遙樓觀滿方丈餘霞散文席斜月生翠幌芳夕令人思思之不能往晨興即髙岡引睇寫孤想湖上分韻得春字君子佩明信相期湖水濱時欣宿雨霽畫舸送遊人輕鷗集蘭渚佳樹雙鶯晨山逺烟容澹日出水光新美人含麗思艷曲歌陽春睽攜㑹彌歡酣適趣益真兹遊敦德誼况乃及兹辰題楊顯民采詩卷後夢游洞庭野斜月映疎星軒后來張樂伶倫吹鳳笙夢囘憶其音幽渺有餘清截竹學向人世人皆不聽南州有髙士洗耳卧岩扃涼風鳴松竹石澗響瑽琤何日即與語曠然千古情盧氏松菊堂人生貴適意何必在丘園所以曠達士隱居京邑間城東有衡宇亦復逺塵喧青松翳庭皋佳菊羅堦前掇英以汎酒撫松日盤桓淵明歸栗里陋邦非所安而我值休明此地有餘歡分題飛龍亭為趙宗吉御史賦冶城枕遙麓華構起層阿昔日文皇帝憑髙眺山河晨曦上扶木寒野迎春和六龍不停馭若華翳崇柯鍾山生白雲淮水流素波君子懷寵光登臨幽思多賦謝氏舒嘯亭瀏陽閟沖曠自昔君子鄉君子佩蘭茝雲路以翺翔謝君襲芳聞耕種在溪莊聖世宜隱居非云厭榮光籬邊有嘉𤓰牆下有柔桑麻苧已滿區花果亦成行濯足倚幽碕臨風服練裳客至坐衡宇共飲樂時康酒酣仍長嘯長嘯適清狂客去林扉合猶聞鳴鳳凰仕宦貴適意往往鬱中腸寄語同聲者相求與徜徉送金溪尹縣丞吾聞臨川郡自昔多君子金溪畜清沖雅德著陸氏羨子齒方富于焉學而仕為丞非劇職佐邑優政理暇日山谷間折節問賢士毋徒學涖民且可學治已在我既有餘推此以及彼君家起武弁文事固所鄙國家久治平四海納孔軌人言甚可畏在子擇所履儒宗虞青城相去不百里林逕入秋雨竹屋臨野水沿徼或過之瞻望以興起送李光載辭西臺掾省親金陵翩翩城上烏鬱鬱轅下駒芻豆或不充返哺常有餘庭闈隔江水思之俄歳除誰能西入秦奔走奉簡書脂車薊門道僕馬語載驅過江動雙槳忽至石城隅慈母望我久此時當倚閭相見有至樂浮榮信區區分題得鄧賧送舒嚕都元帥之雲南滇池西南陬沃地稱純源鳳山翼廣野穹水吐厚坤武侯昔經營遺勝諒斯存川原集惠采草樹生竒芬聖世仁風暢遐徼絶妖氛元戎謹蕃宣詩禮况所敦春山圖春山雲木暝初日映遙岑林霏翳髙閣望之勞我心幽徑縁崖迥飛淙響澗深芳月忽已晏誰哉與登臨分題得南臺送山子春僉事之閩中無諸句踐孫有國東南陬能從漢髙帝函谷用戈矛賞功仍故封築臺臨水頭憶昔春雨餘廟下艤蘭舟載瞻漢衣冠丹青煥林丘北游二十年日暮倦登樓繡衣問風俗于焉少夷猶送髙敏則道州路知事子昔來京師見我靈椿坊論交氣誼合室有芝蘭香念我當逺行賦詩以相將詞華蔚組繡音節鏘琳琅而子亦南征遊徼入炎荒契濶忽八載憑髙每相望今歳夏五月有客至上庠欣然展良覿槐下久徜徉惟子富文學所用乖所長巍巍玉堂署制作須才良而今所授官乃復在遐方獨喜舂陵郡實為周子鄉山川草樹間道德有餘光於此治簡書雖逺庸何傷涼風起燕臺飛雨下太行蘭舟曉當發河水方洋洋臨流重睽攜贈子以佩璫願言行所知歳晚期母爽送王致道僉憲河東分題得汾亭昔年文中子東歸遂隱居幽亭枕汾曲於此樂唐虞鳴琴寫流水泚筆讀羣書夫子今邈悠清風在林墟君侯實諸孫訪古紆使車睠惟十二䇿用世當何如安福李氏臨溪亭結屋負南郭清溪流屋前端居塵事少水木自幽研滌硯弄寒泚鳴琴寫潺湲沙鳥時近人汀雲相往還烹鮮芼溪毛留客坐前軒逝川道體著觀物悟微言題米元暉溧陽溪山圖宿雨散層巘林麓翳烟霏遙山斷復連川上初昕微我昔困行役溧陽秋未歸幽子喬松流邂逅啓郊扉撫景正若此别離嗟願違覽卷遂終日溪雲欲生衣為吳德良題承㫖所贈蘭竹圖細竹生石間幽蘭與之俱愛彼有貞節而此芳不渝空谷塵躅逺公子為停車懷人重移植臨風寫為圖君子實似之歳晏聊與娛賦雲錦溪緑水春生渚丹花集陽林愛此雲錦好蘭舟轉溪深賀監謝軒冕載酒過山陰遙聞櫂歌發縹渺不可尋日出瀛海上照見仙人宫仙人闕雲處闕翠闕懷慕沖賞俯首慙孤蹤吹簫薊門月一夜思江東哭陳元麟阿麟能讀書八歳貢京國翺翔公卿間聲譽頗籍籍我家越山南汝家越山北及我官橋門見汝長五尺翩翩丹穴雛五采作毛翮崑崙種瑤樹上有實可食汝胡不此留而去不可即乃翁攜汝來為汝頭盡白辛苦攜骨歸江蘺黯秋夕可憐東門吳任達乃强釋趙逢原靖康間失母三十年得之瀘南其孫求詩母子不相見飄零三十年飛雲散九野瀘水聲濺濺百川盡東注雲飛散還聚無情㑹相逢而况子求母凄涼汴中宅池臺翳荒榛峽船載華髮鼓枻江南春作堂種蘐草蘐草日以好淮上已罷兵江南可娛老為熊道士賦雲巢吾聞巢居子乃在白雲間手執天地戸乗風時往還下民敢予侮硩蔟寧爾干更有鶴為馬養在松樹端杜節婦董氐無子杜曲有好花盈盈映春水芳月忽已晏好花難結子年年寒食時花落水邊墓狂風吹不去盡作墓上土白頭不偕老千古同懷抱獨憐墓中人羨殺杜有道答蔣伯衡茂才蔣子雅好事獨肯勤過我助我作清事亦復無不可近詩精且新五色雲一朶子豈久陸沈徐步亦青瑣題陶淵明撫松圖原野涼風至草樹日蕭條杖筇還故丘青松在東皋孤陰近衡宇薄日映層標念此有貞操撫之以逍遙題泛舟圖江雲生白石水木澹幽姿雙松出叢薄翠色集遙枝落日明極浦楚岫正參差美人鼔蘭枻歳晏將何之題郭天錫畫郊居息塵事日夕望青山青山秋氣多白雲出其間露渚野芳集楓林江色寒夷猶感流序况乃曠幽攀題楚山圖佳竹生石渚髙木連翠微遙岑宿雨霽野水明夕暉幽子茅宇下獨坐啓林扉所約殊未來湘雲欲生衣韓節婦詩雲州劉氏女嫁作韓家婦良人命不淑抱病入野土舅姑老無兒三子幼失父劉氏方盛年自誓不忍去寧為澗底松不作道旁樹道旁衆所憐澗底人不顧寒燈照闕機杼膝下梨栗分堂上滫瀡具辛苦闕年遂作畢志慮佳兒總成立綵服娛歳暮邦人推母儀里婦學閫度盡言韓家好華表臨大路和氏孝感詩任城和氏女病久雙目盲有子曰叔方百計除昏㝠巫醫技皆窮籲天乞光明焚香向北斗夜夜拜中庭一旦雲霧開髙堂炯秋星攬鏡見天色恍然疑再生慈竹當牕緑蘐草遶堦青兒孫來上壽綵服映新晴鄰媼亦驚喜相看持酒觥乃知有天道應感由孝誠張元已親疾不在藥師經送羅生還闗中岐山有雛鳳飛集軒轅臺下飲辟雍水絢羽明毰天寒采竹實欲與相徘徊鳳子忽西飛使我心悠哉比歳秦告饑攫人腊為餱捄荒豈無䇿孰弛吾君憂乃翁守奉先懿若元道州臨風致逺意為子登髙丘郭孝子詩金臺有孝子郭氏名壽瑛壽瑛執親喪晝夜聞哭聲負土起崇塚栽松翳𤣥扃瘦骨寒岳立苦涙春河傾視容日梅梅一朝廢雙睛復扶大母柩㝠行出蕪城願言畢序葬身瘵心則寧里人問孝子過毁聖所懲孝子哭且答我非敢傷生有淚不哭親烏乎用吾情親死我目在徒能視無形黄泉相見日無用此目明吾聞壽瑛語悲愴不自勝昔人曾有言五色令目盲長年悦芬華眉斧戕心精視彼郭孝子愧色能無頳而我嗜讀書昏花散秋燈思親不能哭涕泗空填膺西山詩有序至順三年六月之吉西山新寺之穹碑樹焉是日百僚無敢不至碑所余與趙博士繼清蚤作出平則門沿大堤並駐蹕亭下轉入湖曲逢趙宗吉成漢卿二編脩與劉敬先典籍騎驢從蒼頭挈匏樽邀余與繼清就堤側藉草坐灌木延陰風泠然生磵底幽鳥鳴其上命蒼頭堤旁取荷為盤以實腊肉倒樽中濁醪飲數行甕山流黛與湖影相盪潏於盃盤巾袂之上余在京師七年蓋未有一適如此時也酒盡三君子起曰子于此能無詩乎余言歸即賦之及歸以職事縻繞少清趣明年二月宗言持紙來索詩時户外雪深二尺無他客乃賦詩曰蓐食出西郭初日明逺川聮鑣走山麓山樹盡含烟紫石擁馳道緑水侵莽田髙人湖上來邂逅野磵邊茂栁垂密幄層莎布柔氊囘風颯幽爽有鳥聲清圓采荷薦珍胏洗琖行芳泉芙蓉濯新雨迥立方嬋娟晤言攄素抱逸思慕遐鶱窈窕紺園夕珠林映璇淵黄金作臺殿縹緲集諸天顧慙凡躅汙亟去不敢邅適意無先期重尋有中悁華月忽易改賞心與時遷晨興望雲物浩雪滿層巔朗州周氏水木清華亭迴薄林逕小有亭在山阿川原宿雨盡谿谷秋水多文鱗集幽渚翠羽下遥柯美人種松桂松桂今如何念彼不可即沅江日生波題雲松巢圖匡廬多白雲亦有松在山髙樓若橧巢乃在雲松間茯苓生砌石雨氣通林巒遊子涉逺道夕鳥栖簷端終期謝圭組歳晚適幽歡卧聆松風細起看川雲還題清逺亭虚室敞林薄細泉生石苔魚遊菡萏日池上竹樽開坐久夕雨霽微風牖間來流香轉迢遞涼意與徘徊七言古題蒙泉史隱圖世皇昔日收雲南鯨鯢伾伾手所戡烏蒙烏撒腹心地不有軍府誰其監漢廷遣將非充國累歳屯田無善績兵驕民獷土不畬國帑空虚糜萬億大名劉侯文武才承詔萬里誅蒿萊豪蠻盡戢戎壘立竄卒復還農畝開有泉逺出蒙山下日夜清冰鳴石罅渠分澮決來縱横土脈浮膏作秋稼府中儲積多如山陂池種魚無暵乾幾聞舂磑響林際仍為蓏蔬流圃間劉侯暇日遊泉上賓史追從意沖暢步隨涼影傍髙松坐看晴雲起孤嶂朱轓奕奕來甌閩喪車遄返黄河津雲南戰骨横四野布穀聲中荒草春劉侯雖死應愁絶吟魂空咽泉頭月祇今寧謐重謀帥九原人去無歸轍荔支臺館開樽時劇談毎及西南陲凄涼遺像畫圖裏對此流涕將奚為海谷歸虚谷在渤海東八紘之水注其中不盈不縮浩無際吞吐日月含空濛靈鼇於此負山出上有縹緲金銀宫人間相去幾萬里弱水滿眼多迴風琴髙來時踏赤鯉少君歸去乗白鴻秦王到老不得渡嗟我欲往將焉從子房有孫海谷子告我有路非難通只隨雲氣相上下與子共謁扶桑公送王道原韶州教授春秋大義如日星紛紛傳註夷天明唐人啖趙與陸氏疏剔猶未窺全經宋儒往往發豐蔀後學胡乃相蒙盲先生寤寐洙泗上汲古獨得心源清不隨流俗論褒貶善惡無以逃其形書成臺閣交剡薦講説弟子盈門聽上庠評校忝屬我寸莛豈足宣鏗鍧細旃廣厦得前席啟沃真可裨昇平奈何載道適南越白雪滿鬢秋衫青横經定有龍户集擊磬應聞鳳鳥鳴逺人從此識古學風教所寄良非輕都門買舟著書副江上雨足新涼生天南何處有歸鴈作詩百紙寛離情謝氏祖孫創澧陽橋涔陽極目雲氣昏衝風揚波鼉窟翻湘妃抱瑟望虞舜日莫江竹多啼痕木蘭為舟不可渡誰幻層淵作平路天横夜靜牛渚長海市朝晴蜃樓吐祖孫移山山可移昔人不信今見之千年猶有召伯棣白面聚斂嗟何為友人祀墳少作圖録之溪村積水生寒烟書廬睡起清明天隔溪暮哭人飯鬼塍間燒錢野風起酒旗山前雨疎疎來禽花底飛鷓鴣荒墳纍纍出新草草長如人人又老東門大道青楊間可憐車馬無時閒題虎圖於菟嘯林風怒生草木瑟縮空山驚斧牙鑿齒新發硎去食田豕求西成伊昔報祭先嗇并誰復罵汝偷犧牲包生盤礴圖金睛懸之髙堂氣憑陵游光野仲急遁形西阿執鉞神赫靈藏六詩為林恬齋作禹燥中野􅏲欵洽流水青黄背疇錯五含九六中算約舉六藏之九斯作人言天地猶槖籥陽氣流行鬯磅礴蛇甘即且蝟辱鵲子能深强有真樂陽精純凝乃脫廓掉頭不肯支牀脚為蕭元泰題龍虎山嵒圖龍虎之山仙所寰我昔夢寐游其間乾坤風氣結沖秀中有正一𤣥都壇羽人授我九節杖林磴窈窕窮幽攀金宫藥殿起寥廓翠崖丹巘深迴環峯頭時飄白菡萏石上盡種青琅玕諸岩一覽二十四總似瀛渚蓬萊山清溪浮空引雪練逺岫隔水來烟鬟就中仙嵒更奇絶上有玉樹皆檀欒虹光半夜出林杪云是石室韜神丹欲求刀圭已衰疾羽人去我如飛翰褰裳磵曲采芳草斷猿疎雨春山寒覺來俗事日滿眼歳月冉冉隨驚湍會稽蕭氏忽相訪笑以此圖令我看夢中羽人貌真似而我别後鬢毛斑題詩聊復紀疇昔願拂塵服齊驂鸞題白玉蟾贈劉丹晨暑月詩後玉蟾先生列仙儒夙昔夢見冰雪如丹晨不比劉師服彌明本解人間書紫清午榻松陰冷俯視塵寰真火井銀河夜靜浴明月水風吹落𤣥雲影𤣥雲盤屈龍虎章百神守之不敢將胡古愚為其僕袁普作傳王師魯賦詩用事甚博輒摭其遺餘為詩和之世族之降為皁隸人世升沈自常事句章袁普本故家淪落來依太史氏太史典教羽林屯普也服役顓辛勤頗似顔家得銀鹿又如王氏使青猿子淵立約真可笑彼若輸心不相拗結車已肯送窮鬼下狀仍堪論惡少太丘無僕不自聊何時定把漁配樵更尋阿對灌蔬圃未暇殖貨師齊刀胡公掉筆嘲孤客客笑胡公未為得長卿才思應過人挑得文君併僮百却憐待制王先生只為袁普之灤京平生我識越石父解驂遲汝相將行陳新甫生日出紅玉盃飲客為賦紅玉盃崑崙東阿含海日石中玉子如日赤神工夜發昆吾刀剜作金盃盛酒喫蟠桃初開緱母家丹露滴入芙蓉花廣陵公子酒如海年年顔色襯朝霞題天台桃源圖天台一溪緑周遭溪南溪北都種桃東風吹花開復落遊人不來春水髙錢塘道士張彦輔畫圖送得劉郎去昨夜神鵲海上來洞裏胡麻欲成樹明妃出塞圖昭君北嫁呼韓國巫山更有昭君村黄金鏤鞍玉驄馬分明載得巫山雲涼風吹動釵頭鴈一曲琵琶寫幽怨沙草遙連雞庭塞野花不種鴛鴦殿内家日日選娉婷淚痕滿袖空多情漢廷自此恩信重美人身比鴻毛輕蘇伯脩往上京王君實以髙麗笠贈之且有詩伯脩徵和章因述往歳追從之悰與今兹睽攜之歎云爾往年飲馬灤河秋灤水斜抱石城流青城丈人來水上揭謝蘇王曼碩敬德伯脩君實皆與遊顧予濫倚橋門席日斜去坐鼇峯石夜涼共飲明月樽醉眠更聽髙樓笛灤河九曲來濺濺自我不見今三年蘇郎又扈屬車去佇望弗及心茫然龍門峡中雲氣濕山雨定洒髙麗笠别意遙憐栁色深歸心莫為鵑聲急不才未許收詞垣賦成何日奏甘泉人言凡骨難變化為我致意青城仙題胡氏殺虎圖沙河野黑秋風粗棗陽戍卒車載孥道旁老虎夕未餔車中健婦不見夫倉皇下車持虎足呼兒授刀剚其腹夫骨已斷不可續泣與孤兒餐虎肉小混沌魚腹浦中石方氏得之加今名大圜縣㲉含清涬倐忽多事中央死𤣥精散作萬星蘂天椽不堪參墮趾日化七十皇有虺蜀霤難苴絢林委殺妖壺涿驚弗燬剡剡靈光照寒汜老龍乗磧用師紀俾作魚麗陣中士風雲往來江落水虎臂灘囘玉生子緗文素肌溫栗理方叔得之驚且喜羃蒙錯綺鐍髹篚閉門乍觀戒貪褫烏虖混沌乃若此吾終乞之還汝始送趙博士還聞喜展墓渡江丞相忠簡公意氣不減王茂𢎞騎鯨海上作風雨故國山河夕照中丞相先人葬河朔蓬顆摧藏麟滅角橋門有客丞相孫西望歸雲雙淚落彬彬學子傳詩書誰為王式歌驤駒車塵忽集都門道野水遙生董澤蒲僕夫繫馬塋邊栁子弟牽羊輦村酒里中老父喜更悲胡不歸來今白首人生南北兩悠悠相見俄驚二百秋我亦飄零去鄉土酒酣獨奏江南謳豫章紫極宫太古樓誰云仙人好樓居仙人結屋在太虚夜涼河影動牕牖日暮雲氣浮江河人生萬劫同天地倚欄無限太古意麻姑歸去海復深秋風吹老人間世嗟余好古空讀書所見無過數千歳明年江雨未開船聽説無懷以前事為江道士賦清虛人言天上清虚府中有萬頃琉璃田秋空紺滑不可上翠房玉户扃嬋娟道人有月常滿郭只在黄庭方寸間重樓露氣浩如水絳河夜轉崑崙巔分題送方叔髙江南得車遙遥車遙遙薊門路髙麗驕馬不受鞭方郎得官上車去薊門南頭盧水流燕姬十五居酒樓彈箏唱歌折楊栁落日車前勸郎酒南陌行人往復來幾人似郎得官囘郎車莫驅傷馬足車中本載連城玉車遙遙鄔子洲賣車買船載旗鼔晴湖風輕聞櫂謳崇碧軒詩有序江西張繼明居進賢山中屋前後皆髙嶺前嶺曰瀑坌蓋謂飛瀑若塵坌然門臨清溪溪受飛瀑張氏有田如干畝溪行田間後嶺傍有深谷多古木屋東為軒四楹豫章松竹雜樹與山俱青因名軒曰崇碧奎章學士虞公為大書之繼明又來錢塘求詩於余詩曰豫章山中多豫章大松長竹相扶將屋東微見紅日動簷曲偏令翠雨涼洗空絲瀑落溪艇煖客錦苔鋪石牀何時到子軒下坐太朴顯民同瓦觴危太朴楊顯民皆繼明之所嘗游其居又相近也題遼人射獵圖美人貂帽玉驄馬誰其從之臂鷹者沙寒草白天雨霜落日馳獵遼城下塞南健婦方把鋤丈夫邊戍官索租題趙紹隆倦繡圖籠碧紗厨掛秋水藕風吹香團扇底琵琶彈歇宫晝長釵落雲邊九雛紫二姝誰是薛靈芸繡得金塘兩鴛似宫奴夕殿喚更衣露濕銀牀響桐子為趙敬叔賦漢海獸葡萄鏡蓋鄭夾漈家故物也尚方老冶收精銅金膏玉髓開朣朧未央曉月低青桐六月秋井生芙蓉當塗妖鬼負神器銅人登車數行淚寶奩偶落長安市來與人間照珠翠凝陰空祭江心龍海雨夜入閩王宫一朝愁殺漈上翁破屋日夜穿晴虹西苑野露堪作酒中有騊駼活欲走趙侯得之莫失手龍女鮫童俟之久和蕭秀才歌風臺歌風臺前野水長王媪賣酒茅屋涼酒邊老父說劉季頭戴竹冠還故鄉山河霸氣已銷歇颯颯老栁吹斜陽臺前小兒更擊筑筑聲更似一侯章送朗州周子嘉主簿來安阿翁起屋敖山下阿兒作官滁水邊滁州真似朗州好落日采蘭汀渚間縣官何必好生事把酒去看琅琊山阿翁日望好消息家書只報縣人安慶元𤣥妙觀新種檜樹生成鳳冠老檜何年化牛去仙人築壇栽小樹靈根下飲丹砂泉翠氣遙通石門雨寶冠百葉青荷開威鳳獻舞衣毰漢宫不種珊瑚樹有客持圖海上來五言排律次韻蘇伯脩尚書孔廟慶成詩御史孔用道以上丁致祭且樹碑云聖皇遵祖武熙代闡人文魯邑宫功懋齊民道化殷緑綈頒厚渥翠瑌如兖切美石篆靈勲毖祀超羣望休光照九墳六莖時入奏百末夜流熏服􅒐曽孫敏趨庭舊禮聞告成牲釁闕承事駿奔勤廟作知民若神歌樂我員精神通肸蠁嘉貺集氛氲史克人能頌永歌堯舜君送葉天根南還我識天根子于今二十年吹簫來翠嶺鼓枻入丹淵日出扶桑底雲生建木巔人間方夜半海上得春先老我江湖迥微官歳月遷荒泉流竹里冷雨浸芝田髪短何為者君歸重惘然飛霞浮夕景定在石林邊陪趙公子遊蔣山即席次李五峯韻弭櫂丹陽郭鳴鞭白下山晴原烟翳翳幽樹鳥闗闗石液玻瓈碧雲根瑪瑙殷佛岩開細菊僧徑入叢菅雨洗川容淨潮隨野色還六朝有幽事盡在夕陽間南山詩山在龍虎山南張宗師藏劍舄之地曰丹丘有小石洞門玉津澗月橋天鑑池金沙井躍泉漱雲亭山雲閤丹桂塢桃花源云江左羣山囿仙丘倚太霞上清分亢爽南谷抱谽谺臺觀黄瓊宅林巒赤虎家天池開寶鑑日井射金沙桂殞秋岩粟桃烘曉岸葩泉香通美竹雲液漱靈芽俯澗松偏潤縁崖逕自斜幽亭宜水遶晴閣受嵐遮神舄丹扃祕𤣥闗紫氣賒石橋留月色銀浦渺皇華願解延陵劍終乗博望槎臨風一邂逅食我棗如𤓰次韻許左丞從車駕遊承天護聖寺是日由參政陞左丞銀甕呈山麓地名甕山鑾輿際水鄉離宫疑馺􅤥行殿倣飛翔細浪魚鱗襲輕飇鷁首驤扶桑明逺岸析木度髙􅧃屏翳時清蹕豐隆夙啓行衞兵環越棘舞女蹋吳航漸覺仙樓近微聞梵鐸揚石壇登案衍瓊佩襍璆鏘夕渚休蘭櫂春壺瀉桂漿伊蒲頒内供薝蔔散林香罷宴蜺旌動開帆獸錦張莽田低碧樹馳道出金塘畿甸嚴車輔臣鄰重室廂方欣麟在藪復喜鳳鳴陽聖主需賢急嘉猷賴弼良從容承顧問舄奕拜恩光文彩堪華國芳菲正滿堂協忠成泰治流澤徧遐荒援古言應切匡時慮更長誰哉疲土木况乃象為廊安雅堂集卷三
