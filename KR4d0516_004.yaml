body:
  text: 安雅堂集卷四元陳旅撰序國朝文類序元氣流行乎宇宙之間其精華之在人有不能不著者發而為文章焉然則文章者固元氣之為也徒審前人制作之工拙而不知其出於天地氣運之盛衰豈知言者哉盖嘗考之三代以降惟漢唐宋之文為特盛就其世而論之其特盛者又何其不能多也千数百年之乆天地氣運難盛而易衰乃若此斯人之榮悴槩可知矣先民有言三光五岳之氣分大音不完必混一而後大振美哉乎其言之也昔者南北斷裂之餘非無能言之人馳騁於一時顧徃徃囿於是氣之衰其言荒粗萎冗無足起發人意其中有若不為是氣所囿者則振古之豪傑非可以世論也我國家奄有六合自古稱混一者未有如今日之無所不一則天地氣運之盛無有盛扵今日者矣建國以来列聖繼作以忠厚之澤涵育萬物鴻生㑺老出於其間作為文章龎蔚光壮前世陋靡之風扵是乎盡變矣孰謂斯文之興不有闗於天地國家者乎監察御史鎮陽蘇天爵伯脩慨然有志于此以為秦漢魏晉之文則收於文選唐宋之文則載於文粹文鑑國朝文章之盛不采而彚之将遂散軼沉泯赫然休光弗耀于将来非當務之大缺者歟乃蒐摭國初至今名人所作若歌詩賦頌銘賛序記奏議雜著書說議銘誌碑傳皆類而聚之積二十年凡得若干首為七十卷名曰國朝文類百年文物之英盡在是矣然所取者必其有繫于政治有補于世教或取其雅製之足以範俗或取其論述之足以輔翼史氏凡非此者雖好弗取也夫人莫不有所為於世顧其用心何如耳彼為身謀者窮晝夜所為将無一事出於其私心之外至有為人子孫於其先世所可傳者漠然曽不加意遑及他人之文與天下之事哉覧是編者不惟有以見斯文之所以盛亦足以見伯脩平日之用心矣伯脩學博而識正自為成均諸生以至厯官翰苑凡前言往行與當世之所可述者無不筆之簡冊有國朝名臣事略與是篇並著廷論以文類猶未流布于四方也移文江浙行省鋟諸梓伯脩使旅書所以纂輯之意于編端庶幾同志之士尚相與博采而嗣録之經筵唱和詩序古人有言曰天下重任唯宰相與經筵周成王能成其徳由周公有以傅之也是豈過為高論者哉我世祖皇帝道㕘元化明並日月冝無待乎儒者之助矣萬㡬之暇命許文正公與諸儒講堯舜孔子之道以登中統至元之盛夫以世皇上聖猶不能無頼乎此則世之為人君者能無頼輔導之功乎文皇帝以明宗有觀書之喻開奎章閣延學士大夫敷陳皇祖寳訓暨諸格言緝熈光明以師表天下而在位弗永志有未遂也今上皇帝以明考元子入紹大統有志祖宗之事御極之初即命兩丞相與賢臣碩彦之在著定者以聖謨嘉言與凡經籍所載可以充廣聰明増崇徳業者一月三進講上接聴不倦而時有儆惕之色扵是益優禮講官既賜酒饌又以髙年疲扵歩趨也命皆得乗舟太液池徑西苑以歸聞者皆為天子重講官若此天下其不復為中統至元之時乎今監察御史鎮陽蘇君伯脩時為授經郎兼經筵譯文官論定其說使譯者得以國言悉其指歸沐日又賦詩鋪寫盛事約同館之士與京師能詩者和之彚為一卷不鄙謂旅使序之嗟乎儒者之用心亦苦矣敝精神方冊之間莫不欲售其說于人主使四海之人咸被仁義之澤奈何自孔孟以来儒者之每不遇扵世落落也程正叔氏以名臣薦身際元祐之朝似可以行其學矣崇政說書懇懇忠藎卒無所售而去况其他者哉然則儒者得以所藴進納扵其君實千百載竒遇幸㑹也又安得不歡欣鼔舞而形諸詠歌也哉此伯脩與諸賢之詩所以作也後之君子想見元統之治将扵是乎觀焉送旺扎勒圖還河陽序國家初置成均本教國人子弟因寖及其餘焉國人子弟之所以學者非専尚乎文辭之葩華也訓詁之繁𤨏也與細儒曲士角分寸扵觚翰之間也醇龎之質偉茂之器固将有以成其美而忮之氣儻蕩之習亦欲有以變其故爾成周之造士也七年考其小成九年考其大成至是不率教者盡變不變王親視學又不變則為之三日不舉盖學所以變氣質也不變則棄人也為君師者能不以是為已責哉蒙古生旺扎勒圖入學甫三載予見其貌魁岸而善祥其意濶達而欵慤其言辯暢而縝理生之質亦善變矣揚子雲有云君子弸中而彪外也生之著扵外者若是其必有所得扵其中乎歸見父母父母必喜曰吾子去我乆而能異於昔矣里中父兄来覿生必亦曰不見生乆生異扵昔矣吾知由生而有興起者焉吾知由生而有慕國學之為教者焉吾知生由是而益有以自勵者焉其行也同舍生為求言序以勉之送柿溪州蒙古學正序無懐氏封泰山以来字體之變尚矣其可考者古文作扵蒼頡大篆作扵史籀小篆作扵李斯𨽻書作于程邈以至繆篆蟲鳥草書八分等書又紛然雜出秦漢之間因時制宜盖未始有定畫也皇元因造字以新天下之耳目諧聲以該六書之㑹母字四十一而變無窮焉故非智融而器䟽者不足以詣其妙大梁程生某蚤為闕人又善書得晉人筆意故學國字即敻出輩流翰林院試書言用為澧之柿溪州學正将行余告之曰書扵六藝非小数也天下之大而號令之行也書行之萬世之逺而事之傳也書傳之故周官有保氏之教漢法有太史之試後世又設博士弟子貟以専其業良有以也况今國字之為書也有我朝之大訓在焉設官内外将以同天下之文而布聲教扵四方也其為職不亦既重矣乎澧為遐壌學正能使其人習通其業則亦有補扵當世矣講授之暇毋徒歌楚辭扵渚蘭汀芷之間取柿溪霜葉悉書之筆勢當益進國家将磨皇之板書無前之盛烈且召子矣閻主簿孝行詩序霍邑人閻禄由蒙古字學教授除臨汾縣主簿未上而母死哀毁踰節廬墓以終其喪先是䘮父亦如之鄉黨稱其孝有司上其事朝省将有所褒嘉焉與往来者求搢紳為詩美之余書其右簡曰古者人無不學學所以求至扵成人也夫司徒以鄉三物教萬民而賔興之曰六徳曰六行曰六藝缺一則非成人况可遺其所甚重者乎故保氏教國子以藝儀必先審以師氏之徳行三代聖王治效之隆往往亦由在官者之有是學也後世之為學者岐道藝而二之以為敦徳未足以動流俗而衒藝有足以徼亟用為進身之計常有餘扵為人之道則不足夫書六藝之一而孝者六行之元也人知國字之足以進身而競習之曽亦知大司徒與師保氏所以教人者乎閻君以字學入官而篤扵孝行如此庶幾知古人三物為教之意矣他日臨民寜無以厚其俗乎贈沙井徐判官詩序天山之北臯陸衍迤聮亘乎大漠趙王之封國在焉王得選吏治其人豐州徐君善卿起家為沙井路揔𬋩府判官善卿嘗事王于邸王愛其俶儻而有學欲薦諸朝而大用之善卿獨曰沙井獨不足行吾志乎乃條其所宜施于民者行之不以激為亷不以察為智苛除繞觧有西漢循吏之風焉民舊業畜牧少耕種善卿始勸民力穡而生民滋厚又設學校以教之而民俗日殷輿人誦之曰我有廣野天山之下昔我善牧今我善稼我庾既作又榖我以學徐侯徐侯毋舍我而邈秩滿民上治狀留之王曰使理吾國皆若徐判官吾何慮焉乃以國人之請移中書復任之扵是吾黨咸賦詩美之余聞之民曷生乎食之也曷馴而寜乎教之也有虞氏命稷播百糓即命契敷五教當時命官莫此為急繼命皋陶明刑不過為弼教之計爾三代制治寖宻大要無出乎此後世以能吏稱者未嘗知有教養之道唯恃刑法以行其所欲為者而已矣嗚呼此後世之所以不古若也徐君位卑且佐理荒落之郡而能以教養為政若此使得専任中上牧守之寄其效又何如哉亂石湫禱雨詩序泰定戊辰之嵗陕右大旱民日益困有司散利去幾索鬼神莫之能禦六盤染織提舉燕山馬君愀然曰天人之相去邈矣職位之有守不可越矣然亦有流通而無間者乎吾雖非守土臣然食其禄者憂其事也况吾禄實出扵民而諉曰閔雨非吾職也是豈仁人之用心哉即屏葷酒沐浴齋戒輒俸錢買薌幣祝奠之物負之行五十餘里至亂石湫拜奠而黙禱焉忽靈風生水上如神騰鬼趯湫底湧出樽酒流抵岸側若将授君者左右咸驚異以為神所以表精誠而昭嘉貺也宜拜貺君再拜受而飲之以器入湫水迎至郡城寘諸叢祠有雲隨軒盖大㴻連日槁者蘇仆者起愁歎亡聊者鼔舞而驩欣民于是歌頌馬君如祝束長生焉余聞君為人正而静居官以亷介自将是宜有以格神明也易曰東鄰殺牛不如西鄰之禴祭實受其福吾扵馬君有以知其然乎送無錫州知州王誠甫序都水監經厯王君誠甫出知無錫州而徴言扵余余惟淛右租賦甲天下嵗轉粟京師数百萬石比嵗東南大雨水呉幾沼焉而無錫為淛右大州為州牧者其責亦重矣誠甫豈弟君子而婉畫水曺㝡久也凡天下川澤壅䟽與五溝五塗之制莫不熟講而周知之出而為是州豈非上之人所以用誠甫之意乎書曰三江既入震澤底定今三江皆已入海而無所湮滯乎震澤底定而無所湓溢乎吾知誠甫必有所建白而防庸之大荒大札舍禁弛力薄征緩刑之典吾知誠甫必有所申明而興行之惟趣集租賦而民隠之不恤則非長人者之道也是州泰伯始入呉所居之地也民之衣食既足因其舊俗而教之以禮讓之節囹圄空虗頌聲作扵田野此又上之人所以用誠甫之意乎予他日南歸将卜居扵茲未必不及誠甫之徳惠也喬生孝義詩序京師首善之地跂行喙息親接神化故雖愚夫愚婦有日遷善而不知為之者况知有隂陽五行之理而徴扵日用彛倫之間者乎喬生顯京師人知讀書能以人生年月日時鼓策推歩遂知来物人有懐疑不能自决者輒向生决之能示人以禍福趣舍之機無不應生事親有過人之孝友愛昆弟同居無間言閨門肅雍未嘗有疾聲厲色人益重之扵是朝廷旌其門為孝義之門客有欲為生求詩扵人為予言若此余謂生非藝術人也荘君平隠于卜筮與人子言依扵孝與人弟言依扵順與人臣言依于忠生之為術必亦若君平之與人言者乎夫身有之則其言親切而有味吾知生之言必易扵感人其孝友不獨行于家而已也有人如生大夫君子能不為之賦詩乎不然天新雨道少人試詣生與言如何石氏節婦詩序國子生王翼来言曰吾完州俗美男義女貞石氏女二十嬪于滿城夫曰王徳僅兩嵗并即荷戈與殳從軍南行矣凬乾中毒雨腐肌殞于戎行不得視父母與妻嫠哭水滸招魂以葬願糜此身為彼骨上土顧家有二老而兒方呱呱竈晏弗煬體無完襦奈何棄去而與良人俱扵是飲泣支憊還入室堂思曷為養惟婦功是臧夕鐙而纑晨筐而桑澤器欄灰渥帛漱裳力營食衣以保尊章使安彊廿年皆以夀終若不知其子之亡彼呱者瓚齒與徳茂誦詩讀書皆母之教石氏今死年六十五臨絶語瓚謂吾可以見爾父瓚懐母恩悲不能言以歌詩所傳能永被乎筦絃故託翼來乞書其實以徼恵扵諸賢送索士巖燕南憲司經厯序索君士巖除燕南憲司經厯将行徴贈言旅之言曰天下大物也天子與宰相勢不可獨治之于是設官以分治官衆不能皆得人也徳澤之未流民隠之無愬姦貪賊蠧之無所懲畏于是設風紀之官以䋲糾之其為任可謂重矣天下憲司凡廿有一道燕南居其首焉其地咫尺國門外實先宣風以為諸道望而一出言一舉足即聞朝廷之上其任可謂又重矣憲司官若吏權皆足以制郡縣禍福人而事不當律令幕官不署文書不得行使者雖行部逺外㑹議事幕官亦與裁之則其權又足以制夫妄禍福人者經厯元幕也其為任可謂又益重矣士巖此行集三重焉若之何而任之夫智力足以任天下之重而力有所不及智有所不周矣天運行而不息也地凝然而不墜也誰實任之曰氣誰實任氣曰理然則惟理可以任天下之至重者乎講學以明理制行以養氣此古之人所以大有為于世也士巖擢高第入史館又從事御史府布武華要之衢而毎退然若不勝衣君子扵是乎知士巖之學矣然則士巖今居憲幕可否事必不以區區智力與人較争短長其務以理勝不以言勝者乎雖然是猶非天下之至重者也士巖當益思所以任夫至重者哉送李中父使征東行省序高䴡在我朝如古封建國得自官人其秀民皆用所設科仕于其國皇慶間詔大比天下士自是始有試禮闈者然多綴末第或授東省宰屬或官所近州郡既歸即為其國顯官鮮更西度鴨緑水者夫自封建既廢天下仕者無不登名王朝其勢然也今高麗得自官人而其秀民往往已用所設科仕其國矣顧復不逺数千里來試京師者盖以得扵其國者不若得諸朝廷者為榮故雖得末第宂官亦甚榮扵其國况擢高科官華近為天下之所共榮者乎元統元年天子親策進士旅叨掌試卷簾内高麗李糓所對策大為讀卷官所賞乃超寘乙科宰相遂奏為翰林國史院檢閱官亦榮矣明年制詔天下興學校中父得捧制書東還且将以其舉于朝廷者恱乎親以及其鄉黨也余壮其行告之曰子歸見邦人諸友宜言上文明立賢無方未嘗鄙夷逺人如曽青丹砂不産于中國而中國實用之士患不適扵用不患中國之不已用也不然興學之詔何以逺頒于兹土哉易之漸曰鴻漸于逵其羽可用為儀吉吾将見揚翹于東方者與中父翩翩而来儀乎劉沂州慶夀詩序臨沂劉瓚文瑞為集賢都事時其父信甫母田夫人已推恩拜官封搢紳為文辭榮之今瓉官儀曺秩五品信甫又以子貴拜奉訓大夫益都路沂州知州飛騎尉臨沂縣男田夫人封臨沂縣君沂州今年八十有八夫人八十有二扵是大夫士又為歌詩以誦詠其福履之盛屬余序余嘗觀于樹藝之事矣生息蕃廡而利之收倍焉者必風雨之時土地之沃而人事之周也三者缺一焉則其生也弗遂惟人亦然天之所畀者厚身之所積者充子孫之孝養無不至則其所享必有優于人者矣彼有所不足者非賦予嗇于有生之初則培植不加于有生之後甚至戕其所得扵天者不然同生宇宙間何萬有不齊哉沂州孝友忠信能冲澹以養父心勤約以資生畜書以教子捐貲以周人之急而善徳又足以善其里俗伉儷皆登上夀居鄉邦受禄養安強夷愉無有不惬扵心豈非得之天者厚積之已者充而養志者之無不至而致然歟嗚呼何沂州扵斯三者之獨偹也漢官儀三老五更取男女完具者則入雖有徳有夀又必以有子為可貴况有子篤於孝又以寵禄及其親乎雖然吾聞化國之日舒以長方今四海寜謐和氣充鬯沂州得享安榮扵夀域之内則得于朝廷者多矣又不但三者之偹也送劉粹衷赴旌徳令序劉君粹衷之為旌徳令也客有過予而言曰粹衷名進士其為人也和而易宜在館閣為文章從容搢紳間奈何治縣縣難治也必有彊明之才而後可以剸劇粹衷奈何治縣予應之曰子以後世之吏求粹衷乎世以彊明稱者未必良吏也彊而無以養之必嚴刻明而不善用必苛察以嚴刻苛察而施諸政亦難為下矣大抵若是者皆急扵近名近名非良吏也古之君子未嘗有心扵治人而人未嘗不治扵君子誠以待物則物無不孚公以涖事則事無不當君子之身禮樂之器也政教修禮樂之用行焉禮樂之用行民将不治而化矣是可與嚴刻苛察者言哉孔子曰斯民也三代之所以直道而行也盖民不難治後世無善治之吏扵是乎有難治之民及其難治而又急之則所治者與治之者俱困矣詩不云乎豈弟君子民之父母孰謂和易者不足以治縣夫麟儀儀鳯師師不鷙不獰飛者走者莫不為之先後麟鳯亦何用其鷙與獰哉粹衷方将為麟鳯于旌徳旌徳之人方将先後之不暇而子顧以向者之言惑之無乃不可乎客唯而去明日粹衷来别因述與客言者為粹衷道之周此山集序風雅頌不作詩之變屡矣大抵與世相為低昂其變易推也近世為詩者言愈工而味愈薄聲愈號而調愈下日鍛月錬曽不若昔時閭巷刺草之言世徳之衰一至于此我國家以淳龎大雅之風丕變海内為治日久山川草木之間五色成文八風不奸士生斯時無事乎文章而其言自美况以文章而歌詠雍熈之和者乎周此山先生自括蒼来京師訪予靈椿寓舍與語竟日知能為詩因索其所作觀之何其言之藹如也夫志得意滿者其辭驕以滛窮而無所遇者其辭鬱以憤高蹈而長往者其辭放以傲先生懐才抱藝蚤有意扵用世既而託迹丘園不見徴用且老矣今考其詩簡澹和平無鬱憤放傲之色非有徳者能如是乎傳曰温柔敦厚詩教也先生可謂有温柔敦厚之徳矣予官橋門七年凡四方文字當程校者皆與寓目焉嘗疑山林間必猶有可觀者未之見也此詩盖余所謂未見者乎因為選其最佳者得若干首題為周此山先生集云丁氏世譜序周小史奠繫世辨昭穆其世譜之攸作乎夫繫世固邦國之志然凡得立宗以綴其族者非有譜識所從出條所由分則世逺族衆其繫必紊而昭穆之辨淆矣此世譜不可以不作也餘不丁氏吳興大姓也昔國家用兵江南時其家文籍盡散軼世緒無所于考清溪君道純蚤已出家為道士乃惕然以為隠憂蒐遺討殘積以嵗月作丁氏世譜一卷幹枝扶踈綱䋞聮絡而凡祖考告身舉削遺文墓誌咸載又求誌之不存者買佳石重刻之作時思菴墓側徴記名人與是編共傳于旡窮嗚呼六十年来故家子孫宅宅田田有不能道其先世一事者孰謂丁氏世譜乃出于其後人之出家為道士者乎丁氏三世武弁至宣教公始力學登進士第為天子史官斯亦榮矣典教南康日嘗叅訂朱氏儀禮經傳通觧鋟梓以行扵世夫先王之為教也莫重于禮禮經亡缺之餘莫偹于此書朱子于此盖終身拳拳焉然則譜中所載事實此其最章章然者也又何必以他功業自見扵世哉余謂禮所以秩人紀也世譜作則人紀秩而禮行焉丁氏世有禮學冝能作是譜歟或曰老子為周史為禮師清溪君又有得扵此歟祭噐圗序元統三年春太廟署言延祐中朝廷遣官至錢塘造太室祭器工物精純俱中法度乃者文宗皇帝升祔器皿趣辦一時視列室所陳功苦弗類宜用延祐故事更造之太常以其言言諸禮部而上于中書中書移浙江行省如所請而遣太常從事曰伴住者來視工扵是行中書省參知政事富珠哩某與左右司都事李某任程督事有司承命唯謹以是年六月壬申為冶鑄尊罍彛豆登鉶簠簋盤坫盆勺之類凡百有四事吉金在鎔範制孔良錯鏤磨治光潤龍變八月己未告成載如京師夫禮非器不存而敬者禮之所以存也器有未善則所存者有不足矣先王之扵祀事所以偹物而致美也今天子以仁孝承宗祧以禮樂風天下嵗時祼薦登降俯仰之間敬之所存其不在斯乎送甘允従甫北上序天可得而知乎曰天難知而理可尋霜未隕而裘褐製日未入而膏燭具何也人知燠寒晝夜之必相代而至也夫既知其必相代而至也而或戚戚扵未至或用其知力以求其所不必至是皆謂之不能知天陳留甘允従甫年少富才華天厯中遭逢聖明得在廷閣從搢紳先生纂經世大典方進用俄以病去乆之来江南補行省掾又拓落不偶扵是閉門讀書治文章窮巷草滅屨而允從之學大進矣夫蓄之厚者其用舒鬱之乆者其逹茂允從去此其将有得于天乎天何心哉盈虗消息相推而至者天不能嗇扵人而人不能辭扵天也今中書左丞耿公器識宏朗位高而禮恭海内之士咸願進見兾得展布尺寸况允従有知遇之素顧不得少自見扵宰都物之地乎吾知允從将有得扵天者殆亦扵是乎卜之嗚呼余閱世深矣事皆不足據惟天最可信允從其行矣哉安雅堂集卷四
