body:
  text: 安雅堂集卷四元陳旅撰序國朝文類序元氣流行乎宇宙之間其精華之在人有不能不著者發而為文章焉然則文章者固元氣之為也徒審前人制作之工拙而不知其出於天地氣運之盛衰豈知言者哉蓋嘗考之三代以降惟漢唐宋之文為特盛就其世而論之其特盛者又何其不能多也千數百年之久天地氣運難盛而易衰乃若此斯人之榮悴槩可知矣先民有言三光五嶽之氣分大音不完必混一而後大振美哉乎其言之也昔者南北斷裂之餘非無能言之人馳騁於一時顧往往囿於是氣之衰其言荒粗萎冗無足起發人意其中有若不為是氣所囿者則振古之豪傑非可以世論也我國家奄有六合自古稱混一者未有如今日之無所不一則天地氣運之盛無有盛于今日者矣建國以來列聖繼作以忠厚之澤涵育萬物鴻生俊老出於其間作為文章龎蔚光壯前世陋靡之風于是乎盡變矣孰謂斯文之興不有關於天地國家者乎監察御史鎮陽蘇天爵伯修慨然有志于此以為秦漢魏晉之文則收於文選唐宋之文則載於文粹文鑑國朝文章之盛不采而彚之將遂散軼沉泯赫然休光弗耀于將來非當務之大缺者歟乃搜托國初至今名人所作若歌詩賦頌銘贊序記奏議雜著書說議銘志碑傳皆類而聚之積二十年凡得若干首為七十卷名曰國朝文類百年文物之英盡在是矣然所取者必其有繫于政治有補于世教或取其雅製之足以範俗或取其論述之足以輔翼史氏凡非此者雖好弗取也夫人莫不有所為於世顧其用心何如耳彼為身謀者窮晝夜所為將無一事出於其私心之外至有為人子孫於其先世所可傳者漠然曽不加意遑及他人之文與天下之事哉覽是編者不惟有以見斯文之所以盛亦足以見伯修平日之用心矣伯修學博而識正自為成均諸生以至厯官翰苑凡前言往行與當世之所可述者無不筆之簡冊有國朝名臣事略與是篇並著廷論以文類猶未流布于四方也移文江浙行省鋟諸梓伯修使旅書所以纂輯之意于編端庶幾同志之士尚相與博采而嗣録之經筵唱和詩序古人有言曰天下重任唯宰相與經筵周成王能成其德由周公有以傅之也是豈過為高論者哉我世祖皇帝道參元化明並日月冝無待乎儒者之助矣萬幾之暇命許文正公與諸儒講堯舜孔子之道以登中統至元之盛夫以世皇上聖猶不能無賴乎此則世之為人君者能無賴輔導之功乎文皇帝以明宗有觀書之喻開奎章閣延學士大夫敷陳皇祖寶訓暨諸格言緝熙光明以師表天下而在位弗永志有未遂也今上皇帝以明考元子入紹大統有志祖宗之事御極之初即命兩丞相與賢臣碩彥之在著定者以聖謨嘉言與凡經籍所載可以充廣聰明增崇德業者一月三進講上接聽不倦而時有警惕之色于是益優禮講官既賜酒饌又以髙年疲于步趨也命皆得乘舟太液池徑西苑以歸聞者皆為天子重講官若此天下其不復為中統至元之時乎今監察御史鎮陽蘇君伯修時為授經郎兼經筵譯文官論定其說使譯者得以國言悉其指歸沐日又賦詩鋪寫盛事約同館之士與京師能詩者和之彚為一卷不鄙謂旅使序之嗟乎儒者之用心亦苦矣敝精神方冊之間莫不欲售其說于人主使四海之人咸被仁義之澤奈何自孔孟以來儒者之每不遇于世落落也程正叔氏以名臣薦身際元祐之朝似可以行其學矣崇政說書懇懇忠藎卒無所售而去况其他者哉然則儒者得以所藴進納于其君實千百載竒遇幸㑹也又安得不歡欣鼓舞而形諸詠歌也哉此伯修與諸賢之詩所以作也後之君子想見元統之治將于是乎觀焉送旺扎勒圖還河陽序國家初置成均本教國人子弟因寖及其餘焉國人子弟之所以學者非専尚乎文辭之葩華也訓詁之繁瑣也與細儒曲士角分寸于觚翰之間也醇龎之質偉茂之器固將有以成其美而忮之氣儻蕩之習亦欲有以變其故爾成周之造士也七年考其小成九年考其大成至是不率教者盡變不變王親視學又不變則為之三日不舉蓋學所以變氣質也不變則棄人也為君師者能不以是為已責哉蒙古生旺扎勒圖入學甫三載豫見其貌魁岸而善祥其意濶達而欵慤其言辨暢而縝理生之質亦善變矣揚子雲有云君子弸中而彪外也生之著于外者若是其必有所得于其中乎歸見父母父母必喜曰吾子去我久而能異於昔矣里中父兄來覿生必亦曰不見生久生異于昔矣吾知由生而有興起者焉吾知由生而有慕國學之為教者焉吾知生由是而益有以自勵者焉其行也同舍生為求言序以勉之送柿溪州蒙古學正序無懷氏封泰山以來字體之變尚矣其可考者古文作于蒼頡大篆作于史籀小篆作于李斯𨽻書作于程邈以至繆篆蟲鳥草書八分等書又紛然雜出秦漢之間因時制宜蓋未始有定畫也皇元因造字以新天下之耳目諧聲以該六書之㑹母字四十一而變無窮焉故非智融而器疏者不足以詣其妙大梁程生某蚤為闕人又善書得晉人筆意故學國字即敻出輩流翰林院試書言用為澧之柿溪州學正將行余告之曰書于六藝非小數也天下之大而號令之行也書行之萬世之逺而事之傳也書傳之故周官有保氏之教漢法有太史之試後世又設博士弟子貟以専其業良有以也况今國字之為書也有我朝之大訓在焉設官內外將以同天下之文而布聲教于四方也其為職不亦既重矣乎澧為遐壤學正能使其人習通其業則亦有補于當世矣講授之暇毋徒歌楚辭于渚蘭汀芷之間取柿溪霜葉悉書之筆勢當益進國家將磨皇之板書無前之盛烈且召子矣閻主簿孝行詩序霍邑人閻祿由蒙古字學教授除臨汾縣主簿未上而母死哀毁踰節廬墓以終其喪先是喪父亦如之鄉黨稱其孝有司上其事朝省將有所褒嘉焉與往來者求搢紳為詩美之余書其右簡曰古者人無不學學所以求至于成人也夫司徒以鄉三物教萬民而賔興之曰六德曰六行曰六藝缺一則非成人况可遺其所甚重者乎故保氏教國子以藝儀必先審以師氏之德行三代聖王治效之隆往往亦由在官者之有是學也後世之為學者岐道藝而二之以為敦德未足以動流俗而衒藝有足以徼亟用為進身之計常有餘于為人之道則不足夫書六藝之一而孝者六行之元也人知國字之足以進身而競習之曽亦知大司徒與師保氏所以教人者乎閻君以字學入官而篤于孝行如此庶幾知古人三物為教之意矣他日臨民寧無以厚其俗乎贈沙井徐判官詩序天山之北臯陸衍迤聮亘乎大漠趙王之封國在焉王得選吏治其人豐州徐君善卿起家為沙井路揔𬋩府判官善卿嘗事王于邸王愛其俶儻而有學欲薦諸朝而大用之善卿獨曰沙井獨不足行吾志乎乃條其所宜施于民者行之不以激為亷不以察為智苛除繞解有西漢循吏之風焉民舊業畜牧少耕種善卿始勸民力穡而生民滋厚又設學校以教之而民俗日殷輿人誦之曰我有廣野天山之下昔我善牧今我善稼我庾既作又榖我以學徐侯徐侯毋舍我而邈秩滿民上治狀留之王曰使理吾國皆若徐判官吾何慮焉乃以國人之請移中書復任之于是吾黨咸賦詩美之余聞之民曷生乎食之也曷馴而寧乎教之也有虞氏命稷播百穀即命契敷五教當時命官莫此為急繼命皋陶明刑不過為弼教之計爾三代制治寖密大要無出乎此後世以能吏稱者未嘗知有教養之道唯恃刑法以行其所欲為者而已矣嗚呼此後世之所以不古若也徐君位卑且佐理荒落之郡而能以教養為政若此使得専任中上牧守之寄其效又何如哉亂石湫禱雨詩序泰定戊辰之嵗陕右大旱民日益困有司散利去幾索鬼神莫之能禦六盤染織提舉燕山馬君愀然曰天人之相去邈矣職位之有守不可越矣然亦有流通而無間者乎吾雖非守土臣然食其祿者憂其事也况吾祿實出于民而諉曰閔雨非吾職也是豈仁人之用心哉即屏葷酒沐浴齊戒輒俸錢買薌幣祝奠之物負之行五十餘里至亂石湫拜奠而默禱焉忽靈風生水上如神騰鬼躍湫底湧出樽酒流抵岸側若將授君者左右咸驚異以為神所以表精誠而昭嘉貺也宜拜貺君再拜受而飲之以器入湫水迎至郡城置諸叢祠有雲隨軒蓋大㴻連日槁者蘇仆者起愁歎亡聊者鼓舞而歡欣民于是歌頌馬君如祝束長生焉余聞君為人正而靜居官以亷介自將是宜有以格神明也易曰東鄰殺牛不如西鄰之禴祭實受其福吾于馬君有以知其然乎送無錫州知州王誠甫序都水監經厯王君誠甫出知無錫州而徴言于余余惟浙右租賦甲天下嵗轉粟京師數百萬石比嵗東南大雨水吳幾沼焉而無錫為浙右大州為州牧者其責亦重矣誠甫豈弟君子而婉畫水曺最久也凡天下川澤壅疏與五溝五塗之制莫不熟講而周知之出而為是州豈非上之人所以用誠甫之意乎書曰三江既入震澤底定今三江皆已入海而無所湮滯乎震澤底定而無所湓溢乎吾知誠甫必有所建白而防庸之大荒大札舍禁弛力薄征緩刑之典吾知誠甫必有所申明而興行之惟趣集租賦而民隱之不恤則非長人者之道也是州泰伯始入吳所居之地也民之衣食既足因其舊俗而教之以禮讓之節囹圄空虗頌聲作于田野此又上之人所以用誠甫之意乎豫他日南歸將卜居于茲未必不及誠甫之德惠也喬生孝義詩序京師首善之地跂行喙息親接神化故雖愚夫愚婦有日遷善而不知為之者况知有隂陽五行之理而徴于日用彛倫之間者乎喬生顯京師人知讀書能以人生年月日時鼓策推步遂知來物人有懷疑不能自决者輒向生决之能示人以禍福趣舍之機無不應生事親有過人之孝友愛昆弟同居無間言閨門肅雍未嘗有疾聲厲色人益重之于是朝廷旌其門為孝義之門客有欲為生求詩于人為豫言若此余謂生非藝術人也莊君平隱于卜筮與人子言依于孝與人弟言依于順與人臣言依于忠生之為術必亦若君平之與人言者乎夫身有之則其言親切而有味吾知生之言必易于感人其孝友不獨行于家而已也有人如生大夫君子能不為之賦詩乎不然天新雨道少人試詣生與言如何石氏節婦詩序國子生王翼來言曰吾完州俗美男義女貞石氏女二十嬪于滿城夫曰王德僅兩嵗并即荷戈與殳從軍南行矣凬乾中毒雨腐肌殞于戎行不得視父母與妻嫠哭水滸招魂以葬願糜此身為彼骨上土顧家有二老而兒方呱呱竈晏弗煬體無完襦奈何棄去而與良人俱于是飲泣支憊還入室堂思曷為養惟婦功是臧夕鐙而纑晨筐而桑澤器欄灰渥帛漱裳力營食衣以保尊章使安彊草年皆以夀終若不知其子之亡彼呱者瓚齒與德茂誦詩讀書皆母之教石氏今死年六十五臨絶語瓚謂吾可以見爾父瓚懷母恩悲不能言以歌詩所傳能永被乎管絃故託翼來乞書其實以徼惠于諸賢送索士巖燕南憲司經厯序索君士巖除燕南憲司經厯將行徴贈言旅之言曰天下大物也天子與宰相勢不可獨治之于是設官以分治官衆不能皆得人也德澤之未流民隱之無訴姦貪賊蠧之無所懲畏于是設風紀之官以繩糾之其為任可謂重矣天下憲司凡草有一道燕南居其首焉其地咫尺國門外實先宣風以為諸道望而一出言一舉足即聞朝廷之上其任可謂又重矣憲司官若吏權皆足以制郡縣禍福人而事不當律令幕官不署文書不得行使者雖行部逺外㑹議事幕官亦與裁之則其權又足以制夫妄禍福人者經厯元幕也其為任可謂又益重矣士巖此行集三重焉若之何而任之夫智力足以任天下之重而力有所不及智有所不周矣天運行而不息也地凝然而不墜也誰實任之曰氣誰實任氣曰理然則惟理可以任天下之至重者乎講學以明理制行以養氣此古之人所以大有為于世也士巖擢高第入史館又從事御史府布武華要之衢而每退然若不勝衣君子于是乎知士巖之學矣然則士巖今居憲幕可否事必不以區區智力與人較爭短長其務以理勝不以言勝者乎雖然是猶非天下之至重者也士巖當益思所以任夫至重者哉送李中父使征東行省序高麗在我朝如古封建國得自官人其秀民皆用所設科仕于其國皇慶間詔大比天下士自是始有試禮闈者然多綴末第或授東省宰屬或官所近州郡既歸即為其國顯官鮮更西度鴨緑水者夫自封建既廢天下仕者無不登名王朝其勢然也今高麗得自官人而其秀民往往已用所設科仕其國矣顧復不逺數千里來試京師者蓋以得于其國者不若得諸朝廷者為榮故雖得末第冗官亦甚榮于其國况擢高科官華近為天下之所共榮者乎元統元年天子親策進士旅叨掌試卷簾內高麗李穀所對策大為讀卷官所賞乃超置乙科宰相遂奏為翰林國史院檢閲官亦榮矣明年制詔天下興學校中父得捧制書東還且將以其舉于朝廷者恱乎親以及其鄉黨也余壯其行告之曰子歸見邦人諸友宜言上文明立賢無方未嘗鄙夷逺人如曽青丹砂不産于中國而中國實用之士患不適于用不患中國之不已用也不然興學之詔何以逺頒于兹土哉易之漸曰鴻漸于逵其羽可用為儀吉吾將見揚翹于東方者與中父翩翩而來儀乎劉沂州慶夀詩序臨沂劉瓚文瑞為集賢都事時其父信甫母田夫人已推恩拜官封搢紳為文辭榮之今瓉官儀曺秩五品信甫又以子貴拜奉訓大夫益都路沂州知州飛騎尉臨沂縣男田夫人封臨沂縣君沂州今年八十有八夫人八十有二于是大夫士又為歌詩以誦詠其福履之盛屬余序余嘗觀于樹藝之事矣生息蕃廡而利之收倍焉者必風雨之時土地之沃而人事之周也三者缺一焉則其生也弗遂惟人亦然天之所畀者厚身之所積者充子孫之孝養無不至則其所享必有優于人者矣彼有所不足者非賦豫嗇于有生之初則培植不加于有生之後甚至戕其所得于天者不然同生宇宙間何萬有不齊哉沂州孝友忠信能冲淡以養父心勤約以資生畜書以教子捐資以周人之急而善德又足以善其里俗伉儷皆登上夀居鄉邦受祿養安強夷愈無有不愜于心豈非得之天者厚積之已者充而養志者之無不至而致然歟嗚呼何沂州于斯三者之獨偹也漢官儀三老五更取男女完具者則入雖有德有夀又必以有子為可貴况有子篤於孝又以寵祿及其親乎雖然吾聞化國之日舒以長方今四海寧謐和氣充鬯沂州得享安榮于夀域之內則得于朝廷者多矣又不但三者之偹也送劉粹衷赴旌德令序劉君粹衷之為旌德令也客有過豫而言曰粹衷名進士其為人也和而易宜在館閣為文章從容搢紳間奈何治縣縣難治也必有彊明之才而後可以剸劇粹衷奈何治縣豫應之曰子以後世之吏求粹衷乎世以彊明稱者未必良吏也彊而無以養之必嚴刻明而不善用必苛察以嚴刻苛察而施諸政亦難為下矣大抵若是者皆急于近名近名非良吏也古之君子未嘗有心于治人而人未嘗不治于君子誠以待物則物無不孚公以涖事則事無不當君子之身禮樂之器也政教修禮樂之用行焉禮樂之用行民將不治而化矣是可與嚴刻苛察者言哉孔子曰斯民也三代之所以直道而行也蓋民不難治後世無善治之吏于是乎有難治之民及其難治而又急之則所治者與治之者俱困矣詩不云乎豈弟君子民之父母孰謂和易者不足以治縣夫麟儀儀鳯師師不鷙不獰飛者走者莫不為之先後麟鳯亦何用其鷙與獰哉粹衷方將為麟鳯于旌德旌德之人方將先後之不暇而子顧以向者之言惑之無乃不可乎客唯而去明日粹衷來别因述與客言者為粹衷道之周此山集序風雅頌不作詩之變屢矣大抵與世相為低昂其變易推也近世為詩者言愈工而味愈薄聲愈號而調愈下日鍛月錬曽不若昔時閭巷刺草之言世德之衰一至于此我國家以淳龎大雅之風丕變海內為治日久山川草木之間五色成文八風不奸士生斯時無事乎文章而其言自美况以文章而歌詠雍熙之和者乎周此山先生自括蒼來京師訪豫靈椿寓舍與語竟日知能為詩因索其所作觀之何其言之藹如也夫志得意滿者其辭驕以淫窮而無所遇者其辭鬱以憤高蹈而長往者其辭放以傲先生懷才抱藝蚤有意于用世既而託迹丘園不見徴用且老矣今考其詩簡淡和平無鬱憤放傲之色非有德者能如是乎傳曰溫柔敦厚詩教也先生可謂有溫柔敦厚之德矣豫官橋門七年凡四方文字當程校者皆與寓目焉嘗疑山林間必猶有可觀者未之見也此詩蓋余所謂未見者乎因為選其最佳者得若干首題為周此山先生集云丁氏世譜序周小史奠繫世辨昭穆其世譜之攸作乎夫繫世固邦國之志然凡得立宗以綴其族者非有譜識所從出條所由分則世逺族衆其繫必紊而昭穆之辨淆矣此世譜不可以不作也餘不丁氏吳興大姓也昔國家用兵江南時其家文籍盡散軼世緒無所于考清溪君道純蚤已出家為道士乃惕然以為隱憂搜遺討殘積以嵗月作丁氏世譜一卷幹枝扶踈綱䋞聮絡而凡祖考告身舉削遺文墓志咸載又求志之不存者買佳石重刻之作時思菴墓側徴記名人與是編共傳于旡窮嗚呼六十年來故家子孫宅宅田田有不能道其先世一事者孰謂丁氏世譜乃出于其後人之出家為道士者乎丁氏三世武辨至宣教公始力學登進士第為天子史官斯亦榮矣典教南康日嘗參訂朱氏儀禮經傳通解鋟梓以行于世夫先王之為教也莫重于禮禮經亡缺之餘莫偹于此書朱子于此蓋終身拳拳焉然則譜中所載事實此其最章章然者也又何必以他功業自見于世哉余謂禮所以秩人紀也世譜作則人紀秩而禮行焉丁氏世有禮學冝能作是譜歟或曰老子為周史為禮師清溪君又有得于此歟祭器圗序元統三年春太廟署言延祐中朝廷遣官至錢塘造太室祭器工物精純俱中法度乃者文宗皇帝升祔器皿趣辦一時視列室所陳功苦弗類宜用延祐故事更造之太常以其言言諸禮部而上于中書中書移浙江行省如所請而遣太常從事曰伴住者來視工于是行中書省參知政事富珠哩某與左右司都事李某任程督事有司承命唯謹以是年六月壬申為冶鑄尊罍彛豆登鉶簠簋盤坫盆勺之類凡百有四事吉金在鎔範制孔良錯鏤磨治光潤龍變八月己未告成載如京師夫禮非器不存而敬者禮之所以存也器有未善則所存者有不足矣先王之于祀事所以偹物而致美也今天子以仁孝承宗祧以禮樂風天下嵗時祼薦登降俯仰之間敬之所存其不在斯乎送甘允從甫北上序天可得而知乎曰天難知而理可尋霜未隕而裘褐製日未入而膏燭具何也人知燠寒晝夜之必相代而至也夫既知其必相代而至也而或戚戚于未至或用其知力以求其所不必至是皆謂之不能知天陳留甘允從甫年少富才華天厯中遭逢聖明得在廷閣從搢紳先生纂經世大典方進用俄以病去久之來江南補行省掾又拓落不偶于是閉門讀書治文章窮巷草滅屨而允從之學大進矣夫蓄之厚者其用舒鬱之久者其逹茂允從去此其將有得于天乎天何心哉盈虗消息相推而至者天不能嗇于人而人不能辭于天也今中書左丞耿公器識宏朗位高而禮恭海內之士咸願進見兾得展布尺寸况允從有知遇之素顧不得少自見于宰都物之地乎吾知允從將有得于天者殆亦于是乎卜之嗚呼余閲世深矣事皆不足據惟天最可信允從其行矣哉安雅堂集卷四
