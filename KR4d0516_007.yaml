body:
  text: 安雅堂集卷八元陳旅撰記趙氏祭田記古之君子有圭田以蠲祭有宗法以聨族子孫嵗時得相與追念其所從出者焉自夫田制宗法之皆廢也雖貴臣大家有私田以供粢盛而世逺族分能存田以祀其先者寡矣惟不知祀其先也則寖昧其身之所從出惟昧其所從出也則視其族人若塗人矣鳴呼此後世人紀之所以解散而莫收也天台黄巖趙氏之族長與慶使其從子海鹽州知州孟貫致書于陳旅曰吾祖宗正少卿諱子英宋南遷時為黄巖丞因家于邑之西橋有子六人諱伯淮伯渷伯洙伯淔伯滸伯澐皆以文學登膴仕至其孫太常丞諱師淵判宗諱師夏皆受業于朱子之門且締姻焉故趙氏能以禮世其家焉雖宗支蕃旉而必合族以祭凡執事皆子弟為之少長秩然周旋一庭之間如是者百有五十餘年趙氏之老人謀于廟曰中州之宗祏園墓化為墟草久矣自宗正來則不可無祀然世益逺族益分矣逺則易忘分則易携誨忘宜有其物乃以宗正所遺田百六十畝存之以為祭田族之長者主之嵗更擇子姓之愿而才者掌其出入而世以為常至元内附時宗正四世孫與票以碩學雅徳受知于我世祖皇帝為翰林學士得請自宗正四世而下俱復其役遂欲以昔之祭田託薦紳記諸石庶後人知所以存田之意未及記而卒今又三十餘年矣與慶於學士為弟以齒序實主族事念前志不可以不竟子宜記之旅受書嘆曰嗟乎故國之社屋矣西橋之宗猶有田以祀其先其人猶得不與編氓同役甚矣我世皇之優賢而學士之能亢其宗也凡在是族者盍亦思曰祭以報本也有身則有祭初不系乎田之有無况有田乎又以世承恩庥得安然用其地之入以祭以燕於其私乎誠若是思之則掌兹田以祭者又何忍以其身為蟊賊哉不是之思惟欲得利于已則隳成規啟弊端曽幾何時田且不存祭于何有而逺者日益忘分者日益携矣吾聞趙氏多賢子孫必無是也萬有一焉則上負國家中負祖宗下負來裔尚得謂之賢子孫乎拙休堂記嚴陵洪省吾外樸而内文篤志古人之學雅不樂榮進錢塘學者迎致吴山下請授徒數月亦不樂去將行與余言曰吾居淳安錦溪之上北有嚴峰青峭若植筆然又有赤甲巖危瞰溪北下臨層淵巖中可坐卄人山石丹碧錯若織文前有素沙如雪可百畝許月夕汎舟登岸光皦奪目東則石山屹立水心竹樹森翳號小金山此錦溪山水之槩也吾于其聞以畊以漁以讀吾書而遂老于斯矣葢造物者賦我以拙不足以有為於世吾又安能違物以闖闖然于有為者之途故以拙休名堂子為我記之余謂省吾殆若晉人所謂拙者可以絶意乎寵榮之事者歟彼固不能以拙自全省吾真用其言以保其身歟余嘗見縁高竿以衒技者恃其儇捷可僥倖得厚利遂為之不已一旦手足失措忽若飄瓦仆地觀者皆失聲有過之而嘆曰嗟乎巧之使人至是哉人不能用巧為巧所用不至于顛墜不已余以其言類知道進而問之曰有用巧之道乎曰用之以拙而不强用之也古之能大用其巧者無為而功成妙萬物而萬物不知也至于所不必用則亦不用而已矣世之人顧有以拙為巧而又强用之于所不必用之地是以敗者常相踵也夫巧者猶有所不必用而况拙乎余悲世之縁高竿而不已者衆矣又善若人之言類省吾之所名其堂者因述之以為記致亭記魯郡王致道先生因其字而名其亭曰致亭葢取魯論所述子夏之言也致道使余記之屢辭弗獲乃言曰儒者之任甚重也道甚逺也而吾欲以眇然之身任其所重而必至其所甚逺者焉亦難矣是故君子之敎人也必考前言以審其所嚮求往行以廸其軌轍身吾車也載之不可不𢎞氣吾馬也䇿之不可不力志吾御也持之不可不敬夫如是則庶乎重與逺者之可至也易之文言傳曰知至至之知終終之以剛健而致力於學亦奚重與逺之有哉致道蚤嵗屏棄俗事聚書嶧山之幽晝誦而夜思葢欲約羣籍之浩然者而㑹通之亦良勤矣學成賔興遂擢進士第學者私相朂曰先生為學猶農夫之治穡事闕其穫矣吾不可不致力於學乎致道聞之曰吾闕非欲致進士而止也周子不云乎士希賢賢希聖聖希天吾雖不敢妄意古人所造之地俛然日有孶孶不敢半途而自畫也是固致道所以名亭之意余又聞致道曩居嶧山實漢韋賢讀書之所也因為誦韋氏之詩曰誰為華高企其齊而誰謂徳難厲其庶而請書此以為記致道名思誠學行純正士林之望也累官翰苑其文又益著云水月樓記蘭溪州知州陳侯奕為余言曰吾祖南隠翁居弋陽梅山之下務樹徳以貽後人先子黄嵒府君又於其所作小屋環植梅數百著書其中名其屋曰梅間而吾又闢南隠翁之故址為屋如干楹奎章學士蜀郡虞公為書壽梅二字以顏吾堂搢紳先生又皆為歌詩焉然吾所居之前嘗鑿池十餘畆以大來山泉靜深開舒魚鳥下上池西為樓池左右為亭樓前老梅數本花時明月來照水光乗之幽馥寒艶殆若化為清氷夫然後知梅花之有得于水與月也因取孤山林君復詩語名樓曰水月它日倦游來歸將與客銜盃賦詩于其上聊以佚吾老也子為我記余曰妙矣乎陳侯之觀夫水與月也水得月則益清月得水則益明觀二者之相與徘徊乎空洞之野則又不若于其精神之㑹而觀之方諸非水也而水興焉夫遂非火也而火集焉梅花非水月也而水月之精神㑹焉陳侯為樓以觀夫二者之㑹天下之言觀者孰有妙于此哉想其端居芳夕晤茲流光必又有契于其心之所㑹者矣昔之言先天者有天根月窟之喻有天心水面之詠而言梅花者則有具太極之㫖陳侯其又有得于此者乎請以是為記福州文殊禪寺記福唐郡治之東南有寺曰文殊五代時閩王王氏創始也當宋之季有强宗據之以作室寺遂廢既而强宗向衰若有物憑陵其中居者輒不寧因數易主而竟歸釋氏國朝初置僧司嘗以是司署尋復遷毁至為榛蕪之區至元甲午東谷禪師慧日慨然以起廢為已責遂度故址為寺法堂粗成而師老矣元統甲戌師之弟子宗茂乃大捐私錢以究師志里之好善者徃徃翕悦佽助于是構祕殿以居文佛樹長垣以周寳坊山門有嚴寮廡咸秩又繕法堂制供器立伽藍神祠于寺之左而凡所冝有者以次具治黝堊丹漆侈然光新開士之良爰集爰處以祝景貺于國家而相與講其所傳者于此也宗茂通敏而鎮愿數游京師公卿貴人多雅重者奎章閣大學士康里公世家名臣清慎不妄接物而書名又重當世時為大書寺額與之人以為榮宗茂謂余曰吾寺久廢而師與我復之非易也願為我記使後之委情而無立者知所儆厲而一時之勢力足以肆其豪奪者亦知其所為之不足恃也余曰昔之為此與奪而有此者自今觀之等夢幻耳子之所為又有足恃者乎宗茂曰不然吾之所學常欲空諸所有則不空者常存世之人常欲有其所無故終歸于無有而况空有兩無亦何有乎夢幻且吾方欲與吾徒講此于茲寺也濟無涯之淵而欲吾失其艅艎可乎余曰宗茂亦善辯因為述其言以為記春風亭記禮部侍郎趙郡蘇公伯脩有别墅在真定城北之安豐治其地為園植桃杏數十本而築亭其中意倦遊來歸則與里之賢者于焉夷猶覽春物以舒神情也徃嵗奎章閣學士蜀郡虞公嘗名之曰春風亭且為大書之今年旅㑹伯脩于京師則又使旅為之記嘗聞古之君子知人身有同于天地而萬物之皆備於我也故常欲以其身槖籥乎天地之和雖或制于勢力之所不及而睟面盎背足以使人歆動嚮慕而善祥之心興焉是故居人之鄉則其鄉大穰為人之國則其國大治此世所謂仁人而有志之士所以學至於是焉者也昔者孔子喟然歎曰吾與㸃也程子謂其言有堯舜氣象旅嘗因程子之言而思之於變時雍與綏來動和同一機也體信以達順窮神以知化鼔萬物而萬物不自知其所以然也近世伊洛數君子其亦有志於此者乎卲子之學不見于施用佳時出游士大夫欣然耳其車音雖童兒僕𨽻亦莫不喜其至使以其學施用于世又何如耶程伯子所至而民化既去而人思之以忠誠孚于人主而始終不疑極言新法之非便而爭者不怒朱公掞以春風言之可謂善言徳行矣方宋盛時而二子居天下風土之中游從往來託風雲卉木以吟詠其所適何其藹然浴沂風雩之悰乎嗚呼二子皆學堯舜孔子之道然也而世之學者莫不曰學堯舜孔子亦曽及此乎哉不及乎此不過得堯舜孔子之粗耳伯脩清明而温厚又善學以成其徳人與之處不知和氣之薰蒸也今為春官小宗伯方為天子治禮樂翕宣隂陽以和神人又將入政府贊大化使仁風翔乎四表而后言歸故鄉與壤翁轅童燕休斯亭以同歌堯舜之治不亦盛歟環溪堂記古之君子其祀先也有廟其合族也有宗所以崇孝而廣愛也自夫後世之弗篤乎此也故雖世家子孫有漠焉于其所從出而曠焉于其所同生者矣至有家自為祭則惟其意之所欲祀人自為族則惟其勢之所未分况又于是有不逮者人紀一斁豈天下之細故哉有志之士以為先王之禮固未之能行苟可以廸天衷翼世教則寧過于厚而亟為之是亦制禮者之心也世有若人吾能勿予之乎沖真明逺𤣥静真人張公徳隆造余而言曰廣信之貴溪有山若大象然山隂雨瀑噴薄飛舞於青林丹崖之間流為兩川透折瀰迤兩川所環而有良田美地則吾張氏之居在焉吾甞築堂川上名曰環溪雲漪抱堂清氣囬合盖將于此祀吾先合吾族也願記諸石以示吾後人按張氏起漢留侯魏太山太守岱自河南徙清河唐相文瓘之孫介為杭州刺史因家于杭後遷徽又遷饒自饒分宅建昌宋初諱戩者從建昌來貴溪戩四世孫為緒緒生贈大中大夫貫貫子運登宣和進士第官至通奉大夫敷文閣待制累贈少師開府儀同三司貴溪開國伯諸子弟皆通顯後又分遷畨易緒之季子遹止居貴溪五世而生開府儀同三司特進上卿𤣥教大宗師諱留孫以清靜無為之道弼我世皇皇帝于寧壹海隅之日列聖咸用其言以出𤣥𤣥化其父九徳貳江東宣慰積階大中大夫既而推恩三世大中加開府儀同三司大司徒上柱國魏國公兩孫皆良二千石族之仕者視昔盖彌衆矣遹之長子曰适适二子宗伯行已端其諸子皆學于陸文安先生宗伯四世為德隆則大宗師從子也其言曰自顯祖以來固吾之所祀者而張氏盛于今日由大宗師吾以從子繩嗣其道則又吾之所當祀者然大宗師實用老氏之教以興甞請于朝追贈祖師七人皆為真人始曰張思永四曰張聞詩皆吾族之達尊而大宗師入道諱聞詩者復挈將之凡若是者吾之所不得不祀者也吾族之會于斯堂以共思夫裕吾後亢吾宗者何可忘又思夫同出于吾祖之一身者何可不相戚也上而祀先下而合族精神血氣之感通有不在于斯乎予嘗觀于易之萃與渙矣萃聚也渙散也皆以廟言之何也葢謂人心難一也鬼神難合也必于廟而后可以攝持天下之離散者矣故先王制禮公卿大夫士皆得立廟以祭以燕憧憧往來之思莫不歛束于懓然肅然之時祭于是則祖考格矣燕于是則宗族睦矣傳曰禮猶酒蘖也君子以厚小人以薄真人祀先合族雖不必盡準古禮寧過于厚以厲夫已薄之俗則又君子用禮之權也歟昔孔子學禮于老耼本乎常以通乎變概見于戴氏之書老子固百世之禮師而禮無大于秋倫理者張氏世儒復有所受于文安先生其所為夐于流俗之為老氏者冝矣真人侍祠尚方嵗時來歸薦常事于環溪之上小大咸集處畨易者不逺亦來雕車文駟克溢里衖明簪華韍煥映軒所漆漆以祭衎衎以宴將不自知所祭者之既逺所燕者之已䟽也里人叢然觀之孝愛之心有不油然而生者乎然則真人又匪直厚于一家而已也世有若人吾能勿與之乎環翠樓記豫章范孟徳集賢直學士揭先生之世姻也其子良臣静莊而嗜學先生以其弟之子妻之良臣從先生學于京師余數與語而知其世之務夫徳也范氏居豐城東六十里櫧山在其南寳林招雲在其東西灌溪在其北而游溪之山峙焉孟德于所居之東為樓四楹以庋書而使良臣居之良臣讀書之暇憑高望逺則層巒列岑拱會聨絡近則巨木崇竹㕘錯翳蓊環樓而觀何其蒼然者之咸來也于是先生名其樓曰環翠且爲大書之良臣又以先生之言來請記予告之曰先生亦欲子之益務夫德也珠生而厓不枯地有寳藏則神明之光舒焉善候息耗者不求之于人而觀其屋室門户之潤澤也賢者亦何事于山川草术之觀哉而賢之所居則山川為之明秀草木為之津華其善色之所鍾則在其屋室門户之間矣然則樓曰環翠者其范氏務徳之休徴乎昔御史中丞馬公伯庸與余言曰吾晝坐華隂縣廨山翠飛至几上其山有隠君子吾不得而見也予每憶其言則有夐塵之思焉他日過豫章之野望豐城櫧山挹其飛翠而想見其隠于是者亦庶幾若人之高情哉西巖書院記巢湖周三百里湖北之山曰西巖其顛石筍高百尺山原麓衍迤左右隆起環向風氣深厚河南程氏居其中再世矣屋後有松萬章笋石逈出松上直檐中屋前大池繚以嘉植池前有田冝稻屋傍竹萬个排園蔬畦果蓏之區麗焉程氏之仕于朝者曰謙夫與序言曰士莫不欲仕也而吾惡夫士之徒仕也舊學荒落而事變之方來無窮拮荒落之學以應無窮之事變欲其能及物難矣吾于吾宅之左為堂四楹以聚書其地窈而燠其址夷以固其材美而樸其户牖適暄涼之冝吾出而仕退而休則與同志者温燖故讀以考求前言徃行之懿或者他日措諸行事之紛而弗繆也堂之後得亢爽之所為小亭西南面湖湖中孤山蔚然烟帆水鳥往來于空濛澒洞之中吾讀書之暇則登斯亭臨廣野以觀夫天地之大吾之滯焉者于是乎釋之狹焉者于是乎廓之而吾又思乎立志之難而持其志之尤難也志立于窮居之時而不奪于富貴利達盖鮮矣顧亭側長松彌望因取范魯公質之詩名亭曰晚翠吾于居而學焉于游觀而儆焉則庶幾吾之所欲至者矣予在京師與謙夫雅厚同舟南歸見其讀名臣言行録輒歎曰善為政者孰非學之力哉謙夫葢有志于及物者也予聞善仕者必善學為政不本于學術則斯民不被仁義之澤世之擅吏事者類指儒生為腐迂不足用儒生病其不與已也或既入官則凡孔孟之言噤不出口日與傳簿書者相狎習則引挈入要途取髙爵厚禄以去不復計其及于物者何如也謙夫由國子生㕘京秩可與羣有才者馳騖于功名之會乃為書堂與鄉黨子弟論學于人所不與之地非器識過人逺甚其能之乎昔者儒先往往既仕之後歸與其徒講道山林之間後人又即所為書院以企慕其風猷而有得焉謙夫誠篤志儒先之所為者將見淮南學者日興起于西巖之下矣謙夫屬予記之是為記嘉興路儒學教授題名記無錫强可仕行之之教授嘉興也以書來言曰江南被國家聲教六十四年矣典教于此者多昔時名士而皆未之有記學中老人猶能厯厯言之失今不紀益久將無徴焉而吾方飾弊起墜惟日力之不逮也兹始追考至元丙子以來得廿四人勒其名于貞石吾與來者得序書其後願記之以視儆也予惟堯舜禹湯文武周公孔子之道大矣善為治者每使校官掌之以授多士葢以為士者民之望也士習正則民俗美民俗美則世徳厚世徳厚則唐虞三代在是矣任教事者固為治之機寓焉汎乎其來蔑爾以去亦何其不為吾道計也氏名邑里與其嵗月既一一具列後之人其有考矣陸宣公郡之先哲也其言曰上不負天子下不負所學為此邦校官其亦味斯言哉其亦味斯言哉行之敦茂而有才用意學事吾將見其有成績也崑山州崇福觀記崇福觀者本崑山胥氏之宅也胥氏之族曰舜舉者學黄帝老子之道又自念幸居太平之世食田而衣桑優游以無虞者上之貺也吾儕小人報貺何以惟以吾之所有者格諸神明以求致景福于國家乎元貞元年乃改宅為觀殿堂門廡與凡室屋髙廣中度象設神君仙人之屬身為道士事之又以田十頃有竒為觀田總道教者因表其觀曰崇福以舜舉為之主者延祐五年舜舉卒其子曰處仁曰若弼者繼之泰定中有司以老佛之未異于民者民之胥氏去為民而觀日寖圮矣初文宗皇帝之龍潜金陵也嘗至郡之𤣥妙觀登冶亭以覽其山川既臨御改𤣥妙觀為大元永壽宫命晉雲趙嗣祺主領宫事授教門真士𤣥明𢎞道虗一先生宣城陳寳琳為主持提㸃教門髙士虛白先生嗣祺等遂大作新宫雄麗甲江左四方以為榮觀元統二年處仁若弼與其弟斗孫起宗謀曰吾兄弟固不得主崇福而坐視其圮可乎冝託才美聞望之士治而起之苟先緒勿墜猶胥民主之也乃皆曰願以宗福𨽻永壽為友院趙真士并治誠冝事聞上為降璽書如所請亦俾寳琳共治之于是觀之敝者葺散者集而𢎞久之規立矣真士風神峻爽志廣而慮周自受知仁廟以來數奉詔代祠名山大川與諸所宜祀者領道宫凡數處其大者皆賜名視五品寵光曄然而嗣天師與大宗師張真君今大宗師吴公暨諸名公卿大夫士又皆愛重之真士未甞有侈盈之色益冲約勤力勿懈陳高士又輔成之故所治之宫無不如志胥氏可謂得其所託者矣夫是觀之作所以崇福于吾君也而福萃于一人所以及天下也天下受其福胥氏不與有乎崑丘在東海上果有羡門安期之徒乗雲氣往來于其間真士則設其謹候之曰蜚亷桂館不在故處今天子使我候公等于此矣思敬堂記敬之于人大矣吾以之事天吾身天之所賦也敬身則事天矣天理流行于君臣父子兄弟夫婦朋友之間吾忠君愛親而善于兄弟夫婦朋友則事天矣自屋漏以至于户庭之外自吾身以及乎事物之衆無非天之所在則無一息之可以不敬也吾其可弛焉而不思乎夫敬者所以持吾心也世之人日以其心與世之得失利害相轉旋于無窮忽不自知為禽犢者亦何其不思之甚也不思而使人至為禽犢則思之于人亦大矣是故君子之於其心也靜而未思則敬以存之念慮之萌則敬以察之敬存則體信敬察則達順信體則禮立順達則樂作禮樂其于身而天地萬物之情通焉吾將為若人於斯世也如之何勿思天台許廣大具瞻為予言曰我先人以思敬名堂又嘗以是為詩使廣大誦之廣大不敢忘也泰定三年先人即位其年堂厄于吴囘越三年作新堂仍舊名元統元年廣大忝進士第遂有俸食粗樹立念先人不可復見子幸記吾堂吾蚤暮視之庶緒言之未逺也子曰許氏善教子矣聖人教敬之言著諸方策者盖諄諄焉學者類習見聞而弗思也思則敬在兹矣其瞻宦學四方甞槖其父所示詩而時閱之父歿十五年堂非其舊猶屬予記所以名堂之意非思之篤于敬者其能之乎古之能大為善于天下者未有不由孝親之心而充之具瞻將大思敬之道其亦本于此哉洞虛宫三元洞仙殿記無錫洞虛宫本梁大同間所創斗山青𤣥觀也宋初徙置城中賜額曰洞虛觀我朝泰定元年改觀為宫盖為國家建熙事之會所士民禱祠之靈區也初州之髙士華君益謙既主宫事又兼治杭之宗陽西太乙宫以謂洞虛則出家受業之地土田之入雖薄室屋衰壞不可以不葺乃數往來繕完之至順三年秋有不戒于火者三元祠山之殿燬焉則又歎曰茲其可以已乎夫穹然而覆于上者天也兀然而載于中者地也沛然而流于下愈逺而不可窮者皆水也是三者物莫能大之人生其間善惡之有紀功過之有考得不在其官乎將使人逺禍而趨福者其亦在于此矣若祠山大神則古所謂禦大菑捍大患者天高矣地厚矣水深矣髙則人莫得而至也厚與深則人莫得而入矣大神則能出入有無而通乎人所不能通者故旱乾水溢與凡隂陽之沴皆能為人幹囘于沕漠之頃而銷弭之則三元與祠山之祠皆不可以不作于是在宫之有職掌者曰安以道沈常徳童德和等經營之好善之家樂于佽助遂庀工度材作而新之至元冄元之四年某月吉日告成壇堂䆳嚴像設莊麗光靈威望視昔有加州人來觀歆嚮畏飭之心生焉夫盈宇宙之内者皆鬼神也物之細者鬼神具焉況其大者與其精爽之赫然者乎然而人心者鬼神感應之機也以汎散之心茫然求之則不若為貌位以聚夫求之之心心之所聚鬼神之所在也華君于其所在以其法醮祭之亦必有其應矣葢三辰順軌川澤率職寒暑節風雨時百物咸殖上之人無憂而有壽下之人皆無惡而有善䝉神之庥得相與安樂于太平之世此所以祝釐之意也世之務私其身者固不遑于他及其或脱去物累翛然而獨往者又皆有所不為求其能如華君之用心者亦鮮矣予于其徴記也故喜為書之宫昔有方丈之室自宋南渡以來尉假之以為署至于摧腐不可支也因撒去之且六十年矣今亦仍故址以為室云慶元路儒學新修廟學記學記曰古之教者家有塾黨有庠術有序國有學謂學所以化民而成俗也故善為治者必建學以崇教化而任風紀師帥之職者不敢不以是為己責也四明郡學唐開元中立貞元中宣聖廟立宋天禧中廟與學徙郡東北陬建炎中燬于兵而殿獨存宋在江左百五十載鴻生鉅臣蔚然出乎句章其絃誦之舍冝益完且美矣我世祖皇帝既統壹海宇以孔子之道可以隆化基也乃興起學校登用儒雅天下翕然向風至元十九年慶元廟學災當時守臣務亟成室屋規制簡易二十八年始大營建至大二年更造大成殿皆部使者作興焉厯嵗滋久昔之閎壯而炳絢者皆頽圮而黝闇矣仍改至元之四年冬亷訪副使寧夏順昌公行部至郡首展謁廟下又環視師弟子舍歎曰是出風化之地也而衰敝若此今不葺責在我矣總管上饒張滎祖蹙然曰是吾責也于是亷訪公屬侯即圖之乃考學田之入徴宿逋縮浮費以庀材物工傭之需屬同知燕山齊侯謙總程督事齊侯展布心力先葺禮殿新聖容為壇構神棲而加幎焉四配十哲暨從祀諸子皆飾其容觀在殿上者為壇㡩在兩廡者施承塵顒卬圭璋之儀黻黼文章之盛來觀者若見聖賢于洙泗之上低囘而不能去也先是尊經閣梁楹棟榱皆朽蠧且壓明倫堂亦墜漏不足蔽風雨矣至是悉以貞材代腐木以密瓦易踈以夷甓除壞階若殿門先賢祠八齋大小學庖庾莫不繕治又仍故址為守神之祠範金以補禮器之未備者明年秌教授金華王苰以書來請記竊惟孔子之道堯舜禹湯文武之所以善天下者孔子則以之而善萬世也其理具于人心而著于君臣父子兄弟夫婦朋友之倫其教具于六籍而講于庠序行于邦國廟朝鄉黨家庭之間人知講學則孔子之道明孔子之道明則唐虞三代將不在堯舜禹湯文武而在乎今之世矣為天下者不能使人人皆從道也故既設校官教之又俾為師帥者教而率之任風紀者宣風化而飭厲之不以是道善其民是鄙其民不以是道善其身是不愛其身鄙民非仁不愛身非孝亷訪公與郡長貳以興學為己責為其民者盍亦知所勸矣四明多碩學篤行之士而故家遺俗猶有存者父兄尚告子弟使究其所學者以有諸已黜澆習養厚徳也魯人頌僖公能修泮宫曰濟濟多士克廣徳心則化民成俗之事亦有望于泮宫之諸賢焉海鹽州儒學新修廟學記海鹽州士韓允元等致書于旅曰昔吾州之為縣也宣聖廟在縣治之南縣東别有學今學麗于廟者前代之所并也學有田萬餘畝至元内附之初民乘問據有之利之歸于我者十無二三元貞元年縣陞州以學為州學設教授大徳中教授丘世良等始復田延祐二年劉文翁典教事田始盡復帑庾既實乃治宫室之壞者而新之今二十餘年田不加少嵗不恒歉而貲用弗克稱貸彌重深蠧積弊莫或弭之顧于室翹翹殆不可禦風雨矣至元再元之三年單父呂徳裕文饒為教授慨然有作興之志知州趙孟貫子唯願相與以有為也俄而終更亷訪贍思得之適行部至州得之儒者又甞知文饒而知新州賈甫吉甫亦意嚮文事教授于是得展其志蠧之深者剔之弊之積者鋤之佃田而自封者悉懲而徴之大防既立不益自盈是嵗又有年教授喜曰天其相吾興廟學乎乃鳩工市材繕大成衆木之腐且橈者皆以貞材代之壞于上者則撤而瓦之剥于下者則除而甓之漫漶于其間者則塗瑩而丹堊之凡故構之垂圮者又莫不更治之聖賢像設則益新其光輝從祀諸賢則重繪于廡壁門殿南東舊有屋四楹以祠守神至是築新祠南西遷神居之奠謁先聖則以故祠為修容之次又作櫺星門采芹橋門廟南之路西折而出則為外西門餘若門若墻皆為之經始于四年之春明年夏成故宋縣學設主學有官廨海鹽主學所舍距廟三里許遺址僅存以故為學官者率于廟旁近僦舍以居湫隘無以自適廟西有民宅將賣文饒以諸生請遂買宅為廨計自營葺廟學以至于為此也費亦殷矣然宿債畢賡士廩仍繼弟子員增至五十人皆食而教之允元等又言教授處已以嚴行事有節用錢五十緡以上必稟于州頑獷者畏而服之善愿者悦而助之故能化窘為裕而卓然有成若此願記諸石旅聞之能有為者無難事能盡職者無卑官委吏乘田職之鄙者也孔子居之則會計當而牛羊茁壯長矣魯國已不可為也孔子為之則國大治齊人歸侵疆聖人相魯之效己具于委吏乘田之時也是州校官每病于難為葢以為位卑則力有所不及吁位豈有卑于委吏乘田事豈有難于治魯者乎文饒處卑制難而能從容集事吾知其可以大用于世矣孟子曰乃所願則學孔子吾黨舍孔子又誰學耶教授魯之賢者觀其所為可以因之而興起矣今教養之具既已完美學者於此其務學乎騁華不若居實習驁不若敦讓周旋爼豆之間以舒其容鼔舞于絃誦之風以和其氣他日有至海上而觀風者必曰何此邦之似乎魯也是役也治錢榖出入者曰朱綋治文書者曰張玉戴從誨存誠齋記金華蕭氏衣冠之族也曰思明者在錢塘與余游頗久予愛其言與行之皆謹也武夷杜先生篆其讀書之齋曰存誠思明來徴記于予予曰先生善教人哉人不能無過而過恒生于意慮之所不及故乾之九二雖處無過之地而文言傳則曰庸言之信庸行之謹閑邪存其誠盖謂不可自謂無過而弗謹也能閑邪則誠存矣聖人于徳之正中者猶議之若是况衆人之未能正中者乎夫誠者天地之實理人與物具是以生初無有不存者也有不存者邪實害之譬元氣之充于人身也邪氣一攻則元氣為之軋搖故善衞生者惟不使邪氣之得以乗吾間也而曰吾之體完以固吾無用夫衛生之道吁是亦不智之甚矣昔曾子之言誠意也曰君子必慎其獨周子之言誠則曰誠無為幾善惡曰慎獨曰幾善惡其皆本于閑邪存誠之言哉思明其毋自謂言行之已謹也念慮之萌人所易忽冝尤致謹于隠㣲之間乎謹嚴齋記錢塘方直卿靜謹而嗜學甞學春秋取韓子之言名其讀書之所曰謹嚴齋盖將以是而治身也集賢直學士豫章揭公為大書之直卿又來徴言以為記予謂直卿亦知聖人之所以作春秋者乎先王之為天下國家以人有欲而易亂也制為謹嚴之禮以為之範防焉禮也者所以秩人紀而維持乎世道也陵夷至于衰周天王與列國君臣以先王之所以為範防者皆毁裂而棄去人紀于是乎大斁世道于是乎大壞聖人念周禮之不可以盡廢也乃作春秋以救其失凡出于禮者皆入于春秋故曰聖人之刑書也夫謹嚴者禮之體也春秋救禮之失又烏得不謹嚴哉君子之達而有為也則欲使斯世之人皆入于禮毋入于春秋窮而獨善其身也則必使吾身毋入春秋而入于禮吾有君也則事君必忠吾有父也則事父必孝吾有兄也夫婦也則必盡兄弟夫婦之道吾一出言一舉足凛乎若聖人執筆臨吾前而書之謹乎嚴乎不知春秋吾何以知禮之所存者乎雖然重典不刑于治世厲色不設于雅人君子以謹嚴治身至于動容周旋中禮則亦無事乎春秋約齋記錢塘陳子安治琴書之室以燕處也將題其扁而于予徴焉予謂子名寧字子安是子之所以為居者乎然子甞見世之狃于安者往往委弛而驕肆之委弛則隳事驕肆則傲物隳事而傲物則其安為危君子于是有持危之道焉譬之水也為之防以導之則不至于衝決譬之馬也為之羈以馭之則不至于奔放人身血氣之所為也血氣之欲無涯能不為之防與羈乎故吾言焉則有言之則吾行焉則有行之度吾室屋以居焉食飲以養焉衣裳以服焉祍席以寢焉則有室屋食飲衣裳祍席之節葢禮義者人之大閑也入乎是則安出乎是則危智者知其然故常退然不敢以人之所侈者自處也人方恣睢吾寧儒儒人方哆哆吾寧顯顯人甘履巇則吾倚固而藉夷孔子曰以約失之者鮮矣約謂不侈然以自放也請名所居為約齋可乎子安曰善乃屬予記之予因言孔子之道至大也當時門人莫不有得而傳至於今者曽子之學也曾子之學謹身而已葢萬物之理具于吾身謹之于念慮之㣲則可以充之于宇宙之大又豈為身謀乎哉子安静重而闓敏静重則不侈于流俗闓敏則知所趨舍而務學也故為之記遜敏齋記學之于人大矣林林而生蠢蠢而動其初草木禽犢然乃有秉徳廸道被服文雅而美出于其間者學之力也昔者聖王之立極于天下也葢欲使天下之人皆會歸于有極此學之所由起至商傅説之言曰學于古訓惟學遜志務時敏則學之言方見于説命而為之方亦未有尚于此矣葢人身者血氣之物也志不足以帥之則驕怠矣驕則易盈盈則不足以受學怠則易輟輟則遂至于廢學天下之善無窮春秋代序老冉冉其將至不遜志則雖為學終無異于衆人且不自知而入于草木禽犢矣夫海至下也則能受百川之入河江之流不已也則能達于海而同其大善遜志者其海乎善時敏者其河江乎彼蹄涔而洋洋潢汙而洸洸又奚足與言夫海與江河孔子大聖人也入太廟每事問老耼郯子師襄之徒皆不逾于孔子而聖人每折節而問學焉其言曰好古敏以求之曰我學不厭曰學如不及則聖人為學亦不過遜志時敏而已矣況衆人之為學者乎武林陸宗亮孔昭隠于市㕓能勤生以事其親而心誠好學雖處賈肆常持書觀之暇日則從縉紳先生質其所疑見其文辭之善者輒録而識之甞以遜敏名其所居亦可以見其志矣孔昭來徴文以為記乃為釋其說示之亦以自儆也安雅堂集卷八
