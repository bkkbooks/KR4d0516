body:
  text: 安雅堂集卷二元陳旅撰五言律袁克中求母得之泉州母子忽相見睽違已廿年此時歌大隧昔日賦寒泉歳晚安仁養生平絡秀賢清朝崇孝治得就使車還送陳新甫之錢塘監造祭器大宫豐典祀備物致精忱宗祝馳英蕩工官獻吉金野晴江路永山雨驛樓深我亦理歸楫訪人湖水陰送余廷心同知泗州二首元統龍飛歳承恩入殿廬觀君廷對䇿當代賈生書鳴鳳朝梧暖征鴻野雪疎他年陳仲舉不復記題輿城栁含春霧循行泗水隈岸虚磬材出潭靜鼎光來政簡居民樂詩新過客催時清宜吏隱遮莫長官猜送項鍊師還天台鍊師能醫不學東方朔歸尋馬子微人間無藥賣海上有雲飛谷煖金鵞大溪深土鴨肥當年種桃樹髙過石樓扉送養安海秉傳省親其父監江陰州有賜酒聞説江陵郡賢侯政績髙蜚聲騰禁闥將指屬兒曹水驛藏汀樹春城近海濤庭闈多喜色宫醖酌葡萄送張晞顔孝感縣尹宦遊䢵子國宰邑用牛刀見説民風厚何愁吏事勞嵕山翔翡翠漢水釀葡萄桃李成陰後鑾坡步武髙送邢晉卿御史還霍州邢君臺閣彦秉德直而清寒柏宜烏集朝梧有鳳鳴祇今公論在何事宦情輕白石汾河曲臨風暫濯纓題鄭德和所藏山水圖歴歴清江曲重重緑樹堆林喧春瀑壯雲斷晚山來游子還鄉去小牕臨水開更從野橋外隨意步幽苔清漳黄氏北墅聞説黄家墅開門入翠嵐細岑依舍北流水出城南雨暖蘭抽筍霜時樹落柑千年讀書地更莫乞羊曇韓伯清以秋溪泛艇圖贈秋潭上人求詩題其上溪上碧雲合令人憶惠休幽期不可失時日故相求野岸青岑晚水村紅葉秋韓侯與佳客於此泛蘭舟次韻上官來復見寄琳館薄炎熱松壇深歳年髙人坐堂上疎雨落堦前潘岳頭空白揚雄學未𤣥定應拂塵服從子弄雲泉賦胡氏嘉樹軒結屋華峯下林巒在屋東幽軒留白日流水近青楓樊重看成器韓宣好賦弓歸來五男子娯侍百年翁送謝仲連為小鹿巡檢詩有序謝氏前代相閥而戚畹之近者也苕華芸黄與所附者同一枯悴于今六十年矣八臣之族降在皁隸何可勝紀仲宣乃能以文學發身受天子命游徼山海間豈不亦榮矣哉余于餞行之日則亦不能無所感矣乃為詩曰小鹿謝將軍前朝宰相孫故家已為庶今代得承恩笳鼓鳴沙月旌旗樹海暾送行車數兩囘首在龍門楊季子水北山房豫章楊季子語我草堂幽野逕穿雲入山泉繞舍流竹光書帙曉溪影釣絲秋水北真佳隱誰從節度遊艾氏心逺樓聞子臨川上髙樓萬里并興來時獨立心與日俱行野夕歸鴻小溪晴落木明登臨何日共作賦寫平生白雲牕養素不出户山牕几研清都無俗客至惟有白雲生潤帶苔衣冷晴兼栁絮明何時遂澤物出岫轉多情方壺道士作荒山白雲圖寄豫章楊顯民之子讀書處亂山生白雲林花晴冉冉巖瀑暝紛紛畫此何為者持之以贈君謂宜作春雨舒卷只成文送潘澤民還江南詩有序檇李潘澤民往歳來京師貴人有好事者延之材館且大慰薦之而澤民悵焉有庭闈之思遂薦為行中書從事欲有以悦其親耳夫懷才抱藝之士莫不欲自見於宰物之地而徘徊淹遲無所遇合至於窮不能歸羞見其親戚鄉黨者豈少也哉若澤民之歸亦可以飲酒而歌舞矣雖然明時將廣延英碣石之宫拓康莊之第以來天下之賢雋而選擢登用之澤民宜無久留於外也乃為之賦詩一首曰之子來京國侯門即曳裾只求毛義檄未獻賈生書野樹山前合江帆雨外疎故人正相望且莫賦閒居送劉鍊師江南求諸家老子註石室𤣥文祕憑君事逺搜六丁那敢取二酉豈終留行帳琪華合歸帆寶氣浮内詢闗尹子曾得禮書不送台州袁生赴婺州令史將迎養其親東閣三台近南樓八詠髙山居迎白髮溪雨濕紅桃莫作儒生腐林嫌吏事勞邵公名位重曾作縣公曹送達天山江浙省檢校河上蘭舟動江南畫省開睽攜成浩歎檢校用英才湖水深詩硯吳山對酒盃崇文仍設監人望賈生來送龔立民還江南詩有序臨江龔君立民以南康學正謁選京師校官闕少立民久不得調與其友言曰仕進之有遲速命也吾久留於此欲何為哉孰若歸讀吾書於清江之上以待吾之所自至者乃買舟南歸余聞而歎曰立民可謂知命義矣古所謂俟命者以吾之義處乎命也夫衆人之所趨者機巧生焉窒于正途則入以他逕遲之尺寸則進或尋文詭遇獲禽何棼乎其莫之止也義利之幾審則命義之分安立民仕于南康其熟聞陸子之講于白鹿者乎蜀郡虞先生老于華蓋山下立民亦嘗聞其言矣到家閒暇尚往從之益究其所學以期進乎逺且大者仕進之遲速誠不足言也乃為詩以送之曰送子都門道臨分更把衣人生亦行樂我老未能歸細雨黄梅熟清江白鷺飛相看又何日吾亦委天機分題送良上人得山上泉仲春山木潤幽磴落風前㣲雲散天外積雨在巖邊度竹瑤瑟冷觸石冰花妍細流通夕沼趺坐對青蓮次韻阿容參政省中夜坐上都上國羣公集秋深畫省開虚簷河影近涼苑樹聲來獨坐多幽趣髙吟有逸才平明當獻納騎馬踏輕埃送海豐劉巡檢隨牒游丹徼春風騎氣舒蜑丁鳴鼓吹魚吏掌文書浦嶼烟霞逺村墟瘴癘除石華肥可茹無用膾蜛蠩送陳信仲泉州教授南國多春水桐華滿故園君歸典鄉校我獨客橋門别浦征帆小髙堂講席尊歳闕老釀酒錦田村建昌胡氏小有樓窈窕麻姑宅登臨憶謝公近聞好山色都在小樓中屋曙丹霞吐城深翠雨通石池正當户人立藕花風送余嘉賓赴常寧州判官家住洞庭左舟行湘水間湍流多度竹石聳不依山野郭看花出州田載稻還舊聞官事少幽興轉相闗題羅稚川畫卷雨氣通林壑江光動野航道人岩下去茅屋樹邊涼斷岸入秋水逺山留夕陽登臨莫作賦游子未還鄉遊鐘山崇禧寺華構連山起中天拱百靈祇園多象寶鐘阜有龍形雲護真僧塔泉分大士缾石闌紅葉上飛鷺渺河星七言律送多爾濟國王之國集賢學士襲王封喬木扶疎故國中舊日山河盟白馬此時鐘鼔錫肜弓遼天老鶴來城上瀚海名鷹出日東千載風雲符景運乞磨碣石紀神功送王致道代祠北岳北海濟瀆南鎮皇帝齋明守鎮圭祠官奉節出金閨北尋海瀆瞻恒岳南涉江淮上㑹稽山下靈風吹桂櫂雲邊仙樹拂丹梯王褒空有甘泉頌投老還鄉祀碧鷄殿試進士簾内和宋尚書奏䇿題韻魚鑰初開虎豹闗儒臣奏論不曾閒宫壺浥露金莖表朝佩翔風玉樹間對䇿人皆書董賈摛辭誰復數揚班鯫生何補斯文事帑幣同頒覺汗顔送孔用道山東副使千里星軺不可攀離筵空自疉陽闗步趨方接虁龍上政教欲興齊魯間鄉國誰非驄馬使君侯直著繡衣還髙樓别後偏凝竚覆野春雲起泰山送王君實御史西臺除書朝下五雲間閣吏新移玉筍班恰恰黄鶯鳴苑樹遲遲驄馬過鄉闗濯纓長樂宫前水拄笏終南雨後山不羨相如文似錦到官三日諫書還送李彦方副使入閩海邦赤子窮無告詔遣儒臣著繡衣天禄閣中書灝灝越王山下馬騑騑魚風滿巷榕陰合燕雨侵簾荔子肥一道澄清俄頃事使星還向紫垣飛壽虞先生先生生時其外祖夢衡山道士衡山道士駐飛車千載儒宗出相家月下華星垂五色人間珠樹吐三花芝田養鶴春凝乳茝石聽鶯曉賜霞朝退日長賓客醉翠房文火伏丹砂貢院中次蘇伯修韻上都襆被秋闈怯嫩寒省郎傳檄閉門闌𤣥雲落紙蠶聲老紅密花開蜃影殘覽卷忽驚千載近摛辭尤快一時看才華總為昇平出我得書名補稗官院中聞大駕先還再韻和伯修甘泉宴罷鴈聲寒桂樹吹香出寶闌翠輦遙臨秋海白霓旌髙拂曙星殘氊城家拜銀麕賜棘院人爭繡虎看堪笑子雲能作賦獨騎羸馬後奚官次薩天錫韻燕南幕府文章客澤國相逢讌集齊酒後鱸魚霜作鱠花邊驄馬月為題千篇傑句諧金奏一曲離歌聽玉啼别後寒雲滿江海鴈書何處落青泥謝徵君松巢昔聞徵君在天目松間結巢成久留南阡北郭井里近西枝東柯村谷幽蕙帳眠深翠露落石泉釀熟緗花浮擬借丹梯到髙處枳枸桐乳非吾求送鄭希道杭州路知事幾年讀書白鹿洞諸老遲子黄金臺豈為錢塘足清賞遂令幕府得英才郡中日晏文牘少湖上春晴畫舫開我向都門折楊栁子亦寄我孤山梅寄題黄氏樂全堂華亭南去五十里秩秩髙堂枕泖濱黄金買書教諸子綵服捧酒娛雙親石梁絶澗荷花雨雲屋依林竹色春能守不成三瓦戒樂全長得葆天真為張壺洲賦壺洲握日臺髙雨氣收扶桑涼影動瀛洲珠林錯落三華露寶稼離羅五色秋鄰曲夜機鮫有室空中烟市蜃為樓頗聞雲錦張髙士曾與壺公汗漫游李聘君輓詩不識新安李聘君薊門秋雨讀薶文里無烈火延先廟宅有青松近母墳王霸妻賢能共隱樊宏族大不曾分佳兒力學期終養泰紫橋東只白雲為張真人賦象山文安陸子幽栖日張氏諸賢盡執經自昔衣冠儀里閈至今詩禮擅家庭岩陰夏閤風泉白溪曲春疇雨稻青天上真人躡鳧舄移文休勒北山銘送張真人代祠武當龍虎山桂館祠官持羽節名山兩地躡丹梯共誇曼倩來金馬大勝王褒祀碧雞杵磵暝痕銷雨石杼岩秋影動星溪蕙肴椒醑登瑶席定有神光起畤畦次韻陳漢卿見寄十月􅋈舟南郭近定知乾鵲噪簷端兩年不見鬢毛白一夕相看懷抱寛酒熟親朋喧屋竹霜晴魚蟹飣溪盤别來坐愛新詩好樓雨寒銷畫燭殘送尹希善之宣城令謝朓樓邊春水生夾堤簫鼔畫船輕縣前老父觀初政江左大官聞美名百里田毛欣好酒半簾山影入新晴絃歌為邑非迂事會見宣城似武城張天師素華臺素華臺上天垂野如在閬風臨八荒白日盡懸文玉樹碧空還結水晶牆鳳凰笙奏霓旌下龍虎衣寒寶露香只有仙人能到此山前車馬暮雲黄次韻本旡上人相别君向雷峯塔邊住詩成總在倚闌時蘇堤殘栁凝烟小葛塢閒雲度水遲衲子定囘花遶座故人别後草生墀相知不似相忘好誰説莊周與惠施訪句曲外史苕霅歸來俗事稀偶然攜客欵郊扉渚霞落盌松花熟溪雨登盤石菌肥薄宦不閒慙折簡髙人相見定披衣平生願究中黄祕安得茅君指化機送李盤中真人代祀江南三山弱水囘風不受帆三山只在大江南使槎真帶秋星濕仙掌遙分夕露甘瑄玉禮神通景氣寶香隨地結晴嵐泰壇建論昭靈貺老我猶能效史談六月度居庸闗喜雨曾是農官祝水庸神雲六月四郊同峽龍遥送赤城雨磧馬長驅白海風沴氣潛消亭毒表豐年仍在至元中白頭畏壘庚桑楚能寄新詩頌帝功次韻虞先生寄王真人江國歸來滿逕莎思𤣥初服賦婆娑朝中久已通書嬾溪上何妨載酒過竹屋秋鳴華蓋雨蘂宫晴枕白蘋波樽前忽遣新詩至如此月明良夜何題韓伯清所藏郭天錫畫往年京口郭天錫學得房山髙使君畫省歸來人事少烟岑閒向客樓分林扃暝落青楓雨水郭寒生白蜃雲歳晚懷人增感慨晴牕展玩到斜曛次韻答上官來復故人相候都門道雲錦裁成五色緘定向琳宫投手版暫從玉署寫頭銜花邊共飲移尊禁松下相隨發杖咸莫似去年離别後滿江秋雨濕孤帆壽太乙宫上官鍊師太乙老人曾未老喜臨治世故從容烟中藜杖明天禄海上蓮舟出華峯千日瓊漿流沆瀣三年丹景結芙蓉何時授我長生訣一卷黄書道德宗送張御史之南臺闗中鳴道張夫子今見文孫玉立標白簡秋霜清瘴海繡衣春日拂雲霄何人江浦歌桃葉有客都門折柳條我欲買舟尋太白鳳臺涼吹晚蕭蕭林外詩為夏生作幽人遯世入林間林外髙風况可攀仲御偶然遊洛水黄公豈必在商山春深溪雨流花出日暮松雲載鶴還拓落塵中嗟我老歸與無地可投閒題城市山林圖城市山林路不分畫橋騎馬是徵君樹頭粉堞連青嶂陌上紅塵亂白雲永巷栁深鶯喚友陽坡草煖鹿為羣滑稽誰似東方朔更向金門避世氛懷慶王節婦良人飄泊渺烟鴻牕竹寒沾雨淚紅檜楫不游淇水上柏舟仍見衞風中鼉文屈曲秋機斷鸞影低囘曉鏡空贏得名公寫桓表千年光燄吐晴虹送浙西憲司經歴鄭子安之官子安先任浙東憲司知事往年相送浙江亭帆影寒侵婺女星使幕却臨吳沼緑客樓還對越山青吏胥文牘非難治郡邑風謡莫厭聽我昔宦遊多感慨曾將陋語記冰㕔余嘗為浙西憲幕題名記唐人以祠部為冰㕔冰一音柄今以憲幕為冰㕔尤宜送朱運峯著書得官南歸城東有客過吾廬揮麈髙談逸氣舒金馬豈無方朔技石渠今取夏侯書沙堤老屋秋風合海浦歸帆暮雨疎我亦草𤣥官拓落江南無地可耕耡白南恩詩白侯忠信多才畧故遣分符到海涯西漢幾人循吏傳南恩千載去思碑閭閻安輯科徭省城塹髙深盜賊夷人望次公今柄用功名寧損涖民時送徐得初江浙省檢校鳳凰山北鳳凰池一曲官曹檢校宜庭户靜開苔色古文書閒覽樹陰移中朝豪傑當超用南國風流可暫嬉為問會稽王閣老别來誰作送春詩得初代王止善檢校有送春詩見寄送宋子與贑州照磨昔年文監羅英彦獨子才名冠掾曹江右如今風俗美郡中寧復簡書勞燕山歳晚貂裘敝贑水春深彩艦髙宣室求言需賈誼臨風休賦楚人騷旴江危氏作種桃亭以奉其母種桃亭子旴江上繞檻春明幾樹花緱母池深通碧海麻姑洞小入丹霞落英巧稱斑衣舞芳徑真成錦障遮借問何年當結實應從曼倩醉君家許左丞游衡湘泛琅瓈江至東岡書院鳳山山長何明初來謁公為詩與之時公被召還朝而明初攜所得詩來京師居數月南還公屬余次韻于卷末鄴侯謾愛衡湘好出處那能愜願私詔使已辭龍闕道相君方寫鳳山詩堂依翠篠川如玉坐列華簮室有芝東閣只今文物盛幽人何事歎歸遲次韻黄晉卿與張伯雨道士髙麗式上人㑹於杭州開元宮聞説年來太極翁交游無地不𤣥同偶從賀老作吳語更愛逺公論國風梅塢寒深香欲永蘂宫清徹境疑空流傳詩句并圖畫江海令人思不窮晉卿以太極賦領鄉薦學者傳誦時因稱之為黃太極也先天觀龍虎山南古澗阿幽人住處白雲多千林總種三珠樹百畝曾收五色禾山中有田百畝丹鼎夜光迎海日有石泉日丹鼎石船秋影礙天河澗中有石如船環中景趣知誰會我欲窮源過碧蘿送雅古正卿同知福建轉運鹽使司事離旌纔拂桂林秋又向東風賦逺遊欲得牢盆深似海亦憐閩地小如甌越王臺古多芳草螺女江空下白鷗聞説鄉邦寥落甚富民新政屬君侯題吳王納涼圖吳王臺榭滿汀洲湖上風來暑氣收坐擁紅籹可娛老市無赤米不教愁采蓮舟載烟岑晚響屧廊通水殿幽歳暮甬東寧有此夜涼歌舞莫令休和維揚友人詩揚子江頭水拍天人家種栁住江邊吳娃蕩槳潮生浦楚客吹簫月滿船錦纜憶曾游此地瓊花開不似當年竹西池館多紅藥日日題詩舞袖前次韻友人京華即事阿閣稜層曉陰扶桑涼影映珠林燕山北擁天都大瀛海中涵月殿深仙女乗鸞吹紫玉才人騎馬勒黄金壯遊偶結髙陽客無復臨風動越吟落拓練衣閬苑間江南遊子醉長安禁溝春過留香雨宫樹風來響翠瀾五衞旌旗秋殿裏千官劍佩曉雲端何人只獻河清頌宜向明時瀝寸丹送胡編修暫還越中東陽有客面如玉賦就凌雲相閣開太史今年探禹穴故人落日上燕臺船頭溪甕紅生藇囊底京袍緑染苔相望都門梅雨後越姬摇櫓唱歌來和虞先生雲州道上聞異香年年騎馬蹋龍沙金閣山前席帽斜海上誰移千步草空中時度七香車丹厓翠壁横秋野玉磬琅璈出暮霞我亦往年馳馹過不知仙棗大如瓜送進士楊謙則袁州録事昔年曾飲都門酒此日重遊騎氣舒狗監舊傳司馬賦石渠今奏夏侯書雲生興聖宫前榜栁映宜春陌上車録事公田收百石草堂未了我何如賦方叔髙廬山木齋山中種木圍書閣無數好枝生屋頭白浪吹雲湖艇晚青林含雨石牕秋賦詩當似韓宣子作器定從樊敬侯更愛小亭深樹裏竹根洗硯細泉流昔年種樹不勝勞老榦如今屋脊髙屢許狙公分橡栗時呼木客醉松醪衣巾白日霑蒼雪枕簟西風夢海濤歳晚淹留吾倦矣借君叢桂讀離騷送毛真人南還真人不似壺丘子老去都忘杜德機左乙象文令虎守尚方鳧舄背人飛岩扉暖翠侵緗帙江渚晴霞上羽衣遊子故園春似海客牕長日聽催歸程氏竹雨山房江南春盡雨涔涔繞舍篔簹含積陰園曲疏泉石苔滑籬根繫船溪漲深山寒翡翠巢密葉日暮鷓鴣啼逺林此時世慮澹于水聮牀燈火百年心題王氏竹石圖老人雲錦溪邊住繞屋自種青珊瑚月明池露散林彩春深雨苔生石膚短籬偏護籜龍子密葉並宿苞鳳雛人生何用丹陽尹沙曲涼陰雙玉壺題熊雲巢竹石圖道人種竹三十个定有新巢宿鳳凰石上幽香飄露粉簷前新緑裊風篁天臺月白瑶笙近水國春寒翠袖長見説故人東海上釣竿日暮倚扶桑賦何尊師依緑園聞道江南水竹村蘂珠宫館近名園養花煖霧流空翠飲鹿春泉度石根日落山前迴畫舫月明湖上對芳樽鐘阿躡屩髙風在俗客何曾得欵門為李尊師賦盤中太行之陽有盤谷何似衡山谷更深𤣥露長流芝术圃煖雲曾護玗琪林時乗丹梯弄南斗更步黄庭撫艮岑斯人可望不可即大冠芙蓉横寶簮送吳養元曲阜孔廟勾管先還江南吾聞昔者趙文子所舉管庫多才賢况如吳季習禮樂更在孔林司豆籩江雨片帆桃葉渡旗亭殘曲杏花天彩衣捧檄為親壽八月錦溪仍放船送熊太古還豫章詩有序昔者天慵先生典教閩中郡以禮樂之學嘉惠士子旅時尚幼未有知也稍長見先人遺稿有送熊先生詩大槩歎世俗之鮮能知先生者自秦政燔經籍禮樂書殘毁滋甚漢儒掇拾遺聞所存幾何及王荆公又廢儀禮尊傳義古學至是益衰矣况學者又往往以所謂傳義者剽截牽綴為進取之業而已先王所以制作之意抑何其寥寥已乎此先人之詩所以為先生作也昨者先生之子太古以禮經試春官不第吾黨之士咸惑焉旅則曰此固余先人所永言者也梁麗可以衝城而不可以窒穴世固有美器而不適於用者太古誠有意於進取無亦稍為科舉之學以求合於有司之意乎太古曰世自有我知者吾不能為科舉之學於是公卿大夫皆惜其才而留之太古不可余於其行也誦賈生之言以勉之曰黄鵠之再舉兮觀天地之圜方又為賦詩曰登山臨水春將暮黄鵠髙飛隘九州寶瑟不堪彈古調綵舟何用載新愁望諸臺上連芳草徐孺宅前多白鷗且莫解君明月珮都門知已待重遊申屠子迪為山南憲掾白部使者毁夷陵曹操廟黄牛峽口湍聲急楚女傳芭水廟秋此地殷勤祠魏武何人辛苦得荆州莫令故國無遺祀不見中郎盡發丘千載有人伸大義髙風全似故安侯山陰張氏學圃齋聞道山陰似漢陰丈人早已厭機心蔬苗連町春泉潤𤓰蔓侵籬夕露深種石有時生白玉鋤園何用得黄金倚闌一曲成凄斷珍重佳兒繼好音送趙子期使交趾曉日承恩紫殿深都門祖道馬駸駸上書不奏唐蒙䇿歸槖寧將陸賈金露入珠盤鮫室白苔生銅柱象崖陰為君臨水歌黄鵠天北天南萬里心天谷山神為癸泉源東郭先生履欲穿尋幽俄得谷中天漁人誰去縁溪岸山鬼能來送石泉地煖碧桃深映雨林春琪樹總含烟後來聞有何髙士傳得終南大洞篇送胡士則袁州巡檢皇朝大典初成日烏帽承恩出殿除便製短衣學馳馬不彈長鋏歎無魚白雲親舍秋楓合黄浦征帆暮雨疎我似子雲官拓落賦成猶説似相如壽吳宗師九朝冠佩泰階平國有儒仙作上卿碧海宵晴迎日出黄庭春暖看雲生竹間自洗金鵞蘂花外長留翠鳳旌莫學華陽貞白老乞身神武聽吹笙題南康張先生碑南康隱者張先生長夜讀書朝力耕生憎庾信更開府死學龎公不入城駞阪喪車入秋草廬山磵田多晚秔後來不見青雲傳直恨髙人逃姓名題雲林晚晴圖故人别後江波緑神女歸來峽雨乾海上日花春冉冉天邊雲樹曉團團滿汀芳草留孤艇度石幽泉咽下灘最愛東頭小亭子聽鶯何日一憑闌送楊田甫巡之官潮陽與君相識三十載邂逅都門白髮生南海珠明飛别鶴上林花暖囀新鶯蜑丁浦口迎官艦瘴母雲頭避使旌自是昇平遊宦樂不教瀧吏惱吟情送臨川講僧北來只拜旃檀佛南去還裝貝葉船惠逺幽期何日遂湯休妙句有人傳泉頭説法花為雨江上懷人草似烟亦有後来相見日青城學士在臨川賦梅雪齋素濤翻落星娥渚端葉闕殘月姊家𤣥圃玗琪總成樹唐昌玉蘂别開花香雲無迹迷寒蝶彩日含光動曉鴉遥想道人石牕底只吹丹火煮流霞趙敬甫學士稼翁亭平生天上經綸手歸作小亭村雨中海宇昇平皆帝力稼翁老大見年豐揚雄空解農桑業劉向長懷畎畝忠我欲從公開社甕只將土鼔奏豳風送左衞教授馬伯誠還湖州羽林亦有通經士論説皆從漢殿儒喜為馬融施綘帳誰從王式賦驪駒舟移江上星沈樹路入吳中雨滿湖我亦南還當邂逅苕溪酒熟膾長鱸送楊元誠奉㫖南還造紙金鑾罷講日初斜屈曲奎文炫筆花玉版遥令擣秋水綵箋仍許截晴霞侍臣天上催傳勅使者湖邊得過家我亦今年理江楫君還何處轉星槎張將軍廟堂詩將軍燕人大德五年征西南夷陣亡時年七十將軍頭白更征蠻平宋吳鈎血尚殷萬斛樓船上江去半空鐵馬哨雲還凄涼部曲清笳畔窈窕祠堂緑樹間堪笑班超真老矣乞身生入玉門闗題武秀才湖山圖問君何處結茅屋只在湖山緑樹邊岩徑每留居士屩沙灣時􅋈孝廉船采蘭秋渚迎芳夕劚筍春林坐暖烟我亦夢騎黄鵠去芙蓉峯外水如天為董宇定賦杏林詩侯官古縣多山水中有當年董奉家邑子每懷江上樹仙人還種日邊花珠林春氣凝丹露貝闕晨光散綵霞我憶舊遊曽逺到上東門外立昏鴉上清宫追次鄭丞相韻許掾登臨體正便莫驚流序迅奔川山中雲物如太古湖曲樓臺占小天丞相書堂依緑竹道人丹井出紅蓮青童留客飡霞氣塵世如何不學仙題葛子熙行卷為愛臨川葛子熙奎章學士故題詩交游盡識性情好江海相逢歳月遲白雨連村親舍冷丹楓明浦客舟移阿洪舊宅湖陰近遲子重來理釣絲陸氏菊逸望仙橋下市㕓間汨汨紅塵没馬鞍誰種禽花滿幽圃故收野色入晴闌籬根荷鍤培深雨鄰曲移盃對早寒玩此芳叢足怡老南山當戸不曽看送錢思復之富陽錢塘江上錢思復問學真成井大春誰依山水築髙館更有笙瑟娛嘉賓畫槳飛鷗沙日暖緑楊啼鳥岸烟新朝囘寄詩寫離思為子時烹五色鱗送鄧文質薊門風雪貂裘敝寒橐能多季子金萬里壯遊孤硯在十年歸夢亂山深春來草色生南浦日煖鶯聲滿上林空濶庭前看流水浮榮何足累初心題劉氏溪山圖清溪曲曲抱林丘劉氏有屋溪上頭未能歸去倩人畫時復把看銷客愁鷗邊野艇水風晚竹裏草亭雲日幽題詩笑我計轉拙無錢買山猶逺遊送聶韞夫同知平江州玉堂親見擢髙科剪剪宫花染賜羅驕馬總穿燕市栁髙帆仍掛洞庭波董生學問傳三䇿屈子文章擅九歌澤國政成應趣召殺青未覺得人多與陳敬初同舟北遊題餞行卷我愛天台陳敬初少日辭家即逺圖上書可擬賈生䇿入闗便棄終軍繻八月官河秋水大三江親舍暮雲孤名成歸去歳未晚卜鄰有約依東吳安雅堂集巻二
